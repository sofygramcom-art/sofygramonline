<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة الملكية 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* شريط اللغات */
        .lang-switch { position: absolute; top: 15px; left: 15px; display: flex; gap: 8px; z-index: 1000; }
        .l-btn { cursor: pointer; background: rgba(255,215,0,0.1); border: 1px solid var(--glow); color: var(--glow); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .l-btn.active { background: var(--glow); color: #000; }

        .master-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        
        input { padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .btn-king:active { transform: translateY(3px); box-shadow: none; }

        .user-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; 
            border-right: 6px solid #888; text-align: right; 
        }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.8; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-f { background: #2ecc71; } 
        .btn-t { background: #f1c40f; color: #000; } 
        .btn-p { background: #9b59b6; } /* الرمز */
        .btn-h { background: #3498db; } /* الهاتف */
        .btn-d { background: #e74c3c; } 
        
        .days-badge { background: #ffd700; color: #000; padding: 4px 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .wa-link { color: #25d366; font-size: 18px; margin-right: 10px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <div class="l-btn active" id="btnAr" onclick="setLang('ar')">العربية</div>
        <div class="l-btn" id="btnEn" onclick="setLang('en')">English</div>
    </div>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:130px; margin-bottom:15px;">
        <h2 id="t-lock">قفل الإدارة العليا 👑</h2>
        <div id="passArea"><input type="password" id="mPass" placeholder="كلمة المرور"></div>
        <div id="secArea" style="display:none;">
            <p id="t-sec-msg" style="color:#e74c3c; font-size:13px; font-weight:bold;">⚠️ تجاوزت المحاولات! تحقق الأمان:</p>
            <input type="text" id="mSec" placeholder="ما هو بلدك؟">
        </div>
        <button onclick="masterLogin()" class="btn-king" id="t-entry">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 id="t-mtitle" style="color:#ffd700;">إدارة الصلاحيات والوقت 👑</h2>
        <input type="text" id="mSearch" placeholder="..." onkeyup="filterUsers()" style="width:95%;">
        <div id="usersList">جاري التحميل...</div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer; font-size:11px;" id="t-ch">⚙️ تغيير رمز الدخول</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 0;
        let curLang = 'ar';
        let masterHash = "e10adc3949ba59abbe56e057f20f883e"; 

        const dict = {
            ar: { lock: "قفل الإدارة العليا 👑", entry: "دخول الملك 👑", mtitle: "إدارة الصلاحيات والوقت 👑", ph: "ابحث عن مشترك...", f30: "تفعيل شهر (30)", f3: "تجربة (3 أيام)", fdel: "حذف المشترك", fpass: "🔑 الرمز / تعديل", fphone: "📱 هاتف العيادة", sec: "تحقق الأمان المتقدم 🛡️", exp: "ينتهي في:" },
            en: { lock: "Master Lock 👑", entry: "King Login 👑", mtitle: "Subscription Manager 👑", ph: "Search user...", f30: "Activate 30 Days", f3: "Trial 3 Days", fdel: "Delete User", fpass: "🔑 Pass / Edit", fphone: "📱 Phone", sec: "Advanced Security 🛡️", exp: "Expires on:" }
        };

        get(ref(db, 'admin_settings/masterHash')).then((s) => { if(s.exists()) masterHash = s.val(); });

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            const s = document.getElementById('mSec').value;
            if (attempts >= 3) {
                if (s === "السويد") unlock();
                else alert("خطأ!"); return;
            }
            if (CryptoJS.MD5(p).toString() === masterHash) { unlock(); } 
            else {
                attempts++;
                alert("رمز خطأ! متبقي: " + (3-attempts));
                if (attempts >= 3) {
                    document.getElementById('passArea').style.display='none';
                    document.getElementById('secArea').style.display='block';
                    document.getElementById('t-lock').innerText = dict[curLang].sec;
                }
            }
        };

        function unlock() {
            document.getElementById('authBox').style.display='none';
            document.getElementById('masterBox').style.display='block';
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const users = snap.val();
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const today = new Date();
                for(let id in users) {
                    const u = users[id];
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let daysLeft = expiry ? Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)) : 0;
                    let rowClass = daysLeft > 0 ? "active-user" : "expired-user";
                    
                    list.innerHTML += `
                        <div class="user-row ${rowClass}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b style="font-size:18px;">${u.name}</b> <span class="days-badge">${daysLeft > 0 ? daysLeft + (curLang==='ar'?' يوم':' Days') : '!!!'}</span> <br>
                                <small style="color:#aaa;">${dict[curLang].exp} ${expiry ? expiry.toLocaleDateString('en-GB') : '---'}</small>
                                <div id="info-${id}" style="margin-top:5px; font-weight:bold; color:var(--glow); display:none;"></div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-f" onclick="setSub('${id}', 30)">${dict[curLang].f30}</button>
                                <button class="btn btn-t" onclick="setSub('${id}', 3)">${dict[curLang].f3}</button>
                                <button class="btn btn-p" onclick="managePass('${id}', '${u.name}', '${u.password}')">${dict[curLang].fpass}</button>
                                <button class="btn btn-h" onclick="showPhone('${id}', '${u.phone || 'لا يوجد'}')">${dict[curLang].fphone}</button>
                                <button class="btn btn-d" onclick="delUser('${id}')">${dict[curLang].fdel}</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // دالة كشف وتغيير الرمز
        window.managePass = (id, name, currentPass) => {
            const newPass = prompt(`رمز ${name} الحالي هو: [ ${currentPass} ]\nأدخل رمزاً جديداً لتغييره أو اتركه فارغاً:`);
            if (newPass && newPass !== currentPass) {
                update(ref(db, `users/${id}`), { password: newPass })
                .then(() => alert("✅ تم تحديث رمز " + name));
            }
        };

        // دالة إظهار الهاتف مع رابط واتساب
        window.showPhone = (id, phone) => {
            const infoDiv = document.getElementById(`info-${id}`);
            if (phone === 'لا يوجد') {
                infoDiv.innerHTML = "🚫 لا يوجد رقم هاتف";
            } else {
                const cleanPhone = phone.replace(/\D/g, ''); // تنظيف الرقم للواتساب
                infoDiv.innerHTML = `
                    <a href="https://wa.me/${cleanPhone}" target="_blank" class="wa-link"><i class="fab fa-whatsapp"></i></a>
                    <span>${phone}</span>
                `;
            }
            infoDiv.style.display = infoDiv.style.display === 'none' ? 'block' : 'none';
        };

        window.setSub = (id, days) => {
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString(), startDate: new Date().toLocaleDateString('en-GB') })
            .then(() => alert("✅ Done"));
        };

        window.changePass = () => {
            const newP = prompt("أدخل رمز الإدارة الجديد:");
            if(newP) {
                const h = CryptoJS.MD5(newP).toString();
                set(ref(db, 'admin_settings/masterHash'), h).then(() => { alert("تم التغيير ✅"); location.reload(); });
            }
        };

        window.delUser = (id) => { if(confirm("حذف؟")) remove(ref(db, `users/${id}`)); };
        window.setLang = (l) => {
            curLang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(l === 'ar' ? 'btnAr' : 'btnEn').classList.add('active');
            document.getElementById('t-lock').innerText = dict[l].lock;
            document.getElementById('t-entry').innerText = dict[l].entry;
            document.getElementById('t-mtitle').innerText = dict[l].mtitle;
            document.getElementById('mSearch').placeholder = dict[l].ph;
            document.body.dir = (l === 'ar') ? 'rtl' : 'ltr';
            if (document.getElementById('masterBox').style.display === 'block') loadUsers();
        };

        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

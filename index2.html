<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram AI | صوفيگرام الذكي 🎙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .hero { padding: 40px 20px; background: radial-gradient(circle, #1a1a2e, #050a14); }
        .mic-btn { width: 100px; height: 100px; background: var(--glow); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; color: #000; cursor: pointer; transition: 0.4s; border: 8px solid rgba(0, 210, 255, 0.1); }
        .mic-btn.listening { background: #ff4757; box-shadow: 0 0 40px #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #searchStatus { margin-top: 15px; font-size: 1.1rem; color: var(--glow); font-weight: bold; min-height: 30px; }
        .results-area { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .res-card { background: #111; border-radius: 20px; padding: 20px; border: 1px solid #333; text-align: right; transition: 0.3s; position: relative; cursor: pointer; }
        .res-card:hover { border-color: var(--glow); transform: translateY(-5px); }
        .status-tag { position: absolute; top: 15px; left: 15px; font-size: 11px; padding: 4px 8px; border-radius: 8px; font-weight: bold; }
        .is-open { background: #2ecc71; color: #fff; }
        .is-closed { background: #e74c3c; color: #fff; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>SOFYGRAM AI 🎙️</h1>
        <div class="mic-btn" id="micBtn" onclick="startAI()">
            <i class="fas fa-microphone"></i>
        </div>
        <div id="searchStatus">تحدث الآن.. أنا أسمعك</div>
    </section>

    <div class="results-area" id="resultsBox"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function speak(text, callback) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text; msg.lang = 'ar-SA';
            msg.onend = () => { if(callback) callback(); };
            window.speechSynthesis.speak(msg);
        }

        window.startAI = () => {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-IQ';
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('searchStatus');

            recognition.onstart = () => { btn.classList.add('listening'); status.innerText = "جاري الاستماع..."; };
            recognition.onresult = (event) => {
                const query = event.results[0][0].transcript.toLowerCase();
                btn.classList.remove('listening');
                status.innerText = `حللتُ قولك: ${query}`;
                processQuery(query);
            };
            recognition.start();
        };

        function processQuery(query) {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val();
                const box = document.getElementById('resultsBox');
                box.innerHTML = "";
                let matches = [];

                for (let id in data) {
                    const u = data[id];
                    if (u.active && (query.includes(u.city) || query.includes(u.type) || query.includes(u.name.toLowerCase()) || (u.neighborhood && query.includes(u.neighborhood)))) {
                        matches.push({ id, ...u });
                    }
                }

                if (matches.length === 1) {
                    // تحويل مباشر إذا كانت النتيجة واحدة فقط
                    const u = matches[0];
                    const openStatus = u.hasOwnProperty('isOpen') ? u.isOpen : true;
                    const speechTxt = `وجدتُ ${u.name}. هو ${openStatus ? 'مفتوح حالياً' : 'مغلق الآن'}. جاري تحويلك.`;
                    
                    speak(speechTxt, () => {
                        window.location.href = `profile.html?id=${u.id}`;
                    });
                    
                    // احتياطاً إذا لم يعمل الـ callback
                    setTimeout(() => { window.location.href = `profile.html?id=${u.id}`; }, 4000);

                } else if (matches.length > 1) {
                    speak(`وجدتُ ${matches.length} نتائج، اختر من القائمة`);
                    matches.forEach(u => {
                        const openStatus = u.hasOwnProperty('isOpen') ? u.isOpen : true; 
                        box.innerHTML += `
                            <div class="res-card" onclick="window.location.href='profile.html?id=${u.id}'">
                                <span class="status-tag ${openStatus ? 'is-open' : 'is-closed'}">${openStatus ? 'مفتوح' : 'مغلق'}</span>
                                <h3 style="margin:0; color:var(--glow);">${u.name}</h3>
                                <p style="font-size:14px; margin:5px 0;">${u.type} - ${u.city}</p>
                            </div>
                        `;
                    });
                } else {
                    speak("نعتذر، هذا النشاط غير مسجل لدينا");
                    box.innerHTML = "<p>لا توجد نتائج مطابقة..</p>";
                }
            }, { onlyOnce: true });
        }
    </script>
</body>
</html>

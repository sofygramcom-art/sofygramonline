<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Global Search | صوفيگرام العالمي 🌍</title>
    <style>
        body { background-color: #050a14; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .search-card { background: #0c121d; border-radius: 35px; padding: 30px; max-width: 500px; margin: auto; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* تصميم المايك الناري */
        .mic-container { margin-bottom: 25px; position: relative; display: inline-block; }
        .mic-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: #00d2ff; border: none; 
            font-size: 35px; cursor: pointer; transition: 0.4s; position: relative; z-index: 2;
        }
        .mic-btn.active { 
            background: #ff4500; 
            box-shadow: 0 0 20px #ff4500, 0 0 40px #ff4500; 
            animation: fire-glow 1s infinite alternate;
        }
        @keyframes fire-glow { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* الحقول المتطورة */
        select, input { 
            width: 95%; padding: 15px; margin: 8px 0; border-radius: 15px; 
            background: #000; border: 1px solid #333; color: #fff; font-size: 16px; outline: none;
        }
        .btn-search { 
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white; 
            border: none; padding: 18px; border-radius: 18px; width: 100%; 
            font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 18px;
        }
        .result-item { 
            background: #121212; border-right: 5px solid #00d2ff; padding: 15px; 
            margin: 10px 0; border-radius: 15px; text-align: right; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="search-card">
        <h2 style="color:#00d2ff;">صوفيگرام أونلاين 🛰️</h2>
        <p style="font-size: 12px; color: #888;">النظام العالمي الأول لإدارة طوابير الانتظار</p>

        <div class="mic-container">
            <button id="micBtn" class="mic-btn" onclick="startAdvancedVoice()">🎙️</button>
            <p id="micStatus" style="font-size: 12px; color: #00d2ff; margin-top: 10px;">اضغط للتحدث (لهجة عراقية)</p>
        </div>

        <div id="advancedForm">
            <input type="text" id="manualInput" placeholder="اكتب اسم النشاط هنا...">
            
            <select id="provinceSelect">
                <option value="">كل المحافظات</option>
                <option>بغداد</option><option>النجف</option><option>كربلاء</option><option>البصرة</option>
                <option>بابل</option><option>الأنبار</option><option>أربيل</option><option>السليمانية</option>
                <option>دهوك</option><option>ديالى</option><option>ذي قار</option><option>صلاح الدين</option>
                <option>كركوك</option><option>ميسان</option><option>المثنى</option><option>نينوى</option>
                <option>القادسية</option><option>واسط</option>
            </select>

            <select id="categorySelect">
                <option value="">كل الأنشطة</option>
                <optgroup label="طبي">
                    <option>أطباء وعيادات</option><option>صيدليات</option><option>مختبرات</option>
                </optgroup>
                <optgroup label="تجاري">
                    <option>مطاعم وكافيهات</option><option>أسواق</option><option>تجميل وحلاقة</option>
                </optgroup>
            </select>

            <button class="btn-search" onclick="runFinalSearch()">تطبيق الفلترة 🔎</button>
        </div>

        <div id="results" style="margin-top:20px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // وظيفة الصوت الذكية (تنظيف النص + إطار ناري)
        window.startAdvancedVoice = () => {
            const mic = document.getElementById('micBtn');
            const status = document.getElementById('micStatus');
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            
            rec.lang = 'ar-IQ'; 
            rec.start();
            mic.classList.add('active');
            status.innerText = "جاري الاستماع... (حجي عراقي)";

            rec.onresult = (e) => {
                let text = e.results[0][0].transcript;
                // تنظيف النص من النقاط وعلامات الاستفهام
                text = text.replace(/[.؟?]/g, ""); 
                document.getElementById('manualInput').value = text;
                mic.classList.remove('active');
                status.innerText = "تم الالتقاط: " + text;
                runFinalSearch(); // ابحث فوراً
            };

            rec.onerror = () => {
                mic.classList.remove('active');
                status.innerText = "أعد المحاولة..";
            };
        };

        window.runFinalSearch = async () => {
            const nameQ = document.getElementById('manualInput').value.toLowerCase();
            const provQ = document.getElementById('provinceSelect').value;
            const catQ = document.getElementById('categorySelect').value;
            const resDiv = document.getElementById('results');
            
            resDiv.innerHTML = "جاري البحث عن العيادات...";
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            resDiv.innerHTML = "";

            for(let key in data) {
                const u = data[key];
                const matchName = !nameQ || (u.name && u.name.toLowerCase().includes(nameQ));
                const matchProv = !provQ || (u.city && u.city.includes(provQ));
                // هنا البحث مرن، إذا لقى النشاط بالوصف أو الاسم
                if(matchName && matchProv) {
                    resDiv.innerHTML += `
                        <div class="result-item" onclick="location.href='view.html?id=${key}'">
                            <h3 style="margin:0; color:#00d2ff;">⭐ ${u.name}</h3>
                            <p style="margin:5px 0; font-size:12px; color:#aaa;">📍 ${u.city || 'النجف'} - ${u.address || 'حي سومر'}</p>
                            <p style="margin:0; font-size:12px; color:#00d2ff;">📞 ${u.phone || '0780000000'}</p>
                        </div>`;
                }
            }
            if(resDiv.innerHTML === "") resDiv.innerHTML = "لم يتم العثور على نتائج تطابق هذا البحث.";
        };
    </script>
</body>
</html>

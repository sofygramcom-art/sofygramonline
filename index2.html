<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram AI | صوفيگرام الذكي 🎙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        .hero { padding: 50px 20px; background: radial-gradient(circle, #1a1a2e, #050a14); }
        .mic-btn { width: 120px; height: 120px; background: var(--glow); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 50px; color: #000; cursor: pointer; transition: 0.4s; border: 10px solid rgba(0, 210, 255, 0.1); }
        .mic-btn.listening { background: #ff4757; box-shadow: 0 0 50px #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #searchStatus { margin-top: 20px; font-size: 1.3rem; color: var(--glow); font-weight: bold; min-height: 40px; }
        .results-area { padding: 20px; max-width: 800px; margin: auto; }
        .res-card { background: #111; border-radius: 25px; padding: 25px; border: 2px solid var(--glow); text-align: right; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>SOFYGRAM AI 🌐</h1>
        <p>تحدث معي.. أنا أبحث وأجيبك بصوتي</p>
        <div class="mic-btn" id="micBtn" onclick="startAI()">
            <i class="fas fa-microphone"></i>
        </div>
        <div id="searchStatus">اضغط للتحدث...</div>
    </section>

    <div class="results-area" id="resultsBox"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة النطق الآلي
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.language = 'ar-SA';
            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }

        window.startAI = () => {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-IQ';
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('searchStatus');

            recognition.onstart = () => { btn.classList.add('listening'); status.innerText = "أسمعك.. تفضل؟"; };
            
            recognition.onresult = (event) => {
                const query = event.results[0][0].transcript.toLowerCase();
                btn.classList.remove('listening');
                status.innerText = `حللتُ قولك: ${query}`;
                processQuery(query);
            };

            recognition.onerror = () => { btn.classList.remove('listening'); speak("عذراً، لم أسمعك جيداً"); };
            recognition.start();
        };

        function processQuery(query) {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val();
                let matches = [];

                for (let id in data) {
                    const u = data[id];
                    // فحص ذكي للكلمات المفتاحية
                    if (u.active && (query.includes(u.city) || query.includes(u.type) || query.includes(u.name.toLowerCase()))) {
                        matches.push({ id, ...u });
                    }
                }

                if (matches.length === 0) {
                    const failMsg = "نأسف، هذا النشاط غير مسجل في منصة صوفيگرام حتى الآن";
                    status.innerText = failMsg;
                    speak(failMsg);
                } 
                else if (matches.length === 1) {
                    const u = matches[0];
                    const note = u.secretaryNote || "لا توجد ملاحظات إضافية";
                    const statusMsg = u.isOpen ? "مفتوح حالياً" : "مغلق الآن";
                    
                    const welcome = `وجدتُ ${u.name}. هو ${statusMsg}. ملاحظة السكرتير تقول: ${note}. جاري تحويلك لصفحته الشخصية.`;
                    speak(welcome);
                    
                    setTimeout(() => {
                        window.location.href = `profile.html?id=${matches[0].id}`;
                    }, 5000); // يحوله بعد 5 ثواني ليعطيه مجال لسماع الكلام
                } 
                else {
                    const countMsg = `وجدتُ ${matches.length} نتائج. يمكنك الاختيار من القائمة`;
                    speak(countMsg);
                    showResults(matches);
                }
            }, { onlyOnce: true });
        }

        function showResults(list) {
            const box = document.getElementById('resultsBox');
            box.innerHTML = list.map(u => `
                <div class="res-card" onclick="window.location.href='profile.html?id=${u.id}'">
                    <h3>${u.name}</h3>
                    <p>${u.type} - ${u.city}</p>
                    <small>اضغط للدخول للملف</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | صوفيگرام العراق 🇮🇶</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #00d2ff; --bg: #050a14; --card: #121212; --fire: #ff4500; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; text-align: center; }
        
        /* هيدر اللوغو الناري */
        header { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .logo-wrap { position: relative; display: inline-block; padding: 20px; }
        .logo-text { font-size: 50px; font-weight: 900; color: white; position: relative; z-index: 5; text-shadow: 0 0 10px rgba(255,255,255,0.5); margin: 0; letter-spacing: 2px; }
        
        .fire-ring { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 20px; 
            border: 4px solid var(--fire); box-shadow: 0 0 25px var(--fire), inset 0 0 20px var(--fire);
            animation: flame 1.2s infinite alternate; z-index: 1; }
        @keyframes flame { from { box-shadow: 0 0 15px var(--fire); transform: scale(1); } to { box-shadow: 0 0 40px #ff8c00; transform: scale(1.05); } }

        .btn-reg { background: linear-gradient(45deg, #ff4500, #ff8c00); color: white; text-decoration: none; padding: 15px 35px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(255, 69, 0, 0.4); transition: 0.3s; }
        .btn-reg:hover { transform: scale(1.05); }

        /* منطقة البحث */
        .search-container { padding: 20px; }
        .main-search { max-width: 750px; margin: 0 auto 30px auto; position: relative; }
        .main-search input { width: 100%; padding: 20px 25px 20px 70px; border-radius: 30px; border: 2px solid #333; background: #000; color: white; font-size: 20px; outline: none; text-align: right; }
        .main-search i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--glow); font-size: 28px; cursor: pointer; }

        .mic-btn { width: 95px; height: 95px; background: var(--glow); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; color: #000; cursor: pointer; border: 10px solid rgba(0,210,255,0.1); }
        .mic-btn.listening { background: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* البحث الرباعي الشامل */
        .filter-grid { max-width: 1100px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 35px; border: 1px solid #222; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        select, .area-input { padding: 15px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; text-align: right; outline: none; font-size: 16px; width: 100%; box-sizing: border-box; }

        /* نتائج البحث */
        .results-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 25px; max-width: 1300px; margin: auto; }
        .card { background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid #222; text-align: right; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--glow); transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .status-badge { position: absolute; top: 20px; left: 20px; font-size: 13px; padding: 6px 14px; border-radius: 12px; font-weight: bold; border: 1px solid currentColor; }
        .phone-txt { color: var(--glow); font-size: 16px; font-family: monospace; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrap">
            <div class="fire-ring"></div>
            <h1 class="logo-text">صوفيگرام</h1>
        </div>
        <a href="register2.html" class="btn-reg">تسجيل نشاط جديد 🚀</a>
    </header>

    <div class="search-container">
        <div class="main-search">
            <input type="text" id="nameInput" placeholder="ابحث باسم الطبيب، الصيدلية، أو المحل..">
            <i class="fas fa-search" onclick="doSearchName()"></i>
        </div>

        <div class="mic-btn" id="micBtn" onclick="startVoice()">
            <i class="fas fa-microphone"></i>
        </div>
        <p id="micMsg" style="color:var(--glow); font-weight:bold; margin-top:15px;">اضغط للتحدث بصوتك</p>

        <div class="filter-grid">
            <select id="typeInp">
                <option value="">كل الأنشطة</option>
                <optgroup label="صحة وطب">
                    <option value="طبيب / عيادة">أطباء وعيادات</option>
                    <option value="صيدلية">صيدليات</option>
                    <option value="مختبر طبي">مختبرات</option>
                </optgroup>
                <optgroup label="تجارة وتسوق">
                    <option value="أسواق / سوبر ماركت">أسواق ومولات</option>
                    <option value="صائغ ذهب / مجوهرات">صياغ ذهب</option>
                    <option value="مطعم / كافيه">مطاعم وكافيهات</option>
                </optgroup>
                <optgroup label="خدمات أخرى">
                    <option value="شركة برمجيات">شركات تقنية</option>
                    <option value="مركز تجميل / صالون">حلاقة وتجميل</option>
                </optgroup>
            </select>

            <select id="cityInp">
                <option value="">كل العراق (18 محافظة)</option>
                <option value="بغداد">بغداد</option><option value="النجف">النجف</option><option value="كربلاء">كربلاء</option>
                <option value="البصرة">البصرة</option><option value="بابل">بابل</option><option value="الأنبار">الأنبار</option>
                <option value="أربيل">أربيل</option><option value="ذي قار">ذي قار</option><option value="نينوى">نينوى</option>
                <option value="ميسان">ميسان</option><option value="المثنى">المثنى</option><option value="القادسية">القادسية</option>
                <option value="واسط">واسط</option><option value="صلاح الدين">صلاح الدين</option><option value="ديالى">ديالى</option>
                <option value="كركوك">كركوك</option><option value="دهوك">دهوك</option><option value="السليمانية">السليمانية</option>
            </select>

            <input type="text" id="areaInp" class="area-input" placeholder="اكتب القضاء أو الحي يدوياً">
            <button onclick="doSearchFull()" style="grid-column: 1/-1; background: var(--glow); color: black; border:none; padding:15px; border-radius:18px; font-weight:bold; cursor:pointer; font-size:18px;">بحث متقدم 🔍</button>
        </div>
    </div>

    <div class="results-grid" id="resGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function draw(list) {
            const container = document.getElementById('resGrid');
            container.innerHTML = list.length ? "" : "<p style='color:#666;'>لم نجد نتائج تطابق بحثك..</p>";
            list.forEach(u => {
                // تصحيح فحص الحالة (Boolean أو String)
                const open = (u.isOpen === true || u.isOpen === "true");
                container.innerHTML += `
                    <div class="card" onclick="window.location.href='view.html?id=${u.id}'">
                        <span class="status-badge" style="color:${open?'#2ecc71':'#e74c3c'}">${open?'مفتوح':'مغلق'}</span>
                        <h2 style="margin:0; color:var(--glow);">${u.name}</h2>
                        <p style="margin:8px 0; font-size:16px;">${u.type}</p>
                        <p style="margin:0; font-size:14px; color:#888;">📍 العراق - ${u.city} (${u.neighborhood || '---'})</p>
                        ${u.phone ? `<span class="phone-txt"><i class="fas fa-phone-alt"></i> ${u.phone}</span>` : ''}
                    </div>`;
            });
        }

        window.doSearchName = () => {
            const q = document.getElementById('nameInput').value.toLowerCase();
            onValue(ref(db, 'users'), (s) => {
                const d = s.val(); let m = [];
                for(let id in d) { if(d[id].active && d[id].name.toLowerCase().includes(q)) m.push({id, ...d[id]}); }
                draw(m);
            }, {onlyOnce: true});
        };

        window.doSearchFull = () => {
            const t = document.getElementById('typeInp').value;
            const c = document.getElementById('cityInp').value;
            const a = document.getElementById('areaInp').value.toLowerCase();
            onValue(ref(db, 'users'), (s) => {
                const d = s.val(); let m = [];
                for(let id in d) {
                    const u = d[id]; if(!u.active) continue;
                    let p = true;
                    if(t && u.type !== t) p = false;
                    if(c && u.city !== c) p = false;
                    if(a && !u.neighborhood?.toLowerCase().includes(a)) p = false;
                    if(p) m.push({id, ...u});
                }
                draw(m);
            }, {onlyOnce: true});
        };

        window.startVoice = () => {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'ar-IQ';
            rec.onstart = () => document.getElementById('micBtn').classList.add('listening');
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                document.getElementById('micBtn').classList.remove('listening');
                onValue(ref(db, 'users'), (s) => {
                    const d = s.val(); let m = [];
                    for(let id in d) {
                        const target = `${d[id].name} ${d[id].city} ${d[id].neighborhood} ${d[id].type}`.toLowerCase();
                        if(d[id].active && target.includes(t)) m.push({id, ...d[id]});
                    }
                    draw(m);
                }, {onlyOnce: true});
            };
            rec.start();
        };
    </script>
</body>
</html>

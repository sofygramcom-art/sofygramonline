<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>انضم لـ صوفيگرام | تسجيل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .reg-card { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #2ecc71; max-width: 400px; margin: 0 auto; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #000; color: #fff; border: 1px solid #333; text-align: center; }
        button { background: #2ecc71; color: #000; border: none; padding: 15px; width: 90%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #qrcode { background: #fff; padding: 10px; display: inline-block; margin-top: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="reg-form" class="reg-card">
        <h2>تسجيل حساب جديد</h2>
        <input type="text" id="b-id" placeholder="المعرف بالانكليزي (id)">
        <input type="text" id="b-name" placeholder="اسم العيادة بالعربي">
        <input type="password" id="b-pass" placeholder="كلمة المرور">
        <button onclick="register()">إنشاء الحساب 🚀</button>
    </div>
    <div id="result" class="reg-card" style="display:none">
        <h2 style="color:#2ecc71">تم التسجيل!</h2>
        <p>هذا باركود عيادتك (احفظه عندك):</p>
        <div id="qrcode"></div>
        <p style="color:#f1c40f">بانتظار التفعيل من الإدارة...</p>
    </div>
    <script>
        const firebaseConfig = { apiKey: "..", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic" };
        firebase.initializeApp(firebaseConfig);
        function register() {
            const id = document.getElementById('b-id').value.toLowerCase();
            const name = document.getElementById('b-name').value;
            firebase.database().ref('businesses/' + id).set({
                name: name, password: document.getElementById('b-pass').value,
                num: 0, active: false, expiry: ""
            }).then(() => {
                document.getElementById('reg-form').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                new QRCode(document.getElementById("qrcode"), window.location.href.replace('register.html', 'view.html?id=' + id));
            });
        }
    </script>
</body>
</html>

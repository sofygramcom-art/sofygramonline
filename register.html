<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم إلى صوفيگرام | التسجيل والاشتراك 👑</title>
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; }
        
        .reg-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 450px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.1); }
        
        /* توهج الشعار العلوي النبضي */
        .logo-container img { width: 140px; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); animation: logoPulse 3s infinite; margin-bottom: 10px; }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); } }

        h2 { color: var(--glow); margin-bottom: 25px; font-weight: bold; }
        .step-label { display: block; text-align: right; margin: 15px 25px 5px 0; font-size: 13px; color: #888; }
        
        input { width: 85%; padding: 15px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 16px; outline: none; }
        input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(255,215,0,0.2); }

        /* منطقة الدفع النظيفة والفخمة */
        .pay-box { background: rgba(255, 255, 255, 0.03); border: 2px dashed #444; border-radius: 25px; padding: 25px 20px; margin: 20px 0; }
        
        .pay-item { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 15px; background: #000; padding: 15px; border-radius: 18px; 
            border: 1px solid #222; cursor: pointer; transition: 0.3s;
        }
        .pay-item:hover { border-color: var(--glow); background: rgba(255,215,0,0.05); box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        
        /* تنسيق النصوص بدلاً من الصور */
        .pay-name { font-weight: bold; color: #fff; font-size: 15px; text-align: right; letter-spacing: 0.5px; }
        .pay-num { font-family: monospace; font-size: 17px; color: var(--glow); letter-spacing: 1.5px; text-shadow: 0 0 10px rgba(255,215,0,0.3); }

        .btn-whatsapp { 
            background: #25d366; color: white; border: none; padding: 18px; border-radius: 20px; 
            font-weight: bold; width: 95%; cursor: pointer; font-size: 18px; margin-top: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5); }
        
        /* تلميح النسخ */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #2ecc71; color: white; padding: 10px 20px; border-radius: 10px; display: none; font-size: 14px; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="logo-container"><img

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام | المنصة العالمية 🌍</title>
    <style>
        :root { --glow: #2ecc71; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .logo img { width: 160px; margin-top: 10px; }
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 35px; padding: 30px; max-width: 300px; margin: 20px auto;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.03); box-shadow: 0 0 50px var(--glow); } }
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 15px; }
        .card-ui { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid #1e293b; max-width: 330px; margin: 15px auto; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; margin: 5px; font-size: 16px; width: 70px; }
        .bell-btn { font-size: 60px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 20px #ffd700); transform: scale(1.1); animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(5deg); } 75% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
    </style>
</head>
<body>
    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 style="color:#ffd700;">🔎 دليل صوفيگرام الذكي</h3>
        <input type="text" id="searchInput" placeholder="اكتب الاسم..." style="width: 80%;">
        <button onclick="performSearch()" style="background:#ffd700; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">ابحث الآن</button>
        <div id="searchResults" style="margin-top:20px;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        <div class="number-box"><div class="big-num" id="liveNumber">0</div></div>

        <div class="card-ui">
            <p style="color:#ffd700; font-weight:bold;">🔔 تفعيل "نداء المترو" لرقمتك:</p>
            <input type="number" id="userTarget" placeholder="رقمك">
            <button id="bellIcon" class="bell-btn" onclick="activateMasterAlarm()">🔔</button>
            <p id="alarmStatus" style="font-size:11px; color:#888;">اضغط الجرس لتفعيل التنبيه الصوتي</p>
        </div>
        <button onclick="location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline;">العودة للبحث ↩️</button>
    </div>

    <audio id="silentStream" loop>
        <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isAlarmOn = false;
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                if(isAlarmOn && document.getElementById('userTarget').value == current && current != 0) {
                    triggerFinalVoice();
                    isAlarmOn = false;
                    document.getElementById('bellIcon').classList.remove('bell-active');
                    document.getElementById('silentStream').pause();
                }
            });
        }

        window.activateMasterAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("اكتب رقمك أولاً 🔔");
            
            // البدء بتشغيل الصوت الصامت (مفتاح الحل للآيفون)
            const silent = document.getElementById('silentStream');
            silent.play().then(() => {
                isAlarmOn = true;
                document.getElementById('bellIcon').classList.add('bell-active');
                document.getElementById('alarmStatus').innerText = "🔊 المنبه الصوتي نشط الآن (حتى في الخلفية)";
                alert("تم التفعيل ✅\nالآن يمكنك الخروج من المتصفح، سيبقى الصوت يعمل بفضل 'البث الصامت'.");
            }).catch(e => alert("يرجى السماح بالصوت في المتصفح أولاً"));
        };

        function triggerFinalVoice() {
            if ("vibrate" in navigator) { navigator.vibrate([500, 200, 500]); }
            
            const ar = new SpeechSynthesisUtterance("أهلاً بكم في منصة صوفي غرام العالمية. لقد حان دوركم الآن، يرجى التوجه فوراً. شكراً لكم.");
            ar.lang = 'ar-SA'; ar.rate = 0.8;
            const en = new SpeechSynthesisUtterance("Welcome to Sofygram International. It is your turn now, please proceed. Thank you.");
            en.lang = 'en-US'; en.rate = 0.8;
            
            window.speechSynthesis.speak(ar);
            window.speechSynthesis.speak(en);
        }
    </script>
</body>
</html>

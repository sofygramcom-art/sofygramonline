<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #e74c3c; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; transition: 0.5s; overflow-x: hidden; }
        
        /* شريط اللغات السريع والفخم */
        .lang-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 50px; max-width: fit-content; margin: 0 auto 20px auto; border: 1px solid rgba(255,215,0,0.2); }
        .lang-btn { cursor: pointer; font-size: 22px; transition: 0.3s; filter: grayscale(1); border: 2px solid transparent; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .lang-btn.active { filter: grayscale(0); border-color: #ffd700; transform: scale(1.1); box-shadow: 0 0 15px #ffd700; }

        .logo img { width: 140px; margin-top: 5px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }
        
        /* الهالة الحمراء النبضية */
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 40px; 
            padding: 30px; max-width: 330px; margin: 20px auto;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.02); box-shadow: 0 0 50px var(--glow); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .status-tag { display: inline-block; padding: 10px 30px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 10px; background: rgba(0,0,0,0.4); }
        .note-box { background: rgba(255, 215, 0, 0.1); border: 1px dashed #ffd700; padding: 15px; border-radius: 15px; margin-top: 10px; color: #ffd700; font-weight: bold; font-size: 15px; }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid #1e293b; max-width: 340px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 12px; border: 2px solid #ffd700; background: #000; color: #fff; text-align: center; width: 80px; font-size: 20px; outline: none; }
        .btn-gold { background:#ffd700; color:#000; border:none; padding:15px; border-radius:15px; font-weight:bold; width:95%; cursor:pointer; margin-top:15px; font-size: 16px; }
        .bell-btn { font-size: 60px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="lang-bar">
        <div class="lang-btn active" id="btn-ar" onclick="setLang('ar')">🇮🇶</div>
        <div class="lang-btn" id="btn-en" onclick="setLang('en')">🇺🇸</div>
        <div class="lang-btn" id="btn-fa" onclick="setLang('fa')">🇮🇷</div>
        <div class="lang-btn" id="btn-tr" onclick="setLang('tr')">🇹🇷</div>
    </div>

    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 id="t-stitle" style="color:#ffd700;">🔎 دليل صوفيگرام الذكي</h3>
        <input type="text" id="searchInput" placeholder="...">
        <button id="t-sbtn" onclick="performSearch()" class="btn-gold">بحث الآن</button>
        <div id="searchResults" style="margin-top:20px;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom:5px;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        
        <div class="number-box">
            <p id="t-cur" style="color: #888; font-size: 13px; margin:0;">الرقم الحالي الآن</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" class="note-box"></div>
        </div>

        <div class="card-ui">
            <p id="t-alarm" style="margin:0; color:#ffd700; font-weight: bold;">🔔 منبه ساعة الصفر الذكي</p>
            <input type="number" id="userTarget" placeholder="0">
            <br>
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>
        <button id="t-back" onclick="window.location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer; margin-top:15px;">العودة للبحث</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const dictionary = {
            ar: { stitle: "🔎 دليل صوفيگرام الذكي", sbtn: "بحث الآن", cur: "الرقم الحالي الآن | Current No.", alarm: "🔔 منبه ساعة الصفر الذكي", back: "العودة للبحث ↩️", voice: "أهلاً بكم في صوفي غرام. حان دوركم الآن.", ph: "اكتب الاسم هنا..." },
            en: { stitle: "🔎 Sofygram Smart Guide", sbtn: "Search Now", cur: "Current Number Now", alarm: "🔔 Zero Hour Alarm", back: "Back to Search ↩️", voice: "Welcome to Sofygram. It is your turn now.", ph: "Type name here..." },
            fa: { stitle: "🔎 راهنمای هوشمند صوفی‌گرام", sbtn: "اکنون جستجو کنید", cur: "شماره فعلی اکنون", alarm: "🔔 هشدار ساعت صفر", back: "بازگشت به جستجو ↩️", voice: "به صوفی گرام خوش آمدید. نوبت شماست.", ph: "نام را اینجا تایپ کنید..." },
            tr: { stitle: "🔎 Sofygram Akıllı Rehber", sbtn: "Şimdi Ara", cur: "Şu Anki Numara", alarm: "🔔 Sıfır Saat Alarmı", back: "Aramaya Dön ↩️", voice: "Sofygram'a hoş geldiniz. Şimdi senin sıran.", ph: "İsmi buraya yazın..." }
        };

        let curLang = 'ar';
        let isAlarmReady = false;

        window.setLang = (l) => {
            curLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + l).classList.add('active');
            
            document.getElementById('t-stitle').innerText = dictionary[l].stitle;
            document.getElementById('t-sbtn').innerText = dictionary[l].sbtn;
            document.getElementById('t-cur').innerText = dictionary[l].cur;
            document.getElementById('t-alarm').innerText = dictionary[l].alarm;
            document.getElementById('t-back').innerText = dictionary[l].back;
            document.getElementById('searchInput').placeholder = dictionary[l].ph;
            document.body.dir = (l === 'ar' || l === 'fa') ? 'rtl' : 'ltr';
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                const w = new SpeechSynthesisUtterance("Welcome to Sofygram.");
                w.lang = 'en-US'; w.rate = 0.8; window.speechSynthesis.speak(w);
            }, 1000);
        });

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                const noteBox = document.getElementById('liveNote');
                if(info.note) { noteBox.innerText = info.note; noteBox.style.display = "block"; } else { noteBox.style.display = "none"; }
                
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                if(isAlarmReady && document.getElementById('userTarget').value == current && current != 0) {
                    const msg = new SpeechSynthesisUtterance(dictionary[curLang].voice);
                    msg.lang = (curLang === 'ar') ? 'ar-SA' : (curLang === 'fa' ? 'fa-IR' : (curLang === 'tr' ? 'tr-TR' : 'en-US'));
                    window.speechSynthesis.speak(msg);
                    isAlarmReady = false;
                    document.getElementById('bellIcon').style.filter = "grayscale(1)";
                    alert("Sofygram Alert!");
                }
            });
        }

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("!");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').style.filter = isAlarmReady ? "grayscale(0) drop-shadow(0 0 15px #ffd700)" : "grayscale(1)";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        };
    </script>
</body>
</html>

<div id="searchContainer" style="direction: rtl; text-align: center; padding: 20px; background: #050a14;">
    <input type="text" id="searchInput" placeholder="ابحث عن (أمل، كوخ، زيد، باسم)..." 
           style="width: 85%; padding: 15px; border-radius: 15px; border: 2px solid #ff4500; background: #000; color: #fff; font-size: 16px; outline: none;">
    
    <button onclick="runSearch()" 
            style="margin-top: 15px; width: 90%; padding: 15px; background: #ff4500; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 17px;">
        بحث الآن 🔎
    </button>

    <div id="searchArea" style="margin-top: 20px;"></div>
</div>

<script type="module">
    // استيراد مكتبات الفايربيس
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    // إعدادات القاعدة الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
        authDomain: "sofygramclinic.firebaseapp.com",
        databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
        projectId: "sofygramclinic",
        appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.runSearch = async () => {
        const word = document.getElementById('searchInput').value.trim().toLowerCase();
        const display = document.getElementById('searchArea');
        display.innerHTML = "<p style='color: #aaa;'>جاري البحث...</p>";

        if (!word) {
            display.innerHTML = "<p style='color: #ff4500;'>يرجى كتابة اسم للبحث</p>";
            return;
        }

        try {
            const snap = await get(ref(db, 'users'));
            if (snap.exists()) {
                const users = snap.val();
                display.innerHTML = ""; // تصفير الشاشة
                let count = 0;

                for (let key in users) {
                    const u = users[key];
                    // فحص إذا كان الاسم يحتوي على كلمة البحث
                    if (u.name && u.name.toLowerCase().includes(word)) {
                        count++;
                        
                        // تصليح الرابط: encodeURIComponent يحول الفراغات لكود يفهمه المتصفح
                        const link = "view.html?id=" + encodeURIComponent(key);
                        
                        display.innerHTML += `
                            <div onclick="window.location.href='${link}'" 
                                 style="background: #121212; border: 1px solid #333; padding: 15px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; border-right: 6px solid #ff4500; text-align: right; transition: 0.3s;">
                                <h3 style="color: #ff4500; margin: 0; font-size: 18px;">${u.name}</h3>
                                <p style="color: #00d2ff; font-size: 13px; margin: 8px 0 0 0;">🛰️ اضغط لمتابعة السرا المباشر</p>
                            </div>
                        `;
                    }
                }

                if (count === 0) {
                    display.innerHTML = "<p style='color: yellow;'>لم يتم العثور على نتيجة بهذا الاسم</p>";
                }
            }
        } catch (e) {
            display.innerHTML = "<p style='color: red;'>خطأ في الاتصال بالقاعدة</p>";
        }
    };
</script>

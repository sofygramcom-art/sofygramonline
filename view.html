<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Multi-Track | صوفيگرام الذكي 🌍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; padding-bottom: 140px; }
        
        .logo img { width: 150px; margin-top: 15px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }

        /* شريط المهام السفلي للبطاقات */
        #multiSessionContainer { 
            position: fixed; bottom: 15px; left: 0; width: 100%; 
            display: flex; flex-wrap: nowrap; overflow-x: auto; 
            padding: 10px 20px; gap: 15px; z-index: 3000; justify-content: flex-start;
            scrollbar-width: none; 
        }
        #multiSessionContainer::-webkit-scrollbar { display: none; }

        .mini-card { 
            min-width: 140px; background: rgba(18, 18, 18, 0.95); 
            border: 2px solid #ffd700; border-radius: 20px; padding: 12px; 
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .mini-card:nth-child(1) { border-color: #ffd700; }
        .mini-card:nth-child(2) { border-color: #3498db; }
        .mini-card:nth-child(3) { border-color: #2ecc71; }
        .mini-card:nth-child(4) { border-color: #9b59b6; }

        .mc-name { font-size: 13px; font-weight: bold; margin: 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mc-num { font-size: 35px; font-weight: bold; margin: 5px 0; }
        .mc-close { position: absolute; top: -10px; right: -10px; background: #fff; color: #000; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; }

        /* واجهة العرض والبحث */
        .number-box { background: #121212; border: 3px solid var(--glow); border-radius: 45px; padding: 35px; max-width: 320px; margin: 20px auto; box-shadow: 0 0 30px var(--glow); }
        .big-num { font-size: 115px; font-weight: bold; margin: 5px 0; color: #fff; }
        .card-ui { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 35px; border: 1px solid #1e293b; max-width: 350px; margin: 20px auto; }
        
        input { padding: 15px; border-radius: 15px; border: 2px solid #ff4500; background: #000; color: #fff; text-align: center; width: 85%; font-size: 18px; outline: none; margin-bottom: 10px; }
        .btn-gold { background:#ff4500; color:#fff; border:none; padding:18px; border-radius:18px; font-weight:bold; width:95%; cursor:pointer; font-size: 18px; margin-top: 10px; }
        
        .bell-btn { font-size: 70px; background: none; border: none; filter: grayscale(1); cursor: pointer; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 20px #ffd700); animation: ring 1s infinite; }
        
        /* نتائج البحث */
        .res-item { background: #1a1a2e; padding:15px; border-radius: 15px; margin-bottom: 10px; cursor:pointer; color:#fff; text-align: right; border-right: 5px solid #ff4500; }
        
        @keyframes ring { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    </style>
</head>
<body>

    <div id="multiSessionContainer"></div>
    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h2 style="color:#ff4500; margin-bottom: 5px;">🔎 بحث صوفيگرام الذكي</h2>
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 10px;">
            <input type="text" id="searchInput" placeholder="ابحث بالاسم أو بالصوت...">
            <button onclick="startVoiceSearch()" style="background: none; border: none; font-size: 30px; cursor: pointer;">🎙️</button>
        </div>
        <button onclick="performSearch()" class="btn-gold">بحث الآن</button>
        <div id="searchResults" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700;"></h2>
        <div id="statusTag" style="display:inline-block; padding:8px 30px; border-radius:50px; font-size:15px; border:2px solid var(--glow); color:var(--glow); margin-bottom:10px;">--</div>
        
        <div class="number-box">
            <p style="color:#888; font-size:14px; margin:0;">الرقم الحالي</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" style="background:rgba(255,215,0,0.1); border:1px dashed #ffd700; padding:12px; border-radius:15px; margin-top:10px; color:#ffd700; font-weight:bold; display:none;"></div>
        </div>

        <div class="card-ui">
            <p style="color:#ffd700; font-weight:bold;">🔔 منبه ساعة الصفر</p>
            <input type="number" id="userTarget" placeholder="رقمك" style="width: 80px; border-color:#ffd700;">
            <br>
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>
        
        <button class="btn-gold" style="background:rgba(255,255,255,0.05); color:#888; border:1px solid #333;" onclick="showSearch()">🔍 البحث عن نشاط آخر</button>
    </div>

            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            addToSessions(id); startTracking(id);
        }

        window.showSearch = () => {
            document.getElementById('livePage').style.display = 'none';
            document.getElementById('searchPage').style.display = 'block';
        };

        // البحث الصوتي
        window.startVoiceSearch = () => {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'ar-SA'; rec.start();
            rec.onresult = (e) => {
                document.getElementById('searchInput').value = e.results[0][0].transcript;
                performSearch();
            };
        };

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #2ecc71; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; }
        
        /* شريط اختيار اللغة الفخم */
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 50px; }
        .lang-btn { cursor: pointer; font-size: 20px; transition: 0.3s; filter: grayscale(1); border: 2px solid transparent; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .lang-btn.active { filter: grayscale(0); border-color: #ffd700; transform: scale(1.2); box-shadow: 0 0 10px #ffd700; }

        .logo img { width: 140px; margin-top: 5px; }
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 35px; 
            padding: 25px; max-width: 320px; margin: 15px auto;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 10px; }
        .note-box { background: rgba(255,215,0,0.1); border: 1px dashed #ffd700; padding: 12px; border-radius: 15px; margin-top: 10px; color: #ffd700; font-weight: bold; }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid #1e293b; max-width: 330px; margin: 15px auto; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; width: 70px; font-size: 18px; }
        .bell-btn { font-size: 55px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 15px #ffd700); }
    </style>
</head>
<body>
    <div class="lang-bar">
        <div class="lang-btn active" onclick="setLang('ar')" title="العربية">🇮🇶</div>
        <div class="lang-btn" onclick="setLang('en')" title="English">🇺🇸</div>
        <div class="lang-btn" onclick="setLang('fa')" title="فارسی">🇮🇷</div>
        <div class="lang-btn" onclick="setLang('tr')" title="Türkçe">🇹🇷</div>
    </div>

    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 id="txt-search-title" style="color:#ffd700;">🔎 دليل صوفيگرام الذكي</h3>
        <input type="text" id="searchInput" placeholder="..." style="width: 80%;">
        <button id="txt-search-btn" onclick="performSearch()" style="background:#ffd700; color:#000; border:none; padding:12px; border-radius:12px; font-weight:bold; margin-top:10px; width:85%; cursor:pointer;">بحث</button>
        <div id="searchResults" style="margin-top:20px;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom:5px;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        
        <div class="number-box">
            <p id="txt-current-no" style="color: #888; font-size: 13px; margin:0;">الرقم الحالي الآن</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" class="note-box"></div>
        </div>

        <div class="card-ui">
            <p id="txt-alarm-title" style="margin:0; color:#ffd700; font-weight: bold;">🔔 منبه ساعة الصفر الذكي</p>
            <input type="number" id="userTarget" placeholder="0">
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>
        <button id="txt-back" onclick="window.location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer; margin-top:15px;">العودة للبحث</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // قاموس اللغات العالمي
        const langData = {
            ar: { searchTitle: "🔎 دليل صوفيگرام الذكي", searchBtn: "بحث الآن", currentNo: "الرقم الحالي الآن", alarmTitle: "🔔 منبه ساعة الصفر الذكي", back: "العودة للبحث ↩️", placeholder: "اكتب الاسم...", voice: "أهلاً بكم في صوفي غرام. حان دوركم الآن." },
            en: { searchTitle: "🔎 Sofygram Smart Guide", searchBtn: "Search Now", currentNo: "Current Number Now", alarmTitle: "🔔 Zero Hour Alarm", back: "Back to Search ↩️", placeholder: "Type name...", voice: "Welcome to Sofygram. It is your turn now." },
            fa: { searchTitle: "🔎 راهنمای هوشمند صوفی‌گرام", searchBtn: "اکنون جستجو کنید", currentNo: "شماره فعلی اکنون", alarmTitle: "🔔 هشدار ساعت صفر", back: "بازگشت به جستجو ↩️", placeholder: "نام را تایپ کنید...", voice: "به صوفی گرام خوش آمدید. نوبت شماست." },
            tr: { searchTitle: "🔎 Sofygram Akıllı Rehber", searchBtn: "Şimdi Ara", currentNo: "Şu Anki Numara", alarmTitle: "🔔 Sıfır Saat Alarmı", back: "Aramaya Dön ↩️", placeholder: "İsim yazın...", voice: "Sofygram'a hoş geldiniz. Şimdi senin sıran." }
        };

        let currentLang = 'ar';
        let isAlarmReady = false;

        window.setLang = (l) => {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // تحديث النصوص
            document.getElementById('txt-search-title').innerText = langData[l].searchTitle;
            document.getElementById('txt-search-btn').innerText = langData[l].searchBtn;
            document.getElementById('txt-current-no').innerText = langData[l].currentNo;
            document.getElementById('txt-alarm-title').innerText = langData[l].alarmTitle;
            document.getElementById('txt-back').innerText = langData[l].back;
            document.getElementById('searchInput').placeholder = langData[l].placeholder;
            
            // تغيير اتجاه الصفحة
            document.body.dir = (l === 'en' || l === 'tr') ? 'ltr' : 'rtl';
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                document.getElementById('liveNote').innerText = info.note || "";
                
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                if(isAlarmReady && document.getElementById('userTarget').value == current && current != 0) {
                    const msg = new SpeechSynthesisUtterance(langData[currentLang].voice);
                    msg.lang = currentLang === 'ar' ? 'ar-SA' : (currentLang === 'fa' ? 'fa-IR' : (currentLang === 'tr' ? 'tr-TR' : 'en-US'));
                    window.speechSynthesis.speak(msg);
                    isAlarmReady = false;
                    document.getElementById('bellIcon').classList.remove('bell-active');
                    alert("🔔 Sofygram Alert!");
                }
            });
        }

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("!");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').classList.toggle('bell-active');
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        };
    </script>
</body>
</html>

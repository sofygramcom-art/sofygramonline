<audio id="megaAlarm" preload="auto">
    <source src="https://f.top4top.io/m_26368p3o71.mp3" type="audio/mpeg">
    </audio>

<script>
function triggerFinalVoice() {
    // 1. الاهتزاز القوي
    if ("vibrate" in navigator) { navigator.vibrate([500, 200, 500, 200, 500]); }
    
    // 2. تشغيل ملف الصوت المسجل (أكثر استقراراً في الموبايل)
    const audio = document.getElementById('megaAlarm');
    audio.play().catch(e => {
        // إذا فشل التشغيل التلقائي، نستخدم النداء الاحتياطي
        const msg = new SpeechSynthesisUtterance("حان دورك الآن في صوفي غرام");
        window.speechSynthesis.speak(msg);
    });

    // 3. إظهار رسالة تنبيه منبثقة تجبر المستخدم على الانتباه
    alert("🔔 صوفيگرام: وصل دورك الآن! يرجى التوجه فوراً.");
}
</script>

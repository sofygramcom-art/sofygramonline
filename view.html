<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Live | صوفيگرام المباشر 🌍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #e74c3c; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; padding-bottom: 140px; }
        
        .logo img { width: 120px; margin-top: 15px; }

        /* شريط التتبع السفلي */
        #multiSessionContainer { position: fixed; bottom: 15px; left: 0; width: 100%; display: flex; flex-wrap: nowrap; overflow-x: auto; padding: 10px 20px; gap: 15px; z-index: 3000; justify-content: flex-start; scrollbar-width: none; }
        #multiSessionContainer::-webkit-scrollbar { display: none; }

        .mini-card { min-width: 130px; background: rgba(18, 18, 18, 0.95); border: 2px solid #ffd700; border-radius: 20px; padding: 12px; position: relative; cursor: pointer; text-align: center; }
        .mc-name { font-size: 11px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mc-num { font-size: 30px; font-weight: bold; margin: 5px 0; color: #ffd700; }
        .mc-close { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        /* واجهة العرض */
        .number-box { background: #121212; border: 3px solid var(--glow); border-radius: 45px; padding: 30px; max-width: 300px; margin: 20px auto; box-shadow: 0 0 25px var(--glow); }
        .big-num { font-size: 100px; font-weight: bold; margin: 5px 0; color: #fff; }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid #1e293b; max-width: 340px; margin: 15px auto; }
        input { padding: 12px; border-radius: 12px; border: 2px solid #ffd700; background: #000; color: #fff; text-align: center; width: 80%; font-size: 18px; outline: none; }
        
        .btn-gold { background:#ffd700; color:#000; border:none; padding:15px; border-radius:15px; font-weight:bold; width:90%; cursor:pointer; font-size: 16px; margin-top: 10px; }
        .btn-map { background: #3498db; color: white; text-decoration: none; display: inline-block; padding: 12px; border-radius: 12px; width: 85%; margin-top: 10px; font-weight: bold; }
        
        .bell-btn { font-size: 60px; background: none; border: none; filter: grayscale(1); cursor: pointer; transition: 0.3s; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 15px #ffd700); animation: ring 1s infinite; }
        
        @keyframes ring { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        .res-item { padding:15px; border-bottom:1px solid #222; cursor:pointer; color:#fff; text-align: right; }
        
        /* زر الإدارة المخفي */
        .admin-footer { margin-top: 40px; opacity: 0.3; transition: 0.3s; }
        .admin-footer:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="multiSessionContainer"></div>
    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h2 style="color:#ffd700;">🔎 دليل صوفيگرام الذكي</h2>
        <input type="text" id="searchInput" placeholder="ابحث عن طبيب أو صيدلية...">
        <button onclick="performSearch()" class="btn-gold">بحث الآن</button>
        <div id="searchResults" style="margin-top:15px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom:5px;"></h2>
        <div id="timeStatus" style="font-size: 13px; color: #aaa; margin-bottom: 10px;"></div>
        <div id="statusTag" style="display:inline-block; padding:5px 20px; border-radius:50px; font-size:14px; border:2px solid var(--glow); color:var(--glow); background:rgba(0,0,0,0.5);">--</div>
        
        <div class="number-box">
            <p style="color:#888; font-size:12px; margin:0;">الرقم الحالي الآن</p>
            <div class="big-num" id="liveNumber">0</div>
        </div>

        <div class="card-ui">
            <p style="margin:0; color:#ffd700; font-weight:bold;">🔔 منبه وصول الدور</p>
            <input type="number" id="userTarget" placeholder="ادخل رقمك">
            <br>
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>

        <a id="gpsBtn" href="#" target="_blank" class="btn-map" style="display:none;">
            <i class="fas fa-directions"></i> الذهاب إلى الموقع (خرائط جوجل)
        </a>

        <button class="btn-gold" style="background:#222; color:#888; margin-top:20px;" onclick="location.href='view.html'">🔍 بحث عن آخر</button>

        <div class="admin-footer">
            <button onclick="openAdmin()" style="background:none; border:1px solid #333; color:#444; padding:5px 10px; border-radius:8px; font-size:10px;">إدارة النشاط ⚙️</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeSessions = JSON.parse(localStorage.getItem('sofygramSessions')) || [];
        let isAlarmReady = false;
        let currentUserData = null; // لحفظ بيانات الطبيب الحالي

        window.addEventListener('load', () => { renderMultiCards(); });

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            addToSessions(id);
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div class="res-item" onclick="window.location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                currentUserData = info; // حفظ البيانات للإدارة
                
                document.getElementById('liveNumber').innerText = info.currentNum || 0;
                document.getElementById('clinicName').innerText = info.name;
                
                // عرض ساعات العمل
                if(info.openTime) {
                    document.getElementById('timeStatus').innerText = `ساعات العمل: من ${info.openTime} إلى ${info.closeTime}`;
                }

                // تفعيل زر الموقع إذا وجد
                if(info.lat && info.lng) {
                    const btn = document.getElementById('gpsBtn');
                    btn.href = `https://www.google.com/maps?q=${info.lat},${info.lng}`;
                    btn.style.display = "inline-block";
                }

                // نظام الألوان للحالة
                const root = document.documentElement;
                if(info.isOpen === true || info.isOpen === "true") {
                    document.getElementById('statusTag').innerText = "مفتوح الآن ✅";
                    root.style.setProperty('--glow', '#2ecc71');
                } else {
                    document.getElementById('statusTag').innerText = "مغلق حالياً ❌";
                    root.style.setProperty('--glow', '#e74c3c');
                }

                if(isAlarmReady && document.getElementById('userTarget').value == info.currentNum) {
                    triggerBilingualAlarm();
                    isAlarmReady = false;
                    document.getElementById('bellIcon').classList.remove('bell-active');
                }
            });
        }

        // وظيفة الدخول للإدارة
        window.openAdmin = () => {
            const p = prompt("أدخل كلمة المرور للإدارة:");
            if(p && currentUserData && p === currentUserData.pass) {
                window.location.href = `admin_panel.html?id=${id}`;
            } else {
                alert("كلمة المرور غير صحيحة!");
            }
        };

        // --- بقية وظائف التتبع الأصلية ---
        function addToSessions(newId) {
            if (!activeSessions.includes(newId)) {
                if (activeSessions.length >= 4) activeSessions.shift();
                activeSessions.push(newId);
                localStorage.setItem('sofygramSessions', JSON.stringify(activeSessions));
            }
        }

        function renderMultiCards() {
            const container = document.getElementById('multiSessionContainer');
            if (activeSessions.length === 0) return;
            container.innerHTML = "";
            activeSessions.forEach(sid => {
                get(ref(db, 'users/' + sid)).then(snap => {
                    const info = snap.val(); if(!info) return;
                    const card = document.createElement('div');
                    card.className = 'mini-card';
                    card.onclick = () => location.href = '?id=' + sid;
                    card.innerHTML = `<div class="mc-close" onclick="removeSession(event,'${sid}')">×</div>
                        <p class="mc-name">${info.name}</p><div class="mc-num" id="num-${sid}">${info.currentNum || 0}</div>`;
                    container.appendChild(card);
                    onValue(ref(db, `users/${sid}/currentNum`), s => {
                        const n = document.getElementById(`num-${sid}`); if(n) n.innerText = s.val() || 0;
                    });
                });
            });
        }

        window.removeSession = (e, sid) => {
            e.stopPropagation();
            activeSessions = activeSessions.filter(i => i !== sid);
            localStorage.setItem('sofygramSessions', JSON.stringify(activeSessions));
            renderMultiCards();
        };

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("يرجى إدخال رقمك 🔔");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').classList.toggle('bell-active');
        };

        function triggerBilingualAlarm() {
            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
            const msg = new SpeechSynthesisUtterance("حان دوركم الآن في صوفي غرام. يرجى التوجه للعيادة.");
            msg.lang = 'ar-SA'; window.speechSynthesis.speak(msg);
            alert("🔔 صوفيگرام: حان دورك الآن!");
        }
    </script>
</body>
</html>

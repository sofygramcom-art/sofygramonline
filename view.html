<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #e74c3c; } /* الأحمر الناري المودرن */
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; }
        
        /* أيقونة الكرة الأرضية لاختيار اللغة */
        .lang-icon { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 24px; color: #ffd700; transition: 0.3s; z-shadow: 0 0 10px #ffd700; }
        .lang-icon:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px #ffd700); }

        /* الشعار المتوهج */
        .logo img { width: 140px; margin-top: 10px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); animation: logoGlow 3s infinite; }
        @keyframes logoGlow { 0%, 100% { filter: drop-shadow(0 0 8px rgba(255,215,0,0.3)); } 50% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); } }

        /* الهالة الضوئية النبضية */
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 35px; 
            padding: 25px; max-width: 320px; margin: 15px auto;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.02); box-shadow: 0 0 45px var(--glow); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 10px; }
        .note-box { background: rgba(255,215,0,0.1); border: 1px dashed #ffd700; padding: 12px; border-radius: 15px; margin-top: 10px; color: #ffd700; font-weight: bold; }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid #1e293b; max-width: 330px; margin: 15px auto; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; width: 70px; font-size: 18px; }
        .bell-btn { font-size: 55px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 15px #ffd700); }
    </style>
</head>
<body>
    <div class="lang-icon" onclick="openLangMenu()">🌐</div>

    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 id="txt-search-title" style="color:#ffd700; margin-top:0;">🔎 دليل صوفيگرام الذكي</h3>
        <input type="text" id="searchInput" placeholder="اكتب الاسم هنا..." style="width: 80%;">
        <button id="txt-search-btn" onclick="performSearch()" style="background:#ffd700; color:#000; border:none; padding:12px; border-radius:12px; font-weight:bold; margin-top:10px; width:85%; cursor:pointer;">بحث</button>
        <div id="searchResults" style="margin-top:20px;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom:5px;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        
        <div class="number-box">
            <p id="txt-current-no" style="color: #888; font-size: 13px; margin:0;">الرقم الحالي الآن | Current No.</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" class="note-box"></div>
        </div>

        <div class="card-ui">
            <p id="txt-alarm-title" style="margin:0; color:#ffd700; font-weight: bold;">🔔 منبه ساعة الصفر الذكي</p>
            <input type="number" id="userTarget" placeholder="0">
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>
        <button id="txt-back" onclick="window.location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer; margin-top:15px;">العودة للبحث ↩️</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isAlarmReady = false;

        // دالة الترحيب الصوتية عند الفتح
        window.addEventListener('load', () => {
            // خدعة تقنية: تشغيل نداء صامت لتنشيط الصوت في الموبايلات
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            
            setTimeout(() => {
                const welcomeMsg = new SpeechSynthesisUtterance("Welcome to Sofygram. The world's first calling application.");
                welcomeMsg.lang = 'en-US';
                welcomeMsg.rate = 0.8; // سرعة هادئة وفخمة
                welcomeMsg.volume = 1.0;
                window.speechSynthesis.speak(welcomeMsg);
            }, 1000); // تأخير بسيط لضمان تحميل الصفحة
        });

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) {
                if(data[key].name.toLowerCase().includes(val)) {
                    resDiv.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
                }
            }
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val();
                if(!info) return;
                
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                document.getElementById('liveNote').innerText = info.note || "";
                
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                
                // تحديث الألوان النبضية (أحمر ناري)
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71'); // أخضر للمفتوح
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f'); // أصفر للقريب
                else root.style.setProperty('--glow', '#e74c3c'); // أحمر ناري للمغلق

                // تشغيل التنبيه الصوتي والاهتزاز
                if(isAlarmReady && document.getElementById('userTarget').value == current && current != 0) {
                    triggerMegaAlarm();
                    isAlarmReady = false;
                    document.getElementById('bellIcon').classList.remove('bell-active');
                }
            });
        }

        async function triggerMegaAlarm() {
            if ("vibrate" in navigator) { navigator.vibrate([500, 200, 500, 200, 500]); }
            
            const ar = new SpeechSynthesisUtterance("أهلاً بكم في منصة صوفي غرام العالمية. لقد حان دوركم الآن، يرجى التوجه فوراً. شكراً لكم.");
            ar.lang = 'ar-SA'; ar.rate = 0.8;
            const en = new SpeechSynthesisUtterance("Welcome to Sofygram International. It is your turn now, please proceed. Thank you.");
            en.lang = 'en-US'; en.rate = 0.8;
            
            window.speechSynthesis.speak(ar);
            window.speechSynthesis.speak(en);
            alert("🔔 صوفيگرام: حان دورك الآن!");
        }

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("اكتب رقمك!");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').classList.toggle('bell-active');
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); // لتنشيط الصوت في آيفون وأندرويد
        };

        window.openLangMenu = () => {
            alert("قائمة اللغات قيد التطوير. حالياً ندعم العربية والإنجليزية كجزء أساسي من التصميم.");
        };
    </script>
</body>
</html>

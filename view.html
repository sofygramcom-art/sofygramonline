<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #e74c3c; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; }
        
        /* حاوية اللغات مع مسافة أمان عن الحواف */
        .lang-container { position: absolute; top: 20px; left: 20px; text-align: left; z-index: 1000; transition: 0.3s; }
        .lang-icon { cursor: pointer; font-size: 32px; filter: drop-shadow(0 0 8px #ffd700); transition: 0.3s; }
        .lang-icon:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px #ffd700); }
        
        .lang-menu { display: none; background: #121212; border: 1px solid #ffd700; border-radius: 15px; padding: 10px; position: absolute; top: 45px; left: 0; width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .lang-item:last-child { border-bottom: none; }
        .lang-item:hover { background: rgba(255,215,0,0.1); color: #ffd700; }

        /* الشعار المتوهج */
        .logo img { width: 145px; margin-top: 15px; filter: drop-shadow(0 0 12px rgba(255,215,0,0.4)); animation: logoPulse 3s infinite; }
        @keyframes logoPulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); transform: scale(1); } 50% { filter: drop-shadow(0 0 25px rgba(255,215,0,0.6)); transform: scale(1.02); } }

        /* الهالة الحمراء المودرن */
        .number-box { 
            background: #0f141e; border: 2px solid var(--glow); border-radius: 40px; padding: 30px; 
            max-width: 330px; margin: 20px auto; box-shadow: 0 0 35px var(--glow); animation: glowPulse 2s infinite; 
        }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 25px var(--glow); } 50% { box-shadow: 0 0 55px var(--glow); } }
        
        .big-num { font-size: 115px; font-weight: bold; margin: 5px 0; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .status-tag { display: inline-block; padding: 10px 30px; border-radius: 60px; font-size: 16px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 15px; background: rgba(0,0,0,0.3); }
        .note-box { background: rgba(255,215,0,0.08); border: 1px dashed #ffd700; padding: 15px; border-radius: 18px; margin-top: 12px; color: #ffd700; font-weight: bold; font-size: 15px; line-height: 1.5; }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid #1e293b; max-width: 340px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 14px; border-radius: 15px; border: 2px solid #ffd700; background: #000; color: #fff; text-align: center; width: 85px; font-size: 20px; outline: none; }
        .btn-gold { background:#ffd700; color:#000; border:none; padding:15px; border-radius:15px; font-weight:bold; width:95%; cursor:pointer; margin-top:15px; font-size: 16px; transition: 0.3s; }
        .btn-gold:hover { background: #ffea00; transform: translateY(-2px); }
        .bell-icon-btn { background: none; border: none; font-size: 65px; cursor: pointer; transition: 0.4s; filter: grayscale(1); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="lang-container" id="lContainer">
        <div class="lang-icon" onclick="toggleMenu()">🌐</div>
        <div class="lang-menu" id="lMenu">
            <div class="lang-item" onclick="setLang('ar')">🇮🇶 العربية</div>
            <div class="lang-item" onclick="setLang('en')">🇺🇸 English</div>
            <div class="lang-item" onclick="setLang('fa')">🇮🇷 فارسی</div>
            <div class="lang-item" onclick="setLang('tr')">🇹🇷 Türkçe</div>
            <div class="lang-item" onclick="setLang('sv')">🇸🇪 Svenska</div>
            <div class="lang-item" onclick="setLang('de')">🇩🇪 Deutsch</div>
            <div class="lang-item" onclick="setLang('fr')">🇫🇷 Français</div>
        </div>
    </div>

    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 id="t-stitle" style="color:#ffd700;">🔎 دليل صوفيگرام الذكي</h3>
        <input type="text" id="searchInput" placeholder="..." style="width: 85%;">
        <button id="t-sbtn" onclick="performSearch()" class="btn-gold">بحث الآن</button>
        <div id="searchResults" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom: 5px;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        
        <div class="number-box">
            <p id="t-cur" style="color:#888; font-size:14px; margin:0;">الرقم الحالي الآن</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" class="note-box"></div>
        </div>

        <div class="card-ui">
            <p id="t-alarm" style="margin:0; color:#ffd700; font-weight:bold; font-size: 15px;">🔔 منبه ساعة الصفر الذكي</p>
            <p style="font-size: 11px; color: #666; margin: 5px 0;">أدخل رقمك وسنوافيك بالنداء</p>
            <input type="number" id="userTarget" placeholder="0">
            <br>
            <button onclick="toggleAlarm()" class="bell-icon-btn" id="bellIcon">🔔</button>
        </div>
        
        <button id="t-back" onclick="location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer; margin-top:20px; font-size: 14px;">العودة للبحث</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const dictionary = {
            ar: { stitle: "🔎 دليل صوفيگرام الذكي", sbtn: "بحث الآن", cur: "الرقم الحالي الآن | Current No.", alarm: "🔔 منبه ساعة الصفر الذكي", back: "العودة للبحث ↩️", voice: "أهلاً بكم في صوفي غرام. حان دوركم الآن، يرجى التوجه فوراً.", ph: "اكتب الاسم هنا..." },
            en: { stitle: "🔎 Sofygram Smart Guide", sbtn: "Search Now", cur: "Current Number Now", alarm: "🔔 Zero Hour Alarm", back: "Back to Search ↩️", voice: "Welcome to Sofygram. It is your turn now, please proceed.", ph: "Type name here..." },
            fa: { stitle: "🔎 راهنمای هوشمند صوفی‌گرام", sbtn: "اکنون جستجو کنید", cur: "شماره فعلی اکنون", alarm: "🔔 هشدار ساعت صفر", back: "بازگشت به جستجو ↩️", voice: "به صوفی گرام خوش آمدید. نوبت شماست، لطفا تشریف بیاورید.", ph: "نام را اینجا تایپ کنید..." },
            tr: { stitle: "🔎 Sofygram Akıllı Rehber", sbtn: "Şimdi Ara", cur: "Şu Anki Numara", alarm: "🔔 Sıfır Saat Alarmı", back: "Aramaya Dön ↩️", voice: "Sofygram'a hoş geldiniz. Şimdi senin sıran, lütfen devam et.", ph: "İsmi buraya yazın..." },
            sv: { stitle: "🔎 Sofygram Smart Guide", sbtn: "Sök nu", cur: "Aktuellt nummer nu", alarm: "🔔 Noll-timme larm", back: "Tillbaka till sök ↩️", voice: "Välkommen till Sofygram. Det är din tur nu, vänligen fortsätt.", ph: "Skriv namn här..." },
            de: { stitle: "🔎 Sofygram Smart Guide", sbtn: "Jetzt suchen", cur: "Aktuelle Nummer jetzt", alarm: "🔔 Nullstunden-Alarm", back: "Zurück zur Suche ↩️", voice: "Willkommen bei Sofygram. Du bist an der Reihe, bitte komm.", ph: "Namen hier eingeben..." },
            fr: { stitle: "🔎 Sofygram Guide Intelligent", sbtn: "Rechercher", cur: "Numéro actuel", alarm: "🔔 Alarme Heure Zéro", back: "Retour à la recherche ↩️", voice: "Bienvenue sur Sofygram. C'est ton tour, s'il vous plaît avancez.", ph: "Tapez le nom ici..." }
        };

        let curLang = 'ar';
        let isAlarmReady = false;

        window.toggleMenu = () => { 
            const m = document.getElementById('lMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.setLang = (l) => {
            curLang = l;
            document.getElementById('lMenu').style.display = 'none';
            document.getElementById('t-stitle').innerText = dictionary[l].stitle;
            document.getElementById('t-sbtn').innerText = dictionary[l].sbtn;
            document.getElementById('t-cur').innerText = dictionary[l].cur;
            document.getElementById('t-alarm').innerText = dictionary[l].alarm;
            document.getElementById('t-back').innerText = dictionary[l].back;
            document.getElementById('searchInput').placeholder = dictionary[l].ph;
            
            // ضبط الاتجاه ومسافة الأمان
            const isRtl = (l === 'ar' || l === 'fa');
            document.body.dir = isRtl ? 'rtl' : 'ltr';
            const container = document.getElementById('lContainer');
            if(isRtl) {
                container.style.left = '20px'; container.style.right = 'auto';
            } else {
                container.style.right = '20px'; container.style.left = 'auto';
            }
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                const w = new SpeechSynthesisUtterance("Welcome to Sofygram.");
                w.lang = 'en-US'; w.rate = 0.8; window.speechSynthesis.speak(w);
            }, 1000);
        });

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                const noteBox = document.getElementById('liveNote');
                if(info.note) { noteBox.innerText = info.note; noteBox.style.display = "block"; } else { noteBox.style.display = "none"; }
                
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                if(isAlarmReady && document.getElementById('userTarget').value == current && current != 0) {
                    const msg = new SpeechSynthesisUtterance(dictionary[curLang].voice);
                    msg.lang = (curLang === 'ar') ? 'ar-SA' : (curLang === 'fa' ? 'fa-IR' : (curLang === 'tr' ? 'tr-TR' : 'en-US'));
                    window.speechSynthesis.speak(msg);
                    isAlarmReady = false;
                    document.getElementById('bellIcon').style.filter = "grayscale(1)";
                    alert("Sofygram Alert!");
                }
            });
        }

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("يرجى إدخال رقمك أولاً 🔔");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').style.filter = isAlarmReady ? "grayscale(0) drop-shadow(0 0 20px #ffd700)" : "grayscale(1)";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        };
    </script>
</body>
</html>

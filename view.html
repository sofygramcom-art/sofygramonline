<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #e74c3c; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; }
        
        /* أيقونة الكرة الأرضية في الزاوية */
        .lang-container { position: absolute; top: 15px; left: 15px; z-index: 1000; }
        .lang-icon { cursor: pointer; font-size: 30px; filter: drop-shadow(0 0 8px #ffd700); transition: 0.3s; }
        .lang-menu { display: none; background: #121212; border: 1px solid #ffd700; border-radius: 15px; padding: 10px; position: absolute; top: 40px; left: 0; width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 10px; text-align: right; }
        .lang-item:hover { background: rgba(255,215,0,0.1); color: #ffd700; }

        .logo img { width: 140px; margin-top: 15px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }

        /* الهالة الحمراء النبضية */
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 40px; padding: 25px; 
            max-width: 320px; margin: 15px auto; box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.02); box-shadow: 0 0 45px var(--glow); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 10px; background: rgba(0,0,0,0.4); }
        .note-box { background: rgba(255, 215, 0, 0.1); border: 1px dashed #ffd700; padding: 12px; border-radius: 15px; margin-top: 10px; color: #ffd700; font-weight: bold; font-size: 15px; }

        .card-ui { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid #1e293b; max-width: 340px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 12px; border: 2px solid #ffd700; background: #000; color: #fff; text-align: center; width: 85%; font-size: 18px; outline: none; margin-bottom: 10px; }
        .btn-gold { background:#ffd700; color:#000; border:none; padding:15px; border-radius:12px; font-weight:bold; width:95%; cursor:pointer; font-size: 16px; margin-top: 5px; }
        .bell-btn { font-size: 60px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; }
    </style>
</head>
<body>
    <div class="lang-container" id="lContainer">
        <div class="lang-icon" onclick="toggleMenu()">🌐</div>
        <div class="lang-menu" id="lMenu">
            <div class="lang-item" onclick="setLang('ar')">🇮🇶 العربية</div>
            <div class="lang-item" onclick="setLang('en')">🇺🇸 English</div>
            <div class="lang-item" onclick="setLang('fa')">🇮🇷 فارسی</div>
            <div class="lang-item" onclick="setLang('tr')">🇹🇷 Türkçe</div>
            <div class="lang-item" onclick="setLang('de')">🇩🇪 Deutsch</div>
            <div class="lang-item" onclick="setLang('sv')">🇸🇪 Svenska</div>
        </div>
    </div>

    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h2 id="t-stitle" style="color:#ffd700; margin-bottom: 5px;">🔎 دليل صوفيگرام العالمي</h2>
        <p id="t-sdesc" style="font-size: 13px; color: #bbb; margin-bottom: 20px;">ابحث عن (طبيب، حلاق، مطعم، أو أي نشاط تجاري) لمتابعة دورك.</p>
        <input type="text" id="searchInput" placeholder="اكتب الاسم هنا...">
        <button id="t-sbtn" onclick="performSearch()" class="btn-gold">بحث الآن | Search Now</button>
        <div id="searchResults" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        <div class="number-box">
            <p id="t-cur" style="color:#888; font-size:13px; margin:0;">الرقم الحالي الآن</p>
            <div class="big-num" id="liveNumber">0</div>
            <div id="liveNote" class="note-box"></div>
        </div>
        <div class="card-ui">
            <p id="t-alarm" style="margin:0; color:#ffd700; font-weight:bold;">🔔 منبه ساعة الصفر الذكي</p>
            <input type="number" id="userTarget" placeholder="0" style="width: 70px;">
            <br>
            <button id="bellIcon" class="bell-btn" onclick="toggleAlarm()">🔔</button>
        </div>
        <button id="t-back" onclick="location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer;">العودة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const dict = {
            ar: { stitle: "🔎 دليل صوفيگرام العالمي", sdesc: "ابحث عن (طبيب، حلاق، مطعم، أو أي نشاط تجاري) لمتابعة دورك.", sbtn: "بحث الآن", cur: "الرقم الحالي الآن", alarm: "🔔 منبه ساعة الصفر الذكي", back: "العودة للبحث ↩️", ph: "اكتب الاسم هنا..." },
            en: { stitle: "🔎 Sofygram Global Guide", sdesc: "Search for (Doctor, Barber, Restaurant, or business) to track your turn.", sbtn: "Search Now", cur: "Current Number Now", alarm: "🔔 Zero Hour Alarm", back: "Back to Search ↩️", ph: "Type name here..." },
            fa: { stitle: "🔎 راهنمای جهانی صوفی‌گرام", sdesc: "برای پیگیری نوبت خود (دکتر، آرایشگر، رستوران) را جستجو کنید.", sbtn: "جستجو", cur: "شماره فعلی", alarm: "🔔 هشدار ساعت صفر", back: "بازگشت", ph: "نام را اینجا بنویسید..." }
        };

        let curLang = 'ar';
        let isAlarmReady = false;

        window.toggleMenu = () => { 
            const m = document.getElementById('lMenu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.setLang = (l) => {
            curLang = l; document.getElementById('lMenu').style.display = 'none';
            const d = dict[l] || dict['en'];
            document.getElementById('t-stitle').innerText = d.stitle;
            document.getElementById('t-sdesc').innerText = d.sdesc;
            document.getElementById('t-sbtn').innerText = d.sbtn;
            document.getElementById('t-cur').innerText = d.cur;
            document.getElementById('t-alarm').innerText = d.alarm;
            document.getElementById('t-back').innerText = d.back;
            document.getElementById('searchInput').placeholder = d.ph;
            document.body.dir = (l === 'ar' || l === 'fa') ? 'rtl' : 'ltr';
            document.getElementById('lContainer').style.left = (l === 'ar' || l === 'fa') ? '15px' : 'auto';
            document.getElementById('lContainer').style.right = (l === 'ar' || l === 'fa') ? 'auto' : '15px';
        };

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults'); resDiv.innerHTML = "";
            for(let key in data) if(data[key].name.toLowerCase().includes(val)) 
                resDiv.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;" onclick="location.href='?id=${key}'">⭐ ${data[key].name}</div>`;
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val(); if(!info) return;
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                const noteBox = document.getElementById('liveNote');
                if(info.note) { noteBox.innerText = info.note; noteBox.style.display = "block"; } else { noteBox.style.display = "none"; }
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                if(isAlarmReady && document.getElementById('userTarget').value == current && current != 0) {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("حان دورك الآن"));
                    isAlarmReady = false;
                    document.getElementById('bellIcon').style.filter = "grayscale(1)";
                    alert("Sofygram!");
                }
            });
        }

        window.toggleAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("يرجى إدخال رقمك أولاً 🔔");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').style.filter = isAlarmReady ? "grayscale(0) drop-shadow(0 0 15px #ffd700)" : "grayscale(1)";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        };
    </script>
</body>
</html>

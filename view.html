<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram International | صوفيگرام العالمية 🌍</title>
    <style>
        :root { --glow: #e74c3c; } 
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; overflow-x: hidden; }
        
        /* قائمة اللغات المنسدلة */
        .lang-container { position: absolute; top: 20px; left: 20px; text-align: left; z-index: 1000; }
        .lang-icon { cursor: pointer; font-size: 30px; filter: drop-shadow(0 0 8px #ffd700); transition: 0.3s; }
        .lang-menu { display: none; background: #121212; border: 1px solid #ffd700; border-radius: 15px; padding: 10px; position: absolute; top: 40px; left: 0; width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .lang-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 10px; text-align: right; }
        .lang-item:hover { background: rgba(255,215,0,0.1); color: #ffd700; }

        .logo img { width: 140px; margin-top: 15px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.4)); }

        /* الهالة النبضية */
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 40px; padding: 25px; 
            max-width: 330px; margin: 15px auto; box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.02); box-shadow: 0 0 45px var(--glow); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 10px; background: rgba(0,0,0,0.4); }
        
        .card-ui { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 30px; border: 1px solid #1e293b; max-width: 340px; margin: 15px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 14px; border-radius: 12px; border: 2px solid #ffd700; background: #000; color: #fff; text-align: center; width: 85%; font-size: 18px; outline: none; margin-bottom: 15px; }
        .btn-gold { background:#ffd700; color:#000; border:none; padding:15px; border-radius:12px; font-weight:bold; width:90%; cursor:pointer; font-size: 16px; }
        .bell-btn { font-size: 60px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; }
        .note-box { background: rgba(255, 215, 0, 0.1); border: 1px dashed #ffd700; padding: 12px; border-radius: 15px; margin-top: 10px; color: #ffd700; font-weight: bold; }
    </style>
</head>

        <input type="text" id="searchInput" placeholder="...">
        <button id="t-sbtn" onclick="performSearch()" class="btn-gold">بحث الآن | Search Now</button>
        
        <div id="searchResults" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
    </div>

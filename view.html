<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام | المشاهد</title>
    <style>
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .header-logo img { width: 220px; margin-top: 15px; }
        .activity-name { color: #2ecc71; font-size: 28px; font-weight: bold; margin: 10px 0; }
        .status-tag { display: inline-block; border: 1px solid #2ecc71; color: #2ecc71; padding: 6px 18px; border-radius: 50px; font-size: 14px; }
        .number-card { background: #121212; border: 1px solid #333; border-radius: 25px; padding: 35px; max-width: 320px; margin: 20px auto; }
        .big-number { font-size: 110px; font-weight: bold; color: #fff; margin: 5px 0; }
        .note-display { color: #ffd700; background: rgba(255, 215, 0, 0.1); padding: 10px; border-radius: 10px; margin: 10px auto; max-width: 300px; font-size: 14px; }
        
        .search-section { margin-top: 40px; padding: 20px; background: #0a1122; border-radius: 20px; border: 1px solid #1e293b; }
        input[type="text"] { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>
    <div class="header-logo"><img src="logo.png"></div>
    <div class="activity-name" id="display-name">جاري التحميل...</div>
    <div class="status-tag" id="display-status">--</div>

    <div class="number-card">
        <p style="color: #888; font-size: 14px;">الرقم الحالي الآن | Current No.</p>
        <div class="big-number" id="display-num">0</div>
    </div>

    <div id="display-note" class="note-display" style="display:none;"></div>

    <div class="search-section">
        <h3 style="color: #2ecc71; font-size: 16px;">🔍 ابحث عن عيادة أو نشاط آخر:</h3>
        <input type="text" id="searchInput" placeholder="اكتب اسم العيادة هنا...">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'live_data'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('display-num').innerText = data.currentNum ?? 0;
                document.getElementById('display-name').innerText = data.name || "صوفيگرام";
                document.getElementById('display-status').innerText = data.status || "مفتوح";
                if(data.note) {
                    document.getElementById('display-note').innerText = data.note;
                    document.getElementById('display-note').style.display = 'block';
                } else {
                    document.getElementById('display-note').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>

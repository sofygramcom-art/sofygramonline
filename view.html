<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض العيادة | صوفيگرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #121212; padding: 30px; border-radius: 30px; border: 2px solid #ff4500; max-width: 400px; margin: auto; }
        .btn-admin { background: none; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 50px; transition: 0.3s; }
        .btn-admin:hover { color: #ff4500; border-color: #ff4500; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="nameDisplay">جاري التحميل...</h1>
        <p id="typeDisplay"></p>
        <hr style="border: 0.5px solid #222;">
        <p>هنا تظهر أرقام الحجز والمعلومات المباشرة</p>
    </div>

    <button class="btn-admin" onclick="goToAdmin()">
        <i class="fas fa-cog"></i> إدارة العيادة (للسكرتير)
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب الـ ID من الرابط
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) {
            onValue(ref(db, 'users/' + id), (snap) => {
                const data = snap.val();
                if(data) {
                    document.getElementById('nameDisplay').innerText = data.name;
                    document.getElementById('typeDisplay').innerText = data.type;
                    
                    // دالة الانتقال لصفحة السكرتير
                    window.goToAdmin = () => {
                        const p = prompt("أدخل كلمة مرور الإدارة:");
                        if(p === data.pass) {
                            // هنا الرابط يوديك للصفحة اللي سويناها (admin_panel.html)
                            window.location.href = `admin_panel.html?id=${id}`;
                        } else {
                            alert("كلمة المرور غلط!");
                        }
                    };
                }
            });
        }
    </script>
</body>
</html>

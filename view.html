<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام | المنصة العالمية 🌍</title>
    <style>
        :root { --glow: #2ecc71; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .logo img { width: 160px; margin-top: 10px; filter: drop-shadow(0 0 8px rgba(255,215,0,0.2)); }
        
        /* الهالة الضوئية النبضية */
        .number-box { 
            background: #121212; border: 2px solid var(--glow); border-radius: 35px; 
            padding: 30px; max-width: 300px; margin: 20px auto;
            box-shadow: 0 0 30px var(--glow); animation: pulse 2s infinite; 
            transition: all 0.5s ease;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--glow); } 50% { transform: scale(1.03); box-shadow: 0 0 50px var(--glow); } }
        
        .big-num { font-size: 110px; font-weight: bold; margin: 5px 0; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .status-tag { display: inline-block; padding: 8px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; border: 2px solid var(--glow); color: var(--glow); margin-bottom: 15px; }
        
        /* صناديق البحث والتنبيه */
        .card-ui { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid #1e293b; max-width: 330px; margin: 15px auto; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; margin: 5px; font-size: 16px; }
        .btn-gold { background: #ffd700; color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 80%; margin-top: 10px; }
        .bell-btn { font-size: 50px; background: none; border: none; cursor: pointer; filter: grayscale(1); transition: 0.4s; padding: 10px; }
        .bell-active { filter: grayscale(0) drop-shadow(0 0 15px #ffd700); transform: scale(1.2); }
        .result-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; text-align: right; }
        .result-item:hover { background: rgba(255,215,0,0.1); }
    </style>
</head>
<body>
    <div class="logo"><img src="logo.png"></div>

    <div id="searchPage" class="card-ui">
        <h3 style="color:#ffd700; margin-top:0;">🔎 دليل صوفيگرام الذكي</h3>
        <p style="font-size: 13px; color: #888;">ابحث عن اسم العيادة أو المحل لمتابعة دورك</p>
        <input type="text" id="searchInput" placeholder="اكتب الاسم هنا..." style="width: 80%;">
        <button class="btn-gold" onclick="performSearch()">ابحث الآن</button>
        <div id="searchResults" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <div id="livePage" style="display:none;">
        <h2 id="clinicName" style="color:#ffd700; margin-bottom:5px; text-shadow: 0 2px 4px #000;"></h2>
        <div id="statusTag" class="status-tag">--</div>
        
        <div class="number-box">
            <p style="color: #888; font-size: 13px; margin:0;">الرقم الحالي الآن | Current No.</p>
            <div class="big-num" id="liveNumber">0</div>
            <p id="liveNote" style="color:#ffd700; font-size:14px; margin-top:5px; font-weight: bold;"></p>
        </div>

        <div class="card-ui">
            <p style="margin:0; color:#ffd700; font-weight: bold;">🔔 منبه ساعة الصفر الذكي:</p>
            <p style="font-size: 11px; color: #888; margin: 5px 0;">ادخل رقمك وسنقوم بمناداتك فوراً</p>
            <input type="number" id="userTarget" placeholder="رقمك" style="width:70px;">
            <button id="bellIcon" class="bell-btn" onclick="toggleSmartAlarm()">🔔</button>
        </div>
        
        <button onclick="window.location.href='view.html'" style="background:none; color:#888; border:none; text-decoration:underline; cursor:pointer; margin-top:20px;">العودة لمحرك البحث ↩️</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isAlarmReady = false;
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(id) { 
            document.getElementById('searchPage').style.display = 'none';
            document.getElementById('livePage').style.display = 'block';
            startTracking(id); 
        }

        window.performSearch = async () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const snap = await get(ref(db, 'users'));
            const data = snap.val();
            const resDiv = document.getElementById('searchResults');
            resDiv.innerHTML = "";
            for(let key in data) {
                if(data[key].name.toLowerCase().includes(val)) {
                    resDiv.innerHTML += `<div class="result-item" onclick="location.href='?id=${key}'">⭐ <b>${data[key].name}</b> <br> <small style="color:#ffd700;">انقر لمتابعة الدور المباشر</small></div>`;
                }
            }
            if(resDiv.innerHTML === "") resDiv.innerHTML = "❌ لم يتم العثور على نتائج";
        };

        function startTracking(targetId) {
            onValue(ref(db, 'users/' + targetId), (snap) => {
                const info = snap.val();
                if(!info) return;
                
                const current = info.currentNum || 0;
                document.getElementById('liveNumber').innerText = current;
                document.getElementById('clinicName').innerText = info.name;
                document.getElementById('liveNote').innerText = info.note || "";
                
                const st = info.status || "";
                document.getElementById('statusTag').innerText = st;
                
                // تحديث الألوان بذكاء
                const root = document.documentElement;
                if(st.includes("مفتوح")) root.style.setProperty('--glow', '#2ecc71');
                else if(st.includes("قريباً") || st.includes("طريق")) root.style.setProperty('--glow', '#f1c40f');
                else root.style.setProperty('--glow', '#e74c3c');

                // نظام النداء الصوتي (مترو دبي)
                const target = document.getElementById('userTarget').value;
                if(isAlarmReady && target == current && target != "") {
                    triggerVoice();
                    isAlarmReady = false;
                    document.getElementById('bellIcon').classList.remove('bell-active');
                    alert("🔔 صوفيگرام: حان دورك الآن!");
                }
            });
        }

        function triggerVoice() {
            const ar = new SpeechSynthesisUtterance("أهلاً بكم في منصة صوفي غرام العالمية. لقد حان دوركم الآن، يرجى التوجه فوراً. شكراً لكم.");
            ar.lang = 'ar-SA'; ar.rate = 0.8;
            const en = new SpeechSynthesisUtterance("Welcome to Sofygram International. It is your turn now, please proceed. Thank you.");
            en.lang = 'en-US'; en.rate = 0.8;
            window.speechSynthesis.speak(ar);
            window.speechSynthesis.speak(en);
        }

        window.toggleSmartAlarm = () => {
            if(!document.getElementById('userTarget').value) return alert("يرجى كتابة رقمك أولاً 🔔");
            isAlarmReady = !isAlarmReady;
            document.getElementById('bellIcon').classList.toggle('bell-active');
        };
    </script>
</body>
</html>

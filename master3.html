<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | السيطرة الكاملة 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 0 #27ae60; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: #000; } .btn-edit { background: #3498db; } .btn-d { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2 style="color:var(--glow);">لوحة الملك للسيطرة 👑</h2>
        <input type="password" id="mPass" placeholder="رمز الماستر السري">
        <p id="attemptsText" style="color: #888;">متبقي لك 3 محاولات</p>
        <button onclick="masterLogin()" class="btn-king">دخول السيطرة الكاملة 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:var(--glow);">الإدارة الشاملة للمشتركين 👑</h2>
        <input type="text" id="mSearch" placeholder="بحث عن طبيب..." onkeyup="filterUsers()">
        <div id="usersList">جاري تحميل البيانات...</div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer;">⚙️ تعيين رمز ماستر جديد</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, set, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 3;

        window.masterLogin = async () => {
            const p = document.getElementById('mPass').value;
            
            // جلب الرمز القديم والجديد للتحقق
            const s1 = await get(ref(db, 'admin_settings/masterHash'));
            const s2 = await get(ref(db, 'masterConfig/pass'));
            const masterHash = s1.val() || "e10adc3949ba59abbe56e057f20f883e";
            const masterPlain = s2.val() || "123456";

            // السماح بالدخول إذا كان الرمز صحيحاً أو كان الرمز الاحتياطي 123456
            if (CryptoJS.MD5(p).toString() === masterHash || p === masterPlain || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers();
            } else {
                attempts--;
                document.getElementById('attemptsText').innerText = `رمز خطأ! متبقي: ${attempts}`;
                if (attempts <= 0) { alert("تم القفل! أعد المحاولة لاحقاً."); location.reload(); }
            }
        };

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                
                let arr = []; for(let id in data) arr.push({id, ...data[id]});
                arr.reverse().forEach(u => {
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let active = expiry && expiry > new Date();
                    list.innerHTML += `
                        <div class="user-row ${active ? 'active-user' : 'expired-user'}" data-name="${u.name.toLowerCase()}">
                            <div style="text-align:right;">
                                <b>${u.name}</b> <br>
                                <small>${u.phone || 'بدون هاتف'} | الرمز: ${u.password}</small>
                                <div id="info-${u.id}" style="display:none; color:var(--glow); margin-top:5px;"></div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-f" onclick="setSub('${u.id}', 30)">تفعيل شهر</button>
                                <button class="btn btn-edit" onclick="editData('${u.id}', '${u.name}', '${u.phone || ''}', '${u.password}')">تعديل ✏️</button>
                                <button class="btn btn-d" onclick="delUser('${u.id}')">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.editData = (id, name, phone, pass) => {
            const nName = prompt("تعديل اسم الطبيب:", name);
            const nPhone = prompt("تعديل رقم الهاتف:", phone);
            const nPass = prompt("تعديل رمز دخول الطبيب:", pass);
            if (nName || nPhone || nPass) {
                update(ref(db, `users/${id}`), { name: nName || name, phone: nPhone || phone, password: nPass || pass })
                .then(() => alert("تم التحديث بنجاح ✅"));
            }
        };

        window.setSub = (id, days) => {
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(() => alert("تم التفعيل ✅"));
        };

        window.delUser = (id) => { if(confirm("حذف الطبيب نهائياً؟")) remove(ref(db, `users/${id}`)); };

        window.changePass = () => {
            const newP = prompt("أدخل رمز الماستر الجديد:");
            if (newP) {
                const hash = CryptoJS.MD5(newP).toString();
                set(ref(db, 'admin_settings/masterHash'), hash);
                set(ref(db, 'masterConfig/pass'), newP).then(() => {
                    alert("تم تعيين رمز الماستر بنجاح ✅");
                    location.reload();
                });
            }
        };

        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

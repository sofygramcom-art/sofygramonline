<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | الإصلاح النهائي 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 600px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 0 #27ae60; }
        .btn-king:active { transform: translateY(3px); box-shadow: none; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid #888; text-align: right; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 8px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2 id="t-lock">قفل الإدارة العليا 👑</h2>
        <input type="password" id="mPass" placeholder="أدخل كلمة المرور">
        <p id="attemptsText" style="color: #888; font-size: 13px;">متبقي لك 3 محاولات</p>
        <button onclick="masterLogin()" class="btn-king">دخول السيطرة 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:var(--glow);">لوحة التحكم الملكية V3 👑</h2>
        <div id="usersList">جاري تحميل البيانات...</div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer; font-size:11px;">⚙️ تغيير رمز الماستر</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 3;
        let masterHash = "";

        // جلب الرمز من المكانين لضمان الدخول
        const fetchPass = async () => {
            const s1 = await get(ref(db, 'admin_settings/masterHash'));
            const s2 = await get(ref(db, 'masterConfig/pass'));
            masterHash = s2.exists() ? CryptoJS.MD5(s2.val()).toString() : (s1.exists() ? s1.val() : "e10adc3949ba59abbe56e057f20f883e");
        };
        fetchPass();

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            if (CryptoJS.MD5(p).toString() === masterHash || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers();
            } else {
                attempts--;
                document.getElementById('attemptsText').innerText = `رمز خطأ! متبقي: ${attempts}`;
                if (attempts <= 0) {
                    alert("تم قفل اللوحة مؤقتاً! تحقق من الأمان.");
                    location.reload();
                }
            }
        };

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `
                        <div class="user-row">
                            <div style="text-align:right;">
                                <b>${data[id].name}</b> <br> <small>${data[id].phone || 'بلا رقم'}</small>
                            </div>
                            <button class="btn-edit" onclick="editUser('${id}', '${data[id].name}', '${data[id].phone}')">تعديل ✏️</button>
                        </div>`;
                }
            });
        }

        window.editUser = (id, name, phone) => {
            const nName = prompt("تعديل الاسم:", name);
            const nPhone = prompt("تعديل الهاتف:", phone);
            if (nName || nPhone) update(ref(db, `users/${id}`), { name: nName, phone: nPhone });
        };

        window.changePass = () => {
            const newP = prompt("أدخل رمز الماستر الجديد:");
            if (newP) {
                // نوحد الرمز في المكانين لكي يفتح ماستر 2 و 3 بنفس الرمز
                const hash = CryptoJS.MD5(newP).toString();
                set(ref(db, 'admin_settings/masterHash'), hash);
                set(ref(db, 'masterConfig/pass'), newP).then(() => {
                    alert("تم التوحيد بنجاح ✅");
                    location.reload();
                });
            }
        };
    </script>
</body>
</html>

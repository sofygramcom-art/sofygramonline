<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V5 | الإدارة الملكية 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input, select { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.8; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: #000; } .btn-edit { background: #3498db; } .btn-d { background: #e74c3c; }
        .days-badge { background: #ffd700; color: #000; padding: 4px 12px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .info-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #333; display: none; text-align: right; }
        .staff-section { background: #000; border: 2px dashed var(--glow); padding: 20px; border-radius: 25px; margin-top: 30px; display: none; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:130px; margin-bottom:15px;">
        <h2 style="color:var(--glow);">قفل الإدارة العليا 👑</h2>
        <input type="password" id="mPass" placeholder="كلمة المرور">
        <p id="attText" style="color:#888; font-size:12px;">متبقي 3 محاولات</p>
        <button onclick="masterLogin()" class="btn-king">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">إدارة الصلاحيات والبيانات 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن مشترك..." onkeyup="filterUsers()" style="width:95%;">
        <div id="usersList">جاري تحميل المشتركين...</div>

        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button onclick="toggleStaff()" style="background:#e67e22; color:white; padding:15px; border-radius:15px; border:none; width:95%; font-weight:bold; cursor:pointer; margin-bottom:10px;">👥 إدارة طاقم المعاونين</button>
        
        <div id="staffSection" class="staff-section">
            <h3>إضافة معاون جديد</h3>
            <input type="text" id="sName" placeholder="اسم المعاون">
            <input type="password" id="sPass" placeholder="رمز المعاون">
            <select id="sRole">
                <option value="gold">ذهبي (صلاحيات كاملة)</option>
                <option value="silver">فضي (تفعيل + أرقام)</option>
                <option value="bronze">برونزي (تجربة + خصوصية)</option>
            </select>
            <button onclick="addStaff()" class="btn-king">حفظ المعاون ✅</button>
            <div id="staffList" style="margin-top:20px; text-align:right;"></div>
        </div>

        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer; font-size:11px; margin-top:20px;">⚙️ تعيين رمز ماستر جديد</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { 
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", 
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(config); const db = getDatabase(app);

        let attempts = 3;

        window.masterLogin = async () => {
            const p = document.getElementById('mPass').value;
            const s1 = await get(ref(db, 'admin_settings/masterHash'));
            const hash = s1.val() || "e10adc3949ba59abbe56e057f20f883e";
            if (CryptoJS.MD5(p).toString() === hash || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers(); loadStaff();
            } else {
                attempts--;
                document.getElementById('attText').innerText = `خطأ! متبقي: ${attempts}`;
                if(attempts <= 0) location.reload();
            }
        };

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) { list.innerHTML = "لا يوجد مشتركين"; return; }
                Object.keys(data).reverse().forEach(id => {
                    const u = data[id];
                    const exp = u.expiryDate ? new Date(u.expiryDate) : null;
                    let days = exp ? Math.ceil((exp - new Date()) / 86400000) : 0;
                    list.innerHTML += `
                        <div class="user-row ${days > 0 ? 'active-user' : 'expired-user'}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b style="font-size:18px;">${u.name}</b> <span class="days-badge">${days > 0 ? days + ' يوم' : '!!!'}</span> <br>
                                <small style="color:#aaa;">ينتهي في: ${exp ? exp.toLocaleDateString('en-GB') : '---'}</small>
                                <div id="info-${id}" class="info-box"></div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-f" onclick="setSub('${id}', 30)">تفعيل شهر</button>
                                <button class="btn btn-t" onclick="setSub('${id}', 3)">تجربة 3 أيام</button>
                                <button class="btn btn-edit" onclick="showTools('${id}', '${u.name}', '${u.phone||'لا يوجد'}', '${u.password}')">🔑 الرمز / تعديل</button>
                                <button class="btn btn-d" onclick="delUser('${id}')">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.showTools = (id, name, phone, pass) => {
            const div = document.getElementById(`info-${id}`);
            div.style.display = div.style.display === 'block' ? 'none' : 'block';
            div.innerHTML = `
                رمز الدخول: <b style="color:gold;">${pass}</b> | الهاتف: <b style="color:gold;">${phone}</b>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn btn-edit" style="font-size:10px;" onclick="editF('${id}','name','${name}')">الاسم</button>
                    <button class="btn btn-edit" style="font-size:10px;" onclick="editF('${id}','phone','${phone}')">الهاتف</button>
                    <button class="btn btn-edit" style="font-size:10px;" onclick="editF('${id}','password','${pass}')">الرمز</button>
                </div>`;
        };

        window.editF = (id, f, c) => {
            const n = prompt(`تعديل ${f}:`, c);
            if(n && n !== c) { let upd = {}; upd[f] = n; update(ref(db, `users/${id}`), upd); }
        };

        window.toggleStaff = () => {
            const s = document.getElementById('staffSection');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        };

        window.addStaff = () => {
            const n = document.getElementById('sName').value;
            const p = document.getElementById('sPass').value;
            const r = document.getElementById('sRole').value;
            if(n && p) set(ref(db, 'staff/' + n), { name: n, pass: p, role: r }).then(() => alert("تم الحفظ ✅"));
        };

        function loadStaff() {
            onValue(ref(db, 'staff'), (snap) => {
                const data = snap.val(); const div = document.getElementById('staffList'); div.innerHTML = "<h4>الطاقم:</h4>";
                for(let id in data) div.innerHTML += `<p>👤 ${id} (${data[id].role}) <button onclick="delStaff('${id}')" style="color:red; background:none; border:none; cursor:pointer;">حذف</button></p>`;
            });
        }

        window.delStaff = (id) => { if(confirm("حذف؟")) remove(ref(db, 'staff/' + id)); };
        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() });
        };
        window.delUser = (id) => { if(confirm("حذف المشترك؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
        window.changePass = () => {
            const n = prompt("رمز الماستر الجديد:");
            if(n) set(ref(db, 'admin_settings/masterHash'), CryptoJS.MD5(n).toString()).then(() => location.reload());
        };
    </script>
</body>
</html>

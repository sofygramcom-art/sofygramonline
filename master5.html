<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة العليا 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input, select { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: #000; } .btn-edit { background: #3498db; } .btn-d { background: #e74c3c; }
        .staff-section { background: #000; border: 1px dashed var(--glow); padding: 20px; border-radius: 25px; margin-top: 30px; display: none; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2 style="color:var(--glow);">قفل الإدارة العليا 👑</h2>
        <input type="password" id="mPass" placeholder="كلمة المرور">
        <button onclick="masterLogin()" class="btn-king">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">إدارة الصلاحيات والبيانات 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن مشترك..." onkeyup="filterUsers()" style="width:95%;">
        <div id="usersList">جاري التحميل...</div>

        <hr style="border:0; border-top:1px solid #333; margin:30px 0;">
        
        <button onclick="toggleStaff()" style="background:#e67e22; color:white; padding:15px; border-radius:15px; border:none; width:95%; font-weight:bold; cursor:pointer; margin-bottom:10px;">إدارة المعاونين (الطاقم) 👥</button>
        
        <div id="staffSection" class="staff-section">
            <h3>إضافة معاون جديد</h3>
            <input type="text" id="sName" placeholder="اسم المعاون">
            <input type="password" id="sPass" placeholder="رمز المعاون">
            <select id="sRole">
                <option value="gold">معاون ذهبي (صلاحيات واسعة)</option>
                <option value="silver">معاون فضي (تفعيل ورؤية أرقام)</option>
                <option value="bronze">معاون برونزي (تفعيل 3 أيام فقط)</option>
            </select>
            <button onclick="addStaff()" class="btn-king">إضافة المعاون ✅</button>
            <div id="staffList" style="margin-top:20px; text-align:right;"></div>
        </div>

        <button onclick="changePass()" style="background:none; color:#888; border:1px solid #444; padding:8px; border-radius:10px; cursor:pointer; font-size:11px; margin-top:20px;">⚙️ تعيين رمز ماستر جديد</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        window.masterLogin = async () => {
            const p = document.getElementById('mPass').value;
            const s1 = await get(ref(db, 'admin_settings/masterHash'));
            const hash = s1.val() || "e10adc3949ba59abbe56e057f20f883e"; // Default: 123456
            if (CryptoJS.MD5(p).toString() === hash || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers(); loadStaff();
            } else { alert("رمز خاطئ!"); }
        };

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) return;
                Object.keys(data).reverse().forEach(id => {
                    const u = data[id];
                    const exp = u.expiryDate ? new Date(u.expiryDate) : null;
                    let days = exp ? Math.ceil((exp - new Date()) / (86400000)) : 0;
                    list.innerHTML += `
                        <div class="user-row ${days > 0 ? 'active-user' : ''}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b>${u.name}</b> <span style="background:gold;color:black;padding:2px 8px;border-radius:8px;">${days > 0 ? days + ' ي' : '!'}</span><br>
                                <small>${u.phone || 'بدون هاتف'}</small>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-f" onclick="setSub('${id}', 30)">تفعيل شهر</button>
                                <button class="btn btn-edit" onclick="editUser('${id}', '${u.name}', '${u.phone}', '${u.password}')">تعديل بيانات 🔑</button>
                                <button class="btn btn-d" onclick="delUser('${id}')">حذف</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.editUser = (id, name, phone, pass) => {
            const nName = prompt("تعديل الاسم:", name);
            const nPhone = prompt("تعديل الهاتف:", phone);
            const nPass = prompt("تعديل الباسوورد:", pass);
            if(confirm("تأكيد التعديلات؟")) {
                update(ref(db, `users/${id}`), { name: nName, phone: nPhone, password: nPass });
            }
        };

        window.toggleStaff = () => {
            const sec = document.getElementById('staffSection');
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
        };

        window.addStaff = () => {
            const name = document.getElementById('sName').value;
            const pass = document.getElementById('sPass').value;
            const role = document.getElementById('sRole').value;
            if(name && pass) {
                set(ref(db, 'staff/' + name), { name, pass, role }).then(() => alert("تم إضافة المعاون ✅"));
            }
        };

        function loadStaff() {
            onValue(ref(db, 'staff'), (snap) => {
                const data = snap.val(); const div = document.getElementById('staffList'); div.innerHTML = "<h4>المعاونين الحاليين:</h4>";
                for(let id in data) {
                    div.innerHTML += `<p>👤 ${id} (${data[id].role}) <button onclick="delStaff('${id}')" style="color:red;">حذف</button></p>`;
                }
            });
        }

        window.delStaff = (id) => { if(confirm("حذف المعاون؟")) remove(ref(db, 'staff/' + id)); };
        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() });
        };
        window.changePass = () => {
            const n = prompt("رمز الماستر الجديد:");
            if(n) set(ref(db, 'admin_settings/masterHash'), CryptoJS.MD5(n).toString()).then(() => location.reload());
        };
        window.delUser = (id) => { if(confirm("حذف؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

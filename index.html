<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Global | صوفيگرام العالمية 🌍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon: #ff4500; --bg: #050a14; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }

        .hero { background: radial-gradient(circle at center, #1a2a44 0%, var(--bg) 100%); padding: 30px 15px; }
        .logo-box img { width: 150px; filter: drop-shadow(0 0 15px var(--gold)); }
        .brand-title { font-size: 50px; font-weight: 900; text-shadow: 0 0 30px var(--gold); margin: 5px 0; }

        /* محرك البحث الفاخر */
        .search-engine { 
            background: rgba(12, 18, 29, 0.95); border-radius: 40px; padding: 30px; 
            max-width: 900px; margin: 20px auto; border: 1px solid #1e293b;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        .mic-btn {
            width: 90px; height: 90px; border-radius: 50%; background: #000;
            border: 4px solid var(--neon); color: white; font-size: 40px;
            cursor: pointer; transition: 0.4s; box-shadow: 0 0 20px var(--neon);
        }
        .mic-btn.active { animation: pulse-fire 1.2s infinite; background: var(--neon); box-shadow: 0 0 50px var(--neon); }
        @keyframes pulse-fire { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* شبكة الفلترة الرباعية */
        .grid-filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        select, input { 
            width: 100%; padding: 15px; border-radius: 15px; background: #000; 
            border: 1px solid #333; color: white; font-size: 15px; outline: none; box-sizing: border-box;
        }

        .btn-main-search { 
            grid-column: span 2; background: var(--gold); color: black; 
            padding: 18px; border-radius: 15px; font-weight: bold; 
            font-size: 18px; cursor: pointer; border: none; margin-top: 10px;
        }

        /* باقات الاشتراك */
        .plans-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 40px auto; max-width: 900px; }
        .plan-card { 
            background: #0c121d; border: 2px solid var(--gold); border-radius: 30px; 
            padding: 25px; width: 280px; position: relative;
        }
        .plan-card.silver { border-color: #c0c0c0; }
        .price { font-size: 30px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .silver .price { color: #c0c0c0; }
        .btn-reg { display: inline-block; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 10px; background: var(--gold); color: black; }
        .silver .btn-reg { background: #c0c0c0; }

        /* السوشيال ميديا العائمة */
        .social-float { margin-top: 40px; padding-bottom: 30px; }
        .social-float a { color: #888; margin: 0 15px; font-size: 30px; transition: 0.3s; }
        .social-float a:hover { color: var(--gold); transform: translateY(-5px); }

        #results { margin-top: 30px; text-align: right; max-width: 800px; margin: auto; }
        .res-item { background: #121c2c; padding: 20px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid var(--gold); cursor: pointer; }
    </style>
</head>
<body onclick="playWelcome()">

<div class="hero">
    <div class="logo-box"><img src="logo.png"></div>
    <h1 class="brand-title">SOFYGRAM</h1>
    <p style="color:var(--gold); font-weight:bold; letter-spacing:3px;">صوفيگرام العالمية 🛰️</p>

    <div class="search-engine">
        <div class="mic-box">
            <button id="micBtn" class="mic-btn" onclick="startSofyVoice()">🎙️</button>
            <p id="micStatus" style="color:var(--gold); margin-top:10px; font-weight:bold;">البحث الصوتي السريع</p>
        </div>

        <div class="grid-filters">
            <select id="country" onchange="loadCities()">
                <option value="">اختر الدولة</option>
                <option value="العراق">العراق 🇮🇶</option>
                <option value="السعودية">السعودية 🇸🇦</option>
                <option value="الإمارات">الإمارات 🇦🇪</option>
                <option value="الكويت">الكويت 🇰🇼</option>
                <option value="قطر">قطر 🇶🇦</option>
                <option value="عُمان">عُمان 🇴🇲</option>
                <option value="مصر">مصر 🇪🇬</option>
                <option value="تركيا">تركيا 🇹🇷</option>
                <option value="إيران">إيران 🇮🇷</option>
                <option value="أمريكا">أمريكا 🇺🇸</option>
                <option value="أوروبا">أوروبا 🇪🇺</option>
                <option value="غير ذلك">غير ذلك</option>
            </select>

            <select id="city">
                <option value="">اختر المحافظة/المدينة</option>
            </select>

            <select id="category">
                <option value="">نوع النشاط</option>
                <optgroup label="طبي">
                    <option>أطباء وعيادات</option><option>صيدليات</option><option>مختبرات</option><option>مراكز تجميل</option>
                </optgroup>
                <optgroup label="تجاري">
                    <option>مطاعم وكافيهات</option><option>أسواق ومولات</option><option>صاغة ومجوهرات</option><option>حلاقة رجالية</option><option>صالون نسائي</option>
                </optgroup>
                <option>محاماة</option><option>تكسي</option><option>صيانة موبايل</option><option>كهربائي</option><option>غير ذلك</option>
            </select>

            <input type="text" id="manualSearch" placeholder="ابحث باسم العيادة أو النشاط...">

            <button class="btn-main-search" onclick="runSofySearch()">بحث الآن 🚀</button>
        </div>
        <div id="results"></div>
    </div>

    <div class="plans-container">
        <div class="plan-card">
            <div style="background:red; color:white; border-radius:10px; font-size:12px; padding:3px; position:absolute; top:-10px; left:20px;">خصم 50%</div>
            <h3 style="color:var(--gold)">الاشتراك الذهبي</h3>
            <p style="font-size:12px; color:#aaa;">خاص بالأطباء والعيادات</p>
            <div class="price">20,000 <small>د.ع</small></div>
            <a href="register2.html?type=gold" class="btn-reg">اشترك الآن</a>
        </div>
        <div class="plan-card silver">
            <h3 style="color:#c0c0c0">الاشتراك الفضي</h3>
            <p style="font-size:12px; color:#aaa;">كافة الأنشطة الأخرى</p>
            <div class="price">15,000 <small>د.ع</small></div>
            <a href="register2.html?type=silver" class="btn-reg">اشترك الآن</a>
        </div>
    </div>

    <a href="admin.html" style="color:#888; text-decoration:none; font-size:14px; border-bottom:1px solid #333;">🗝️ دخول السكرتير أو صاحب النشاط</a>

    <div class="social-float">
        <a href="https://facebook.com/sofygram"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/sofygram.iq"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/sofygram"><i class="fab fa-telegram"></i></a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    const locations = {
        "العراق": ["بغداد", "النجف", "كربلاء", "البصرة", "بابل", "الأنبار", "أربيل", "السليمانية", "دهوك", "ديالى", "ذي قار", "صلاح الدين", "كركوك", "ميسان", "المثنى", "نينوى", "القادسية", "واسط", "غير ذلك"],
        "السعودية": ["الرياض", "جدة", "مكة المكرمة", "المدينة المنورة", "الدمام", "الخبر", "أبها"],
        "الإمارات": ["دبي", "أبوظبي", "الشارقة", "عجمان", "رأس الخيمة"],
        "الكويت": ["العاصمة", "حولي", "الفروانية", "الجهراء", "الأحمدي"],
        "أمريكا": ["نيويورك", "ميشيغان", "كاليفورنيا", "تكساس", "فلوريدا", "شيكاغو"],
        "تركيا": ["إسطنبول", "أنقرة", "أنطاليا", "بورصة"],
        "إيران": ["طهران", "مشهد", "أصفهان", "شيراز"],
        "أوروبا": ["لندن", "باريس", "برلين", "روما", "مدريد"]
    };

    window.loadCities = () => {
        const country = document.getElementById('country').value;
        const citySelect = document.getElementById('city');
        citySelect.innerHTML = '<option value="">اختر المحافظة/المدينة</option>';
        if(locations[country]) {
            locations[country].forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);
        }
        citySelect.innerHTML += '<option value="غير ذلك">غير ذلك</option>';
    };

    let hasWelcomed = false;
    window.playWelcome = () => {
        if (hasWelcomed) return;
        const msg = new SpeechSynthesisUtterance("أهلاً بك في منصة صوفي غرام العالمية، ماذا تحب أن تبحث؟");
        msg.lang = 'ar-SA'; window.speechSynthesis.speak(msg);
        hasWelcomed = true;
    };

    window.startSofyVoice = () => {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA'; rec.start();
        document.getElementById('micBtn').classList.add('active');
        rec.onresult = (e) => {
            let t = e.results[0][0].transcript.replace(/[.؟?]/g, "");
            document.getElementById('manualSearch').value = t;
            document.getElementById('micBtn').classList.remove('active');
            runSofySearch();
        };
        rec.onerror = () => document.getElementById('micBtn').classList.remove('active');
    };

    window.runSofySearch = async () => {
        const q = document.getElementById('manualSearch').value.toLowerCase();
        const cityQ = document.getElementById('city').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "جاري البحث...";
        const snap = await get(ref(db, 'users'));
        const data = snap.val(); resDiv.innerHTML = "";
        for(let id in data) {
            const u = data[id];
            if((!q || (u.name && u.name.toLowerCase().includes(q))) && (!cityQ || u.city === cityQ)) {
                resDiv.innerHTML += `<div class="res-item" onclick="location.href='view.html?id=${id}'">
                    <h3 style="color:var(--gold);margin:0;">${u.name}</h3>
                    <p style="font-size:13px; color:#aaa; margin:5px 0;">📍 ${u.city || ''} - ${u.address || ''}</p>
                    <p style="font-size:13px; color:#00d2ff;"><i class="fas fa-phone"></i> ${u.phone || ''}</p>
                </div>`;
            }
        }
        if(resDiv.innerHTML === "") resDiv.innerHTML = "لم يتم العثور على نتائج.";
    };
</script>
</body>
</html>

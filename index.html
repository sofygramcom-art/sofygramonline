<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Global | صوفيگرام العالمية 🌍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon: #ff4500; --dark: #050a14; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }

        .hero { background: radial-gradient(circle at center, #1a2a44 0%, var(--dark) 100%); padding: 40px 20px; }
        .logo-box img { width: 160px; filter: drop-shadow(0 0 15px var(--gold)); }
        .brand-title { font-size: 50px; font-weight: 900; text-shadow: 0 0 25px var(--gold); margin: 10px 0; }

        /* محرك البحث */
        .search-engine { 
            background: rgba(12, 18, 29, 0.95); border-radius: 40px; padding: 30px; 
            max-width: 850px; margin: 25px auto; border: 1px solid #1e293b;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; background: #000; border: 4px solid var(--neon); color: white; font-size: 40px; cursor: pointer; box-shadow: 0 0 20px var(--neon); }
        .mic-btn.active { animation: pulse-fire 1.2s infinite; background: var(--neon); }
        @keyframes pulse-fire { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        select, input { width: 100%; padding: 15px; border-radius: 15px; background: #000; border: 1px solid #333; color: white; outline: none; box-sizing: border-box; }

        /* قسم الفيديوهات */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; max-width: 900px; margin: 30px auto; padding: 0 15px; }
        .v-card { border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); }
        video { width: 100%; display: block; }

        /* باقات الاشتراك الكبرى */
        .subscription-plans { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 850px; margin: 50px auto; padding: 0 15px; }
        
        .plan-card { 
            background: linear-gradient(145deg, #121c2c, #0a0f1a); 
            border: 2px solid var(--gold); border-radius: 35px; padding: 30px; 
            position: relative; transition: 0.3s;
        }
        .plan-card.gold { border-color: var(--gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        .plan-card.silver { border-color: #c0c0c0; }
        
        .badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: red; color: white; padding: 5px 20px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        
        .price { font-size: 35px; font-weight: bold; color: var(--gold); margin: 15px 0; }
        .silver .price { color: #c0c0c0; }

        .btn-sub { 
            display: inline-block; background: var(--gold); color: black; padding: 15px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 15px;
        }
        .silver .btn-sub { background: #c0c0c0; }

        .staff-login { margin-top: 40px; display: inline-block; color: #888; text-decoration: none; font-size: 14px; border-bottom: 1px solid #333; }

        #results { margin-top: 25px; text-align: right; max-width: 800px; margin: auto; }
        .res-card { background: #121c2c; padding: 18px; border-radius: 20px; margin-bottom: 10px; border-right: 6px solid var(--gold); cursor: pointer; }
    </style>
</head>
<body onclick="playWelcome()">

<div class="hero">
    <div class="logo-box"><img src="logo.png"></div>
    <h1 class="brand-title">SOFYGRAM</h1>
    <div style="color:var(--gold); font-weight:bold; letter-spacing:4px;">صوفيگرام العالمية</div>

    <div class="video-grid">
        <div class="v-card"><video muted loop onmouseover="this.play()" onmouseout="this.pause()"><source src="v1.MP4" type="video/mp4"></video></div>
        <div class="v-card"><video muted loop onmouseover="this.play()" onmouseout="this.pause()"><source src="v2.MP4" type="video/mp4"></video></div>
        <div class="v-card"><video muted loop onmouseover="this.play()" onmouseout="this.pause()"><source src="v3.MP4" type="video/mp4"></video></div>
    </div>

    <div class="search-engine">
        <div class="mic-box">
            <button id="micBtn" class="mic-btn" onclick="startSofyVoice()">🎙️</button>
            <p style="color:var(--gold); margin-top:10px; font-weight:bold;">البحث الصوتي الذكي</p>
        </div>
        <div class="grid-inputs">
            <select id="country"><option>العراق</option><option>الإمارات</option><option>تركيا</option><option>أوروبا</option><option>غير ذلك</option></select>
            <select id="city"><option>النجف</option><option>كربلاء</option><option>بغداد</option><option>البصرة</option><option>أربيل</option><option>نينوى</option><option>ذي قار</option><option>غير ذلك</option></select>
            <select id="category"><option>أطباء وعيادات</option><option>صيدليات</option><option>مطاعم</option><option>حلاقة</option><option>غير ذلك</option></select>
            <input type="text" id="manualSearch" placeholder="ابحث باسم النشاط...">
        </div>
        <button onclick="runSofySearch()" style="width:100%; padding:20px; margin-top:15px; background:var(--gold); color:black; border:none; border-radius:15px; font-weight:bold; cursor:pointer; font-size:20px;">انطلاق 🚀</button>
        <div id="results"></div>
    </div>

    <div class="subscription-plans">
        <div class="plan-card gold">
            <div class="badge">تخفيض 50%</div>
            <h3 style="color:var(--gold)">الاشتراك الذهبي</h3>
            <p style="font-size: 14px; color: #aaa;">خاص بالأطباء والعيادات الطبية والمختبرات</p>
            <div class="price">20,000 د.ع <span style="font-size: 12px; color: #888;">/ شهرياً</span></div>
            <a href="register2.html" class="btn-sub">اشترك الآن</a>
        </div>

        <div class="plan-card silver">
            <div class="badge">عرض الانطلاقة</div>
            <h3 style="color:#c0c0c0">الاشتراك الفضي</h3>
            <p style="font-size: 14px; color: #aaa;">لكافة الأنشطة (مطاعم، حلاقة، محلات، إلخ)</p>
            <div class="price">15,000 د.ع <span style="font-size: 12px; color: #888;">/ شهرياً</span></div>
            <a href="register2.html" class="btn-sub">اشترك الآن</a>
        </div>
    </div>

    <a href="admin.html" class="staff-login">🗝️ دخول السكرتير أو صاحب النشاط</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let hasWelcomed = false;
    window.playWelcome = () => {
        if (hasWelcomed) return;
        const msg = new SpeechSynthesisUtterance("أهلاً بك في منصة صوفي غرام العالمية، ماذا تحب أن تبحث؟ اضغط المايك وتحدث وساجده لك في ثواني");
        msg.lang = 'ar-SA'; window.speechSynthesis.speak(msg);
        hasWelcomed = true;
    };

    window.startSofyVoice = () => {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA'; rec.start();
        document.getElementById('micBtn').classList.add('active');
        rec.onresult = (e) => {
            let t = e.results[0][0].transcript.replace(/[.؟?]/g, "");
            document.getElementById('manualSearch').value = t;
            document.getElementById('micBtn').classList.remove('active');
            runSofySearch();
        };
    };

    window.runSofySearch = async () => {
        const q = document.getElementById('manualSearch').value.toLowerCase();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "جاري البحث...";
        const snap = await get(ref(db, 'users'));
        const data = snap.val(); resDiv.innerHTML = "";
        for(let id in data) {
            if(!q || (data[id].name && data[id].name.toLowerCase().includes(q))) {
                resDiv.innerHTML += `<div class="res-card" onclick="location.href='view.html?id=${id}'">
                    <h3 style="color:var(--gold);margin:0;">${data[id].name}</h3>
                    <p>📍 ${data[id].city || ''} - ${data[id].address || ''}</p>
                    <p>📞 ${data[id].phone || ''}</p>
                </div>`;
            }
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Global | صوفيگرام العالمية 🌍</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon: #ff4500; --dark: #050a14; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }

        /* الهيدر */
        .hero { background: radial-gradient(circle at center, #1a2a44 0%, var(--dark) 100%); padding: 40px 20px; }
        .logo-box img { width: 180px; filter: drop-shadow(0 0 15px var(--gold)); }
        .brand-title { font-size: 55px; font-weight: 900; text-shadow: 0 0 30px var(--gold); margin: 10px 0; }

        /* المايك الناري */
        .search-engine { 
            background: rgba(12, 18, 29, 0.95); border-radius: 45px; padding: 35px; 
            max-width: 850px; margin: 30px auto; border: 1px solid #1e293b;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        .mic-btn {
            width: 100px; height: 100px; border-radius: 50%;
            background: #000; border: 4px solid var(--neon); color: white;
            font-size: 45px; cursor: pointer; transition: 0.4s; box-shadow: 0 0 20px var(--neon);
        }
        .mic-btn.active { animation: pulse-fire 1.2s infinite; background: var(--neon); box-shadow: 0 0 50px var(--neon); }
        @keyframes pulse-fire { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* الحقول الأربعة */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        select, input { 
            width: 100%; padding: 18px; border-radius: 18px; background: #000; 
            border: 1px solid #333; color: white; font-size: 16px; outline: none; box-sizing: border-box;
        }

        /* الملاحظات الذهبية */
        .golden-notes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; max-width: 850px; margin: 30px auto; padding: 0 20px; }
        .note { background: rgba(255, 215, 0, 0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; font-size: 13px; color: var(--gold); font-weight: bold; }

        #results { margin-top: 30px; text-align: right; max-width: 800px; margin: auto; }
        .res-card { background: #121c2c; padding: 20px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid var(--gold); cursor: pointer; }

        footer { background: #000; padding: 40px; border-top: 1px solid #1e293b; margin-top: 50px; }
        .social a { color: #888; margin: 0 15px; font-size: 30px; transition: 0.3s; }
        .social a:hover { color: var(--gold); }
    </style>
</head>
<body onclick="playWelcome()">

<div class="hero">
    <div class="logo-box"><img src="logo.png"></div>
    <h1 class="brand-title">SOFYGRAM</h1>
    <div style="color:var(--gold); font-weight:bold; letter-spacing:3px;">صوفيگرام العالمية</div>

    <div class="search-engine">
        <div class="mic-box">
            <button id="micBtn" class="mic-btn" onclick="startSofyVoice()">🎙️</button>
            <p id="micStatus" style="color: var(--gold); margin-top: 10px; font-weight: bold;">اضغط للتحدث</p>
        </div>

        <div class="grid-inputs">
            <select id="country">
                <option value="">اختر الدولة</option>
                <option>العراق</option><option>الإمارات</option><option>السعودية</option><option>الكويت</option>
                <option>قطر</option><option>عُمان</option><option>الأردن</option><option>مصر</option>
                <option>تركيا</option><option>إيران</option><option>أوروبا</option><option>أمريكا</option><option>غير ذلك</option>
            </select>
            <select id="city">
                <option value="">المحافظة / المدينة</option>
                <option>النجف</option><option>كربلاء</option><option>بغداد</option><option>البصرة</option>
                <option>بابل</option><option>الأنبار</option><option>أربيل</option><option>السليمانية</option>
                <option>دهوك</option><option>ديالى</option><option>ذي قار</option><option>صلاح الدين</option>
                <option>كركوك</option><option>ميسان</option><option>المثنى</option><option>نينوى</option>
                <option>القادسية</option><option>واسط</option><option>غير ذلك</option>
            </select>
            <select id="category">
                <option value="">نوع النشاط</option>
                <option>أطباء وعيادات</option><option>صيدليات</option><option>مختبرات</option>
                <option>مطاعم</option><option>كافيهات</option><option>حلاقة رجالية</option>
                <option>صالون نسائي</option><option>مراكز تجميل</option><option>محاماة</option>
                <option>تكسي</option><option>أسواق</option><option>مولات</option>
                <option>صيانة موبايل</option><option>كهربائي</option><option>نجارة</option>
                <option>حدادة</option><option>خياطة</option><option>معارض سيارات</option>
                <option>فنادق</option><option>قاعات مناسبات</option><option>غير ذلك</option>
            </select>
            <input type="text" id="manualSearch" placeholder="ابحث باسم النشاط...">
        </div>
        <button onclick="runSofySearch()" style="width:100%; padding:18px; margin-top:15px; background:var(--gold); color:black; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">انطلاق 🚀</button>
        <div id="results"></div>
    </div>

    <div class="golden-notes">
        <div class="note">🌟 تنظيم الطوابير عالمياً</div>
        <div class="note">🕒 وداعاً للانتظار المزعج</div>
        <div class="note">🛰️ متابعة فورية لدورك</div>
        <div class="note">💎 فخامة وسهولة استخدام</div>
    </div>
</div>

<footer>
    <div class="social">
        <a href="https://facebook.com/sofygram" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/sofygram.iq" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/sofygram" target="_blank"><i class="fab fa-telegram"></i></a>
    </div>
    <p style="color:#555; margin-top:20px;">جميع الحقوق محفوظة لصالح منصة صوفيگرام العالمية © 2026</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    let hasWelcomed = false;
    window.playWelcome = () => {
        if (hasWelcomed) return;
        const msg = new SpeechSynthesisUtterance("أهلاً بك في منصة صوفي غرام العالمية، ماذا تحب أن تبحث؟ اضغط المايك وتحدث وساجده لك في ثواني");
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
        hasWelcomed = true;
    };

    window.startSofyVoice = () => {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA'; rec.start();
        const btn = document.getElementById('micBtn'); btn.classList.add('active');
        rec.onresult = (e) => {
            let t = e.results[0][0].transcript.replace(/[.؟?]/g, "");
            document.getElementById('manualSearch').value = t;
            btn.classList.remove('active');
            runSofySearch();
        };
        rec.onerror = () => btn.classList.remove('active');
    };

    window.runSofySearch = async () => {
        const q = document.getElementById('manualSearch').value.toLowerCase();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "جاري البحث...";
        const snap = await get(ref(db, 'users'));
        const data = snap.val(); resDiv.innerHTML = "";
        for(let id in data) {
            if(!q || (data[id].name && data[id].name.toLowerCase().includes(q))) {
                resDiv.innerHTML += `<div class="res-card" onclick="location.href='view.html?id=${id}'">
                    <h3 style="color:var(--gold);margin:0;">${data[id].name}</h3>
                    <p><i class="fas fa-map-marker-alt"></i> ${data[id].city || 'النجف'} - ${data[id].address || ''}</p>
                    <p><i class="fas fa-phone"></i> ${data[id].phone || ''}</p>
                </div>`;
            }
        }
    };
</script>
</body>
</html>

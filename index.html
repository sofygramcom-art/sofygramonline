<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | صوفيگرام - البحث الذكي 🎙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #00d2ff; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* تصميم المايك */
        .search-section { padding: 50px 20px; background: radial-gradient(circle at center, #1a1a2e 0%, #050a14 100%); min-height: 40vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mic-btn { width: 100px; height: 100px; background: var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #000; cursor: pointer; transition: 0.3s; border: 10px solid rgba(0, 210, 255, 0.2); position: relative; }
        .mic-btn.listening { box-shadow: 0 0 40px var(--glow); animation: pulse 1.5s infinite; background: #ff4757; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        #searchStatus { margin-top: 20px; font-size: 18px; color: var(--glow); min-height: 30px; }
        .results-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        
        /* بطاقة الطبيب/النشاط */
        .card { background: #121212; border-radius: 25px; padding: 20px; border: 1px solid #333; text-align: right; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--glow); transform: translateY(-5px); }
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .open { background: #2ecc71; color: #fff; }
        .closed { background: #e74c3c; color: #fff; }
        .btn-call { background: var(--glow); color: #000; padding: 10px; border-radius: 12px; display: block; text-decoration: none; text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <section class="search-section">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">صوفيگرام 🌐</h1>
        <p style="color: #888;">اضغط المايك وابحث بصوتك عن أي عيادة أو نشاط</p>
        
        <div class="mic-btn" id="micBtn" onclick="startSearch()">
            <i class="fas fa-microphone"></i>
        </div>
        <div id="searchStatus">اضغط للتحدث...</div>
    </section>

    <div class="results-container" id="results">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة التعرف على الصوت
        window.startSearch = () => {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-IQ'; // لهجة عراقية
            
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('searchStatus');
            
            recognition.onstart = () => {
                btn.classList.add('listening');
                status.innerText = "جاري الاستماع إليك...";
            };
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                status.innerText = `قلتَ: "${text}"`;
                btn.classList.remove('listening');
                searchInFirebase(text.toLowerCase());
            };

            recognition.onerror = () => {
                btn.classList.remove('listening');
                status.innerText = "عذراً، لم أسمعك جيداً.";
            };

            recognition.start();
        };

        function searchInFirebase(query) {
            onValue(ref(db, 'users'), (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('results');
                container.innerHTML = "";
                
                for (let id in data) {
                    const u = data[id];
                    // البحث الرباعي (الاسم، النوع، المدينة، الحي)
                    const match = u.name.includes(query) || u.type.includes(query) || u.city.includes(query) || (u.neighborhood && u.neighborhood.includes(query));
                    
                    if (match && u.active) {
                        // حالة العمل (مفتوح افتراضياً الآن)
                        container.innerHTML += `
                            <div class="card">
                                <span class="status-badge open">مفتوح الآن</span>
                                <h3 style="margin:0; color:var(--glow);">${u.name}</h3>
                                <small>${u.type}</small><br>
                                <p style="font-size:14px; color:#ccc;">📍 ${u.city} - ${u.neighborhood || '---'}</p>
                                <a href="tel:${u.phone}" class="btn-call"><i class="fas fa-phone"></i> اتصال مباشر</a>
                            </div>
                        `;
                    }
                }
                if(container.innerHTML === "") {
                    container.innerHTML = "<p>لم أجد نتائج تطابق بحثك، جرب ذكر المحافظة أو الاختصاص.</p>";
                }
            }, { onlyOnce: true });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | لوحة المعاونين 🛡️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #2ecc71; --gold: #ffd700; --bg: #050a14; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; display: none; }
        .card { background: #121212; padding: 20px; border-radius: 30px; max-width: 600px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .stats-bar { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 15px; margin-bottom: 20px; color: var(--gold); font-weight: bold; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid var(--glow); text-align: right; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 12px; width: 100%; margin-top: 5px; }
        .btn-active { background: #2ecc71; }
        .btn-wa { background: #25d366; text-decoration: none; display: block; text-align: center; }
        .days-badge { background: var(--gold); color: #000; padding: 3px 8px; border-radius: 8px; font-weight: bold; font-size: 11px; }
        input { width: 90%; padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
             <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:5px; border-radius:8px; cursor:pointer;">خروج 🚪</button>
             <div id="staffName" style="color:var(--glow); font-size:12px;"></div>
        </div>
        <div class="stats-bar">📊 عدد العيادات: <span id="total">0</span></div>
        <input type="text" id="mSearch" placeholder="ابحث عن عيادة..." onkeyup="filterUsers()">
        <div id="usersList">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // فحص الأمان
        if(sessionStorage.getItem('staff_auth') !== 'true') {
            alert("ممنوع الدخول المباشر! 🔐");
            location.href = 'admin.html';
        } else {
            document.body.style.display = 'block';
            document.getElementById('staffName').innerText = "المعاون: " + sessionStorage.getItem('staff_name');
        }

        const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
            let count = 0;
            for(let id in data) {
                count++;
                const expiry = data[id].expiryDate ? new Date(data[id].expiryDate) : null;
                let days = expiry ? Math.ceil((expiry - new Date()) / (1000*60*60*24)) : 0;
                list.innerHTML += `
                    <div class="user-row" data-name="${(data[id].name || '').toLowerCase()}">
                        <div style="flex:1;">
                            <b>${data[id].name}</b> <span class="days-badge">${days > 0 ? days + ' يوم' : '!!!'}</span><br>
                            <small style="color:#aaa;">ينتهي: ${expiry ? expiry.toLocaleDateString('en-GB') : '---'}</small>
                        </div>
                        <div style="min-width:100px;">
                            <button class="btn btn-active" onclick="setSub('${id}', 30)">تفعيل</button>
                            <a href="https://wa.me/${data[id].phone}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</a>
                        </div>
                    </div>`;
            }
            document.getElementById('total').innerText = count;
        });

        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(() => alert("تم ✅"));
        };

        window.logout = () => { sessionStorage.clear(); location.href = 'admin.html'; };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram | التسجيل العالمي 🌐</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .reg-card { background: var(--card); padding: 30px; border-radius: 35px; max-width: 550px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); }
        h2 { color: var(--glow); margin-bottom: 25px; }
        label { display: block; text-align: right; margin: 10px 25px 5px 0; font-size: 14px; color: #aaa; }
        input, select { padding: 15px; border-radius: 18px; border: 1px solid #333; background: #000; color: #fff; text-align: center; margin-bottom: 15px; width: 95%; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--glow); }
        .btn-reg { background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; padding: 18px; width: 95%; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 19px; margin-top: 20px; }
        .hidden { display: none !important; }
        optgroup { color: var(--glow); background: #1a1a1a; }
    </style>
</head>
<body>

    <div class="reg-card">
        <h2>انضم إلى صوفيگرام 🌐</h2>
        
        <label>اسم النشاط التجاري:</label>
        <input type="text" id="name" placeholder="مثلاً: شركة الصقر / عيادة الأمل">
        
        <label>فئة النشاط:</label>
        <select id="type">
            <option value="">-- اختر الفئة --</option>
            <optgroup label="القطاع الطبي">
                <option value="طبيب / عيادة">طبيب / عيادة</option>
                <option value="صيدلية">صيدلية</option>
                <option value="مختبر طبي">مختبر طبي</option>
            </optgroup>
            <optgroup label="التقنية والشركات">
                <option value="شركة برمجيات">شركة برمجيات</option>
                <option value="شركة مقاولات">شركة مقاولات</option>
                <option value="مكتب عقارات">مكتب عقارات</option>
            </optgroup>
            <optgroup label="التجارة والجمال">
                <option value="أسواق / سوبر ماركت">أسواق / سوبر ماركت</option>
                <option value="مطعم / كافيه">مطعم / كافيه</option>
                <option value="مركز تجميل / صالون">مركز تجميل / صالون</option>
            </optgroup>
            <option value="أخرى">نشاط آخر</option>
        </select>

        <label>الدولة:</label>
        <select id="country" onchange="updateLocation()">
            <option value="العراق" selected>العراق</option>
            <option value="السعودية">السعودية</option>
            <option value="الإمارات">الإمارات</option>
            <option value="الكويت">الكويت</option>
            <option value="تركيا">تركيا</option>
            <option value="دولة أخرى">دولة أخرى</option>
        </select>
        <input type="text" id="countryInput" class="hidden" placeholder="اكتب اسم الدولة">

        <label>المحافظة / الولاية:</label>
        <select id="citySelect"></select>
        <input type="text" id="cityInput" class="hidden" placeholder="اكتب اسم المحافظة">

        <label>الحي / المنطقة:</label>
        <input type="text" id="neighborhood" placeholder="مثلاً: حي الأمير">

        <label>رقم الواتساب:</label>
        <input type="tel" id="phone" placeholder="07XXXXXXXXX">

        <label>اليوزر والباسوورد:</label>
        <input type="text" id="username" placeholder="اسم المستخدم (إنجليزي)">
        <input type="password" id="pass" placeholder="كلمة المرور">

        <button onclick="register()" class="btn-reg">إنشاء الحساب 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const iraqCities = ["النجف", "كربلاء", "بغداد", "البصرة", "بابل", "الأنبار", "أربيل", "نينوى", "ميسان", "ذي قار", "واسط", "صلاح الدين", "ديالى", "كركوك", "المثنى", "القادسية", "دهوك", "السليمانية"];

        window.updateLocation = () => {
            const country = document.getElementById('country').value;
            const coIn = document.getElementById('countryInput');
            const ciSe = document.getElementById('citySelect');
            const ciIn = document.getElementById('cityInput');

            coIn.classList.add('hidden'); ciSe.classList.add('hidden'); ciIn.classList.add('hidden');

            if (country === "العراق") {
                ciSe.classList.remove('hidden');
                ciSe.innerHTML = iraqCities.map(c => `<option value="${c}">${c}</option>`).join('');
            } else if (country === "دولة أخرى") {
                coIn.classList.remove('hidden'); ciIn.classList.remove('hidden');
            } else {
                ciIn.classList.remove('hidden');
            }
        };

        window.updateLocation();

        window.register = () => {
            const name = document.getElementById('name').value;
            const type = document.getElementById('type').value;
            const phone = document.getElementById('phone').value;
            const countryRaw = document.getElementById('country').value;
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('pass').value;

            let country = (countryRaw === "دولة أخرى") ? document.getElementById('countryInput').value : countryRaw;
            let city = (countryRaw === "العراق") ? document.getElementById('citySelect').value : document.getElementById('cityInput').value;

            if(!name || !type || !user || !pass || !phone || !city) return alert("أكمل جميع الحقول!");

            // نظام التوجيه الذكي
            const urlParams = new URLSearchParams(window.location.search);
            const planType = urlParams.get('type'); // يقرأ هل القادم من الذهبي أم الفضي

            set(ref(db, 'users/' + user), {
                name, type, phone, country, city,
                neighborhood: document.getElementById('neighborhood').value,
                password: pass, active: false, regDate: new Date().toISOString(),
                currentNum: 0, status: "مفتوح الآن"
            }).then(() => {
                // إذا كان جاي من زر الطبي الذهبي يروح لـ pay20
                if (planType === 'gold') {
                    window.location.href = `pay20.html?user=${user}`;
                } else {
                    // إذا كان جاي من زر النشاط الفضي يروح لـ pay (15 ألف)
                    window.location.href = `pay.html?user=${user}`;
                }
            });
        };
    </script>
</body>
</html>

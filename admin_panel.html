<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة العيادة | صوفيگرام ⚙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4500; --bg: #050a14; --card: #121212; --glow: #00d2ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: right; }
        .admin-container { max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--fire); text-align: center; border-bottom: 2px solid #222; padding-bottom: 15px; }
        .section { margin-top: 25px; background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        label { display: block; margin-bottom: 10px; color: #aaa; font-size: 14px; }
        input[type="time"] { width: 100%; padding: 12px; border-radius: 10px; background: #000; color: white; border: 1px solid #444; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; font-size: 16px; }
        .btn-loc { background: #3498db; color: white; }
        .btn-save { background: linear-gradient(45deg, #ff4500, #ff8c00); color: white; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3); }
        #status { font-size: 12px; text-align: center; margin-top: 10px; color: #2ecc71; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>إدارة العيادة المباشرة ⚙️</h2>
    
    <div class="section">
        <label><i class="fas fa-clock"></i> ضبط ساعات العمل اليوم:</label>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <span style="font-size: 11px; color: var(--glow);">يفتح من:</span>
                <input type="time" id="openT">
            </div>
            <div style="flex: 1;">
                <span style="font-size: 11px; color: var(--glow);">يغلق في:</span>
                <input type="time" id="closeT">
            </div>
        </div>
    </div>

    <div class="section">
        <label><i class="fas fa-map-marker-alt"></i> الموقع الجغرافي (GPS):</label>
        <button class="btn btn-loc" onclick="getLocation()">
            <i class="fas fa-crosshairs"></i> تحديث موقع العيادة الآن
        </button>
        <p id="status"></p>
        <input type="hidden" id="lat">
        <input type="hidden" id="lng">
    </div>

    <button class="btn btn-save" onclick="updateFirebase()">
        حفظ وتحديث البيانات للجمهور 🚀
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    // إعدادات الفايربيس الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
        authDomain: "sofygramclinic.firebaseapp.com",
        databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
        projectId: "sofygramclinic",
        appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // جلب الـ ID الخاص بالدكتور من الرابط (مثال: admin_panel.html?id=user123)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    // وظيفة جلب الموقع
    window.getLocation = () => {
        if (navigator.geolocation) {
            document.getElementById('status').innerText = "جاري تحديد موقعك... 🛰️";
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lng').value = pos.coords.longitude;
                document.getElementById('status').innerText = "✅ تم التقاط الموقع بنجاح!";
            }, () => {
                alert("يرجى تفعيل الـ GPS في الموبايل");
                document.getElementById('status').innerText = "❌ فشل التقاط الموقع";
            });
        }
    };

    // وظيفة حفظ البيانات
    window.updateFirebase = () => {
        if(!userId) {
            alert("خطأ: لم يتم التعرف على حساب الدكتور!");
            return;
        }

        const openTime = document.getElementById('openT').value;
        const closeTime = document.getElementById('closeT').value;
        const lat = document.getElementById('lat').value;
        const lng = document.getElementById('lng').value;

        if(!openTime || !closeTime) {
            alert("يرجى تحديد ساعات العمل");
            return;
        }

        // إرسال التحديث للفايربيس
        update(ref(db, 'users/' + userId), {
            openTime: openTime,
            closeTime: closeTime,
            lat: lat || "", // إذا فارغ لا يغير القديم
            lng: lng || ""
        }).then(() => {
            alert("عاش تدبيرك! تم تحديث الوقت والموقع بنجاح.");
        }).catch((err) => {
            alert("حدث خطأ: " + err.message);
        });
    };
</script>

</body>
</html>

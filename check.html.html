<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>كاشف البيانات 🕵️‍♂️</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px; word-wrap: break-word;">
    <h2>جاري فحص محتويات قاعدة البيانات كاملة... 🔍</h2>
    <div id="status">جاري الاتصال...</div>
    <hr>
    <pre id="out" style="white-space: pre-wrap;"></pre>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { 
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", 
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" 
        };

        try {
            const app = initializeApp(config);
            const db = getDatabase(app);
            const out = document.getElementById('out');
            const status = document.getElementById('status');

            // جلب جذر قاعدة البيانات بالكامل (Root) لنتأكد من المسميات
            get(ref(db, '/')).then((snapshot) => {
                if (snapshot.exists()) {
                    status.innerHTML = "✅ تم جلب البيانات! انظر للأسفل:";
                    out.innerText = JSON.stringify(snapshot.val(), null, 2);
                } else {
                    status.innerHTML = "❌ قاعدة البيانات فارغة تماماً (Empty).";
                }
            }).catch(e => status.innerHTML = "❌ خطأ صلاحيات: " + e.message);
        } catch (e) { document.getElementById('status').innerHTML = "❌ خطأ كود: " + e.message; }
    </script>
</body>
</html>

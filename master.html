<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام ماستر | إدارة الاشتراكات 👑</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .master-card { background: #121212; padding: 20px; border-radius: 20px; max-width: 650px; margin: auto; border: 1px solid #ffd700; }
        .user-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            border-right: 5px solid #888; transition: 0.3s; text-align: right;
        }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.7; }
        .trial-user { border-right-color: #f1c40f; }

        .info-text { font-size: 12px; color: #bbb; margin-top: 5px; }
        .days-badge { background: #ffd700; color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 13px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-full { background: #2ecc71; color: white; }
        .btn-trial { background: #f1c40f; color: black; }
        .btn-del { background: #e74c3c; color: white; }
        .search-box { width: 90%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ffd700; background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="master-card">
        <img src="logo.png" style="width:100px; margin-bottom:10px;">
        <h2>إدارة الصلاحيات والوقت 👑</h2>
        <input type="text" id="mSearch" class="search-box" placeholder="ابحث عن اسم العيادة..." onkeyup="filterUsers()">
        <div id="usersList">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val();
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            const today = new Date();

            for(let id in users) {
                const u = users[id];
                const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                
                // حساب الأيام المتبقية
                let daysLeft = 0;
                if(expiry) {
                    const diffTime = expiry - today;
                    daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                }

                let statusClass = "expired-user";
                if(daysLeft > 3) statusClass = "active-user";
                else if(daysLeft <= 3 && daysLeft > 0) statusClass = "trial-user";
                
                list.innerHTML += `
                    <div class="user-row ${statusClass}" data-name="${u.name.toLowerCase()}">
                        <div>
                            <b>${u.name}</b> 
                            <span class="days-badge">${daysLeft > 0 ? daysLeft + ' يوم' : 'منتهي'}</span>
                            <div class="info-text">
                                📅 اشتراك: ${u.startDate || 'غير محدد'} <br>
                                ⏳ ينتهي: ${u.expiryDate || 'غير محدد'}
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-full" onclick="setSub('${id}', 30)">تفعيل شهر (30)</button>
                            <button class="btn btn-trial" onclick="setSub('${id}', 3)">تجربة (3 أيام)</button>
                            <button class="btn btn-del" onclick="delUser('${id}')">حذف</button>
                        </div>
                    </div>
                `;
            }
        });

        window.setSub = (id, days) => {
            const start = new Date();
            const expiry = new Date();
            expiry.setDate(start.getDate() + days);

            update(ref(db, `users/${id}`), {
                active: true,
                startDate: start.toLocaleDateString('en-GB'),
                expiryDate: expiry.toISOString(), // حفظ بصيغة قابلة للمقارنة
                paidStatus: days > 3 ? "yes" : "waiting"
            }).then(() => alert(`تم التفعيل لمدة ${days} يوم بنجاح ✅`));
        };

        window.delUser = (id) => {
            if(confirm("حذف العيادة نهائياً؟")) remove(ref(db, `users/${id}`));
        };

        window.filterUsers = () => {
            const val = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(val) ? "flex" : "none";
            });
        };
    </script>
</body>
</html>

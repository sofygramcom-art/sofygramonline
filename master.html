<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sofygram Master | التحكم بالاشتراكات 💰</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; padding: 20px; }
        .user-card { background: #121212; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-test { background: #3498db; color: white; }
        .btn-30 { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .days-left { color: #ffd700; font-size: 14px; }
        .waiting { border: 1px solid #ffd700; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>
    <h1>التحكم بالاشتراكات والطلبات 🚀</h1>
    <div id="usersList">جاري تحميل المشتركين والطلبات...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snapshot) => {
            const users = snapshot.val();
            const listDiv = document.getElementById('usersList');
            listDiv.innerHTML = "";

            for (let id in users) {
                const user = users[id];
                const expiryDate = user.expiryDate ? new Date(user.expiryDate) : null;
                const today = new Date();
                const timeLeft = expiryDate ? Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24)) : 0;
                
                const card = document.createElement('div');
                card.className = `user-card ${!user.active ? 'waiting' : ''}`;
                
                card.innerHTML = `
                    <div>
                        <strong>${user.name}</strong> (@${id}) <br>
                        <span class="days-left">${user.active ? 'المتبقي: ' + timeLeft + ' يوم' : '⚠️ بانتظار التفعيل'}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-test" onclick="activate('${id}', 3)">تفعيل Test (3 أيام)</button>
                        <button class="btn-30" onclick="activate('${id}', 30)">تفعيل 30 يوم</button>
                        <button class="btn-stop" onclick="stopUser('${id}')">إيقاف</button>
                    </div>
                `;
                listDiv.appendChild(card);
            }
        });

        window.activate = (id, days) => {
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + days);
            update(ref(db, 'users/' + id), {
                active: true,
                expiryDate: expiry.toISOString(),
                status: "● مفتوح الآن | Open"
            });
        };

        window.stopUser = (id) => {
            update(ref(db, 'users/' + id), {
                active: false,
                expiryDate: null,
                status: "مغلق - اشتراك منتهي"
            });
        };
    </script>
</body>
</html>

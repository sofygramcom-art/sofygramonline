<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة العليا 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 13px; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: #000; } .btn-edit { background: #3498db; } .btn-d { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2 style="color:var(--glow);">قفل الإدارة العليا 👑</h2>
        <input type="password" id="mPass" placeholder="كلمة المرور">
        <button onclick="masterLogin()" class="btn-king">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">إدارة الصلاحيات والبيانات 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن مشترك..." onkeyup="filterUsers()" style="width:95%;">
        <div id="usersList">انتظر.. جاري سحب البيانات فوراً...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(config); const db = getDatabase(app);

        window.masterLogin = async () => {
            const p = document.getElementById('mPass').value;
            const s1 = await get(ref(db, 'admin_settings/masterHash'));
            if (CryptoJS.MD5(p).toString() === s1.val() || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers();
            } else { alert("خطأ!"); }
        };

        function loadUsers() {
            // هذا السطر هو "المنقذ" الذي يتجاهل أي ذاكرة قديمة
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) { list.innerHTML = "لا يوجد مشتركين"; return; }
                Object.keys(data).reverse().forEach(id => {
                    const u = data[id];
                    list.innerHTML += `<div class="user-row active-user" data-name="${u.name.toLowerCase()}">
                        <div><b style="font-size:18px;">${u.name}</b><br><small>${u.phone || 'بدون هاتف'}</small></div>
                        <div class="btn-group">
                            <button class="btn btn-f" onclick="setSub('${id}', 30)">تفعيل شهر</button>
                            <button class="btn btn-t" onclick="setSub('${id}', 3)">3 أيام</button>
                            <button class="btn btn-d" onclick="delUser('${id}')">حذف</button>
                        </div>
                    </div>`;
                });
            }, (error) => { alert("خطأ في الاتصال بالقاعدة: " + error.message); });
        }

        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() });
        };
        window.delUser = (id) => { if(confirm("حذف؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة العليا 👑</title>
    <style>
        :root { --glow: #ffd700; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; transition: 0.5s; }
        
        /* أيقونة اللغة */
        .lang-icon { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 35px; filter: drop-shadow(0 0 10px #3498db); z-index: 10; }
        
        .master-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .user-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; 
            border-right: 5px solid #888; text-align: right; 
        }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.8; }

        input { padding: 12px; border-radius: 12px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 5px; width: 85%; font-size: 16px; }
        .btn-entry { background: #2ecc71; color: white; padding: 15px; width: 90%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; }
        .btn-entry:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; min-width: 140px; }
        .btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-full { background: #2ecc71; color: white; }
        .btn-trial { background: #f1c40f; color: black; }
        .btn-pass { background: #9b59b6; color: white; }
        .btn-del { background: #e74c3c; color: white; }
        
        .days-badge { background: #ffd700; color: #000; padding: 3px 10px; border-radius: 8px; font-weight: bold; font-size: 13px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="lang-icon" onclick="alert('اللغة ثابتة حالياً على العربية لضمان استقرار الأمان')">🌐</div>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:130px; margin-bottom:10px;">
        <h2 id="t-lock">قفل الإدارة العليا 👑</h2>
        
        <div id="passArea">
            <input type="password" id="mPass" placeholder="كلمة المرور">
        </div>
        
        <div id="secArea" style="display:none;">
            <p style="color:#e74c3c; font-size:13px; font-weight:bold;">⚠️ تم قفل كلمة السر (3 محاولات خطأ)</p>
            <input type="text" id="mSec" placeholder="سؤال الأمان: ما هو بلدك؟">
        </div>

        <button onclick="masterLogin()" class="btn-entry" id="t-entry">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">إدارة الصلاحيات والوقت 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن اسم العيادة أو المشترك..." onkeyup="filterUsers()" style="width:90%; margin-bottom:20px;">
        <div id="usersList">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 0;
        const secretKey = "1992"; // كلمة السر
        const secretCountry = "العراق"; // سؤال الأمان

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            const s = document.getElementById('mSec').value;

            // إذا دخل في مرحلة سؤال الأمان
            if (attempts >= 3) {
                if (s === secretCountry) {
                    showMaster();
                } else {
                    alert("سؤال الأمان غير صحيح!");
                }
                return;
            }

            // محاولة بكلمة السر
            if (p === secretKey) {
                showMaster();
            } else {
                attempts++;
                alert(`خطأ! المحاولات المتبقية: ${3 - attempts}`);
                if (attempts >= 3) {
                    document.getElementById('passArea').style.display = 'none';
                    document.getElementById('secArea').style.display = 'block';
                    document.getElementById('t-lock').innerText = "تحقق الأمان المتقدم 🛡️";
                }
            }
        };

        function showMaster() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('masterBox').style.display = 'block';
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const users = snap.val();
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const today = new Date();

                for(let id in users) {
                    const u = users[id];
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let daysLeft = expiry ? Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)) : 0;
                    let rowClass = daysLeft > 0 ? "active-user" : "expired-user";
                    let niceDate = expiry ? expiry.toLocaleDateString('en-GB') : '---';

                    list.innerHTML += `
                        <div class="user-row ${rowClass}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b style="font-size:18px;">${u.name}</b> <span class="days-badge">${daysLeft > 0 ? daysLeft + ' يوم' : 'منتهي'}</span>
                                <div style="font-size:11px; color:#aaa; margin-top:8px;">
                                    📅 اشتراك: ${u.startDate || '---'} | ⏳ ينتهي: ${niceDate}
                                </div>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-full" onclick="setSub('${id}', 30)">تفعيل شهر (30)</button>
                                <button class="btn btn-trial" onclick="setSub('${id}', 3)">تجربة (3 أيام)</button>
                                <button class="btn btn-pass" onclick="alert('رمز المشترك [${u.name}] هو: ${u.password}')">👁️ كشف الرمز</button>
                                <button class="btn btn-del" onclick="delUser('${id}')">حذف المشترك</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        window.setSub = (id, days) => {
            const expiry = new Date(); expiry.setDate(expiry.getDate() + days);
            update(ref(db, `users/${id}`), {
                active: true,
                startDate: new Date().toLocaleDateString('en-GB'),
                expiryDate: expiry.toISOString()
            }).then(() => alert(`تم التفعيل لـ ${days} يوم بنجاح ✅`));
        };

        window.delUser = (id) => {
            if(confirm("تحذير: هل أنت متأكد من حذف هذا المشترك نهائياً؟")) {
                remove(ref(db, `users/${id}`));
            }
        };

        window.filterUsers = () => {
            const val = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(val) ? "flex" : "none";
            });
        };
    </script>
</body>
</html>

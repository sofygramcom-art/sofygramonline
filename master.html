<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | الإدارة الملكية 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card: #121212; --rep: #9b59b6; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: var(--card); padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        
        input { padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 16px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 15px; width: 90%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; transition: 0.2s; }
        .btn-king:active { transform: translateY(4px); box-shadow: none; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .active-user { border-right-color: #2ecc71; }
        
        .ref-badge { background: rgba(155, 89, 182, 0.15); color: #d1adff; padding: 4px 10px; border-radius: 8px; font-size: 12px; border: 1px solid var(--rep); margin-top: 8px; display: inline-block; }
        
        .staff-section { margin-top: 40px; padding: 20px; border-top: 1px dashed #444; text-align: right; }
        .item-box { background: #000; padding: 15px; border-radius: 18px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        
        .btn-action { padding: 8px 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:100px; margin-bottom:15px;">
        <h2 style="color:var(--glow);">قفل الإدارة الملكية V3 👑</h2>
        <input type="password" id="mPass" placeholder="أدخل كلمة المرور">
        <button onclick="masterLogin()" class="btn-king">دخول السيطرة 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:var(--glow); margin-bottom:20px;">لوحة التحكم والأمان 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث بالاسم أو كود المندوب..." onkeyup="filterUsers()">
        
        <div id="usersList" style="margin-top:20px;">جاري تحميل البيانات الملكية...</div>

        <div class="staff-section">
            <h3 style="color:#3498db;"><i class="fas fa-users-cog"></i> إدارة الموظفين (Staff)</h3>
            <div id="staffList"></div>
            <button onclick="addStaff()" style="background:#3498db; color:white; border:none; padding:12px; width:100%; border-radius:12px; cursor:pointer; font-weight:bold;">+ إضافة موظف جديد</button>
        </div>

        <div class="staff-section" style="border-top-color: var(--rep);">
            <h3 style="color:var(--rep);"><i class="fas fa-handshake"></i> إدارة المناديب (Reps)</h3>
            <div id="repsList"></div>
            <button onclick="addRep()" style="background:var(--rep); color:white; border:none; padding:12px; width:100%; border-radius:12px; cursor:pointer; font-weight:bold;">+ إضافة مندوب جديد</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", 
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            // جرب الرمز الخاص بك هنا، أو استخدم 123456 مؤقتاً
            if(p === "123456" || p === "مصطفى_كودك_هنا") { 
                document.getElementById('authBox').style.display='none';
                document.getElementById('masterBox').style.display='block';
                loadData();
            } else { alert("رمز الدخول غير صحيح!"); }
        };

        function loadData() {
            // تحميل المستخدمين
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) { list.innerHTML = "لا يوجد مشتركين حالياً"; return; }
                
                for(let id in data) {
                    const u = data[id]; const refCode = u.referredBy || "مباشر";
                    list.innerHTML += `
                        <div class="user-row ${u.active ? 'active-user' : ''}" data-info="${u.name.toLowerCase()} ${refCode.toLowerCase()}">
                            <div style="flex:1;">
                                <b style="font-size:18px;">${u.name}</b> <br>
                                <span class="ref-badge"><i class="fas fa-link"></i> المصدر: ${refCode}</span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button class="btn-action" style="background:#2ecc71" onclick="activateUser('${id}')">تفعيل</button>
                                <button class="btn-action" style="background:#e74c3c" onclick="delItem('users/${id}')">حذف</button>
                            </div>
                        </div>`;
                }
            });

            // تحميل الموظفين والمناديب
            onValue(ref(db, 'staff'), (s) => renderList(s.val(), 'staffList', 'staff'));
            onValue(ref(db, 'reps'), (s) => renderList(s.val(), 'repsList', 'reps'));
        }

        function renderList(data, elementId, type) {
            const list = document.getElementById(elementId); list.innerHTML = "";
            for(let id in data) {
                const label = type === 'reps' ? `كود: ${id}` : data[id].name;
                list.innerHTML += `<div class="item-box"><span>${label}</span><button class="btn-action" style="background:#e74c3c" onclick="delItem('${type}/${id}')">حذف</button></div>`;
            }
        }

        window.activateUser = (id) => {
            const exp = new Date(); exp.setDate(exp.getDate() + 30);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(()=>alert("تم التفعيل ✅"));
        };

        window.addRep = () => {
            const code = prompt("أدخل كود المندوب (مثلاً M1):").toUpperCase();
            const pass = prompt("كلمة المرور الخاصة بهذا المندوب:");
            if(code && pass) set(ref(db, 'reps/' + code), { password: pass });
        };

        window.addStaff = () => {
            const name = prompt("اسم الموظف الجديد:"); const pass = prompt("كلمة السر:");
            if(name && pass) push(ref(db, 'staff'), { name, password: pass });
        };

        window.delItem = (path) => { if(confirm("هل أنت متأكد من الحذف؟")) remove(ref(db, path)); };
        
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-info').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

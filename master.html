<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة الملكية 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #0a0f1d; --card: #161c2d; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: auto; }
        .master-card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid rgba(255,215,0,0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-bottom: 20px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e2538; padding: 18px; border-radius: 20px; margin-bottom: 12px; border-right: 6px solid var(--glow); text-align: right; }
        .badge { background: var(--glow); color: #000; padding: 4px 10px; border-radius: 10px; font-size: 13px; font-weight: bold; }
        .btn { border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; }
        .btn-activate { background: #2ecc71; margin-left: 5px; }
        .btn-delete { background: #e74c3c; }
        input { width: 90%; padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="authBox" class="master-card">
            <h2 style="color:var(--glow);">قفل الإدارة العليا 👑</h2>
            <input type="password" id="mPass" placeholder="الرمز السري">
            <button onclick="masterLogin()" class="btn btn-activate" style="width: 100%; padding: 15px; font-size: 18px;">دخول الملك 👑</button>
        </div>

        <div id="masterBox" style="display:none;">
            <div class="master-card">
                <h2 style="color:var(--glow);">لوحة التحكم بالعيادات 🏢</h2>
                <input type="text" id="mSearch" placeholder="بحث عن عيادة..." onkeyup="filterUsers()" style="font-size: 15px;">
            </div>
            
            <div id="usersList">جاري التحميل...</div>

            <button onclick="changeMasterPass()" style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:10px; margin-top:20px; cursor:pointer;">⚙️ تعيين رمز ماستر جديد</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, remove, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(config); const db = getDatabase(app);

        window.masterLogin = async () => {
            const p = document.getElementById('mPass').value;
            const snap = await get(ref(db, 'admin_settings/masterHash'));
            const hash = snap.val() || "e10adc3949ba59abbe56e057f20f883e"; // الافتراضي 123456
            
            if (CryptoJS.MD5(p).toString() === hash || p === "123456") {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers();
            } else { alert("الرمز خطأ!"); }
        };

        function loadUsers() {
            onValue(ref(db, 'businesses'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) return;
                Object.keys(data).reverse().forEach(id => {
                    const u = data[id];
                    const exp = u.expiry ? new Date(u.expiry) : null;
                    let days = exp ? Math.ceil((exp - new Date()) / 86400000) : 0;
                    list.innerHTML += `
                        <div class="user-row" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b style="cursor:pointer" onclick="editName('${id}','${u.name}')">${u.name}</b> 
                                <span class="badge">${days > 0 ? days + ' يوم' : 'منتهي'}</span><br>
                                <small style="cursor:pointer" onclick="editPass('${id}','${u.password}')">🔑 الرمز: ${u.password || 'اضغط للتعيين'}</small>
                            </div>
                            <div style="display:flex">
                                <button class="btn btn-activate" onclick="setSub('${id}')">تفعيل</button>
                                <button class="btn btn-delete" onclick="delUser('${id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        window.setSub = (id) => {
            const exp = new Date(); exp.setDate(exp.getDate() + 30);
            update(ref(db, `businesses/${id}`), { active: true, expiry: exp.toISOString() });
        };

        window.editPass = (id, old) => { const n = prompt("الرمز الجديد للعيادة:", old); if(n) update(ref(db, `businesses/${id}`), { password: n }); };
        window.editName = (id, old) => { const n = prompt("اسم العيادة الجديد:", old); if(n) update(ref(db, `businesses/${id}`), { name: n }); };
        window.delUser = (id) => { if(confirm("حذف العيادة نهائياً؟")) remove(ref(db, `businesses/${id}`)); };

        window.changeMasterPass = () => {
            const n = prompt("أدخل رمز الماستر الجديد:");
            if(n && n.length >= 4) {
                const h = CryptoJS.MD5(n).toString();
                set(ref(db, 'admin_settings/masterHash'), h).then(() => {
                    alert("تم تغيير رمز الماستر بنجاح! سيتم إعادة تحميل الصفحة.");
                    location.reload();
                });
            } else { alert("الرمز قصير جداً!"); }
        };

        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

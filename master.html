<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الدخول المباشر 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; }
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: #121212; padding: 25px; border-radius: 35px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        input { padding: 15px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 18px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 18px; width: 90%; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 4px 0 #27ae60; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #2ecc71; text-align: right; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2 style="color:var(--glow);">قفل الإدارة الملكية 👑</h2>
        <input type="password" id="mPass" placeholder="أدخل الرمز الخاص بك">
        <button onclick="masterLogin()" class="btn-king">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">قائمة العيادات والاشتراكات 👑</h2>
        <div id="usersList">جاري جلب البيانات...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(config); const db = getDatabase(app);

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            // تم تعديل الشرط ليقبل رمزك أياً كان (مؤقتاً) للدخول وإصلاح الرمز
            if (p === "123456" || p === "000000" || p === "2026") { 
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('masterBox').style.display = 'block';
                loadUsers();
            } else { alert("خطأ في الرمز!"); }
        };

        function loadUsers() {
            onValue(ref(db, 'businesses'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                if(!data) { list.innerHTML = "لا توجد عيادات مسجلة"; return; }
                Object.keys(data).reverse().forEach(id => {
                    const u = data[id];
                    list.innerHTML += `
                        <div class="user-row">
                            <div><b>${u.name}</b><br><small>الرمز: ${u.password}</small></div>
                            <button style="background:#2ecc71; color:white; border:none; padding:8px; border-radius:10px;" onclick="setSub('${id}')">تفعيل شهر</button>
                        </div>`;
                });
            });
        }
        window.setSub = (id) => {
            const exp = new Date(); exp.setDate(exp.getDate() + 30);
            update(ref(db, `businesses/${id}`), { active: true, expiry: exp.toISOString() });
            alert("تم التمديد بنجاح ✅");
        };
    </script>
</body>
</html>

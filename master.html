<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | الإدارة 👑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: var(--card); padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); }
        input { padding: 12px; border-radius: 12px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; }
        .btn-king { background: #2ecc71; color: white; padding: 12px; width: 90%; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .ref-tag { background: rgba(155, 89, 182, 0.2); color: #d1adff; padding: 2px 6px; border-radius: 5px; font-size: 11px; }
        .staff-section { margin-top: 30px; padding: 15px; border-top: 1px dashed #444; text-align: right; }
        .item-box { background: #000; padding: 10px; border-radius: 12px; margin: 5px 0; display: flex; justify-content: space-between; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2>دخول الإدارة 👑</h2>
        <input type="password" id="mPass" placeholder="رمز الدخول">
        <button onclick="masterLogin()" class="btn-king">دخول</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:var(--glow);">لوحة التحكم 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث بالاسم أو المندوب..." onkeyup="filterUsers()">
        <div id="usersList">جاري التحميل...</div>

        <div class="staff-section">
            <h3 style="color:#3498db;">إدارة الموظفين</h3>
            <div id="staffList"></div>
            <button onclick="addStaff()" style="background:#3498db; color:white; border:none; padding:8px; border-radius:8px; width:100%;">+ إضافة موظف</button>
        </div>

        <div class="staff-section">
            <h3 style="color:#9b59b6;">إدارة المناديب (Reps)</h3>
            <div id="repsList"></div>
            <button onclick="addRep()" style="background:#9b59b6; color:white; border:none; padding:8px; border-radius:8px; width:100%;">+ إضافة مندوب</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", 
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.masterLogin = () => {
            if(document.getElementById('mPass').value === "123456") {
                document.getElementById('authBox').style.display='none';
                document.getElementById('masterBox').style.display='block';
                loadData();
            } else { alert("رمز خطأ!"); }
        };

        function loadData() {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                for(let id in data) {
                    const u = data[id]; const refCode = u.referredBy || "مباشر";
                    list.innerHTML += `
                        <div class="user-row ${u.active ? 'active-user' : ''}" data-info="${u.name.toLowerCase()} ${refCode.toLowerCase()}">
                            <div style="flex:1;">
                                <b>${u.name}</b> <br>
                                <span class="ref-tag">المندوب: ${refCode}</span>
                            </div>
                            <button onclick="setSub('${id}')" style="background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:8px;">تفعيل</button>
                            <button onclick="delItem('users/${id}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:8px; margin-right:5px;">حذف</button>
                        </div>`;
                }
            });

            onValue(ref(db, 'staff'), (snap) => {
                const list = document.getElementById('staffList'); list.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `<div class="item-box"><span>${data[id].name}</span><button onclick="delItem('staff/${id}')">حذف</button></div>`;
                }
            });

            onValue(ref(db, 'reps'), (snap) => {
                const list = document.getElementById('repsList'); list.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `<div class="item-box"><span>كود: ${id}</span><button onclick="delItem('reps/${id}')">حذف</button></div>`;
                }
            });
        }

        window.addRep = () => {
            const code = prompt("كود المندوب (مثلاً M1):");
            const pass = prompt("كلمة المرور:");
            if(code && pass) set(ref(db, 'reps/' + code.toUpperCase()), { password: pass });
        };

        window.addStaff = () => {
            const name = prompt("اسم الموظف:"); const pass = prompt("الباسورد:");
            if(name && pass) push(ref(db, 'staff'), { name, password: pass });
        };

        window.setSub = (id) => {
            const exp = new Date(); exp.setDate(exp.getDate() + 30);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(()=>alert("تم التفعيل"));
        };

        window.delItem = (path) => { if(confirm("هل أنت متأكد؟")) remove(ref(db, path)); };

        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-info').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

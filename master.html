<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master V3 | الإدارة الشاملة 👑</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glow: #ffd700; --bg: #050a14; --card: #121212; --rep: #9b59b6; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .master-card { background: var(--card); padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        input { padding: 14px; border-radius: 15px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; font-size: 16px; outline: none; }
        .btn-king { background: #2ecc71; color: white; padding: 15px; width: 90%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-right: 6px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .ref-badge { background: rgba(155, 89, 182, 0.2); color: #d1adff; padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #9b59b6; margin-top: 5px; display: inline-block; }
        .staff-section { margin-top: 40px; padding: 20px; border-top: 2px dashed #444; text-align: right; }
        .item-box { background: #000; padding: 12px; border-radius: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 130px; }
        .btn { padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; color: white; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <h2>قفل الإدارة الملكية 👑</h2>
        <input type="password" id="mPass" placeholder="كلمة المرور">
        <button onclick="masterLogin()" class="btn-king">دخول السيطرة</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:var(--glow);">لوحة التحكم والأمان 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث بالاسم أو كود المندوب..." onkeyup="filterUsers()">
        <div id="usersList">جاري التحميل...</div>

        <div class="staff-section">
            <h3 style="color:#3498db;"><i class="fas fa-users-cog"></i> إدارة الموظفين</h3>
            <div id="staffList"></div>
            <button onclick="addStaff()" style="background:#3498db; color:white; border:none; padding:10px; width:100%; border-radius:10px;">+ إضافة موظف</button>
        </div>

        <div class="staff-section" style="border-top-color: var(--rep);">
            <h3 style="color:var(--rep);"><i class="fas fa-handshake"></i> إدارة المناديب (Reps)</h3>
            <div id="repsList"></div>
            <button onclick="addRep()" style="background:var(--rep); color:white; border:none; padding:10px; width:100%; border-radius:10px;">+ إضافة مندوب جديد</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        window.masterLogin = () => {
            if(document.getElementById('mPass').value === "123456") {
                document.getElementById('authBox').style.display='none';
                document.getElementById('masterBox').style.display='block';
                loadAll();
            }
        };

        function loadAll() {
            // تحميل المشتركين
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const list = document.getElementById('usersList'); list.innerHTML = "";
                for(let id in data) {
                    const u = data[id]; const refCode = u.referredBy || "مباشر";
                    list.innerHTML += `
                        <div class="user-row ${u.active ? 'active-user' : ''}" data-info="${u.name.toLowerCase()} ${refCode.toLowerCase()}">
                            <div style="flex:1;">
                                <b>${u.name}</b> <br>
                                <span class="ref-badge">المندوب: ${refCode}</span>
                            </div>
                            <div class="btn-group">
                                <button class="btn" style="background:#2ecc71" onclick="setSub('${id}', 30)">تفعيل شهر</button>
                                <button class="btn" style="background:#e74c3c" onclick="delUser('${id}')">حذف</button>
                            </div>
                        </div>`;
                }
            });

            // تحميل الموظفين
            onValue(ref(db, 'staff'), (snap) => {
                const list = document.getElementById('staffList'); list.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `<div class="item-box"><span>${data[id].name} (${data[id].password})</span><button onclick="delItem('staff/${id}')">حذف</button></div>`;
                }
            });

            // تحميل المناديب
            onValue(ref(db, 'reps'), (snap) => {
                const list = document.getElementById('repsList'); list.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `<div class="item-box"><span>كود: <b>${id}</b> | رمز: ${data[id].password}</span><button onclick="delItem('reps/${id}')">حذف</button></div>`;
                }
            });
        }

        window.addRep = () => {
            const code = prompt("أدخل كود المندوب (مثلاً M1):").toUpperCase();
            const pass = prompt("أدخل كلمة مرور المندوب:");
            if(code && pass) set(ref(db, 'reps/' + code), { password: pass });
        };

        window.addStaff = () => {
            const name = prompt("اسم الموظف:"); const pass = prompt("الباسورد:");
            if(name && pass) push(ref(db, 'staff'), { name, password: pass });
        };

        window.setSub = (id, days) => {
            const exp = new Date(); exp.setDate(exp.getDate() + days);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(()=>alert("تم التفعيل"));
        };

        window.delItem = (path) => { if(confirm("حذف؟")) remove(ref(db, path)); };
        window.delUser = (id) => { if(confirm("حذف المشترك؟")) remove(ref(db, 'users/' + id)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-info').includes(v) ? "flex" : "none");
        };
    </script>
</body>
</html>

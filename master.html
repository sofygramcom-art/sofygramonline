<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة العليا 👑</title>
    <style>
        :root { --glow: #ffd700; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* نظام اللغات */
        .lang-icon { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 30px; filter: drop-shadow(0 0 8px var(--glow)); z-index: 1000; }
        .lang-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .lang-modal { background: #121212; border: 2px solid var(--glow); border-radius: 30px; padding: 20px; width: 260px; }
        .lang-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .master-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 650px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .user-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 15px; 
            border-right: 5px solid #888; text-align: right; 
        }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.8; }

        input { padding: 12px; border-radius: 12px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 5px; width: 85%; }
        .btn-entry { background: #2ecc71; color: white; padding: 15px; width: 90%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; min-width: 130px; }
        .btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-full { background: #2ecc71; color: white; }
        .btn-trial { background: #f1c40f; color: black; }
        .btn-pass { background: #9b59b6; color: white; }
        .btn-del { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="lang-icon" onclick="openLang()">🌐</div>

    <div class="lang-overlay" id="lOverlay" onclick="closeLang()">
        <div class="lang-modal" onclick="event.stopPropagation()">
            <div class="lang-item" onclick="setLang('ar')">🇮🇶 العربية</div>
            <div class="lang-item" onclick="setLang('en')">🇺🇸 English</div>
        </div>
    </div>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:130px; margin-bottom:10px;">
        <h2 id="t-lock">قفل الإدارة العليا 👑</h2>
        <div id="passArea"><input type="password" id="mPass" placeholder="كلمة المرور"></div>
        <div id="secArea" style="display:none;">
            <p style="color:#e74c3c; font-size:12px;">⚠️ تم القفل. استخدم سؤال الأمان:</p>
            <input type="text" id="mSec" placeholder="ما هو بلدك؟">
        </div>
        <button onclick="masterLogin()" class="btn-entry" id="t-entry">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 id="t-mtitle" style="color:#ffd700;">إدارة الصلاحيات والوقت 👑</h2>
        <input type="text" id="mSearch" placeholder="..." onkeyup="filterUsers()" style="width:90%;">
        <div id="usersList">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 0;
        const correctPass = "1992"; 
        const correctSec = "العراق";

        const dict = {
            ar: { lock: "قفل الإدارة العليا 👑", entry: "دخول الملك 👑", mtitle: "إدارة الصلاحيات والوقت 👑", ph: "ابحث عن مشترك...", f30: "تفعيل شهر (30)", f3: "تجربة (3 أيام)", fdel: "حذف", fpass: "👁️ كشف الرمز", exp: "ينتهي في:" },
            en: { lock: "Master Lock 👑", entry: "King Login 👑", mtitle: "Subscription Manager 👑", ph: "Search user...", f30: "Activate 30 Days", f3: "Trial 3 Days", fdel: "Delete", fpass: "👁️ Show Pass", exp: "Expires on:" }
        };
        let curLang = 'ar';

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            const s = document.getElementById('mSec').value;

            if (attempts >= 3) {
                if (s === correctSec) unlock();
                else alert("خطأ!");
                return;
            }

            if (p === correctPass) unlock();
            else {
                attempts++;
                alert("رمز خطأ! متبقي: " + (3-attempts));
                if (attempts >= 3) {
                    document.getElementById('passArea').style.display='none';
                    document.getElementById('secArea').style.display='block';
                }
            }
        };

        function unlock() {
            document.getElementById('authBox').style.display='none';
            document.getElementById('masterBox').style.display='block';
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const users = snap.val();
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const today = new Date();

                for(let id in users) {
                    const u = users[id];
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let daysLeft = expiry ? Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)) : 0;
                    let rowClass = daysLeft > 0 ? "active-user" : "expired-user";

                    list.innerHTML += `
                        <div class="user-row ${rowClass}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b>${u.name}</b> <br>
                                <small>${dict[curLang].exp} ${expiry ? expiry.toLocaleDateString('en-GB') : '---'}</small>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-full" onclick="setSub('${id}', 30)">${dict[curLang].f30}</button>
                                <button class="btn btn-trial" onclick="setSub('${id}', 3)">${dict[curLang].f3) }</button>
                                <button class="btn btn-pass" onclick="alert('الرمز: ${u.password}')">${dict[curLang].fpass}</button>
                                <button class="btn btn-del" onclick="delUser('${id}')">${dict[curLang].fdel}</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        window.setSub = (id, days) => {
            const expiry = new Date(); expiry.setDate(expiry.getDate() + days);
            update(ref(db, `users/${id}`), { active: true, expiryDate: expiry.toISOString(), startDate: new Date().toLocaleDateString('en-GB') })
            .then(() => alert("تم التفعيل ✅"));
        };

        window.delUser = (id) => { if(confirm("حذف؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const v = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(v) ? "flex" : "none");
        };

        window.openLang = () => document.getElementById('lOverlay').style.display='flex';
        window.closeLang = () => document.getElementById('lOverlay').style.display='none';
        window.setLang = (l) => {
            curLang = l; closeLang();
            document.getElementById('t-lock').innerText = dict[l].lock;
            document.getElementById('t-entry').innerText = dict[l].entry;
            document.getElementById('t-mtitle').innerText = dict[l].mtitle;
            document.getElementById('mSearch').placeholder = dict[l].ph;
            document.body.dir = (l === 'ar') ? 'rtl' : 'ltr';
            loadUsers();
        };
    </script>
</body>
</html>

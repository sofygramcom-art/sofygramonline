<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام ماستر | الإدارة المالية والتقنية 👑</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .master-card { background: #121212; padding: 20px; border-radius: 20px; max-width: 600px; margin: auto; border: 1px solid #ffd700; }
        .user-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            border-right: 5px solid #888; transition: 0.3s;
        }
        /* تمييز الحالات بالألوان */
        .active-user { border-right-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .waiting-user { border-right-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }
        
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; margin: 2px; }
        .btn-activate { background: #2ecc71; color: white; }
        .btn-wait { background: #f1c40f; color: black; }
        .btn-delete { background: #e74c3c; color: white; }
        
        .pay-status { font-size: 20px; margin-left: 10px; }
        .search-box { width: 90%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ffd700; background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="master-card">
        <img src="logo.png" style="width:120px; margin-bottom:15px;">
        <h2>لوحة التحكم العليا 👑</h2>
        <input type="text" id="mSearch" class="search-box" placeholder="بحث عن عيادة أو محل..." onkeyup="filterUsers()">
        
        <div id="usersList">جاري تحميل المشتركين...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val();
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            
            for(let id in users) {
                const u = users[id];
                const isPaid = u.paidStatus === "yes";
                const isWaiting = u.paidStatus === "waiting";
                
                let payIcon = isPaid ? "✅" : (isWaiting ? "⏳" : "❌");
                let rowClass = u.active ? (isPaid ? "active-user" : "waiting-user") : "";

                list.innerHTML += `
                    <div class="user-row ${rowClass}" data-name="${u.name.toLowerCase()}">
                        <div style="text-align: right;">
                            <span class="pay-status">${payIcon}</span>
                            <b>${u.name}</b> <br>
                            <small style="color:#888;">ID: ${id}</small>
                        </div>
                        <div>
                            <button class="btn btn-activate" onclick="upStatus('${id}', true, 'yes')">تم الدفع ✅</button>
                            <button class="btn btn-wait" onclick="upStatus('${id}', true, 'waiting')">تجربة ⏳</button>
                            <button class="btn btn-delete" onclick="delUser('${id}')">حذف 🗑️</button>
                        </div>
                    </div>
                `;
            }
        });

        window.upStatus = (id, active, pay) => {
            update(ref(db, `users/${id}`), { active: active, paidStatus: pay })
            .then(() => alert("تم تحديث الحالة بنجاح 🚀"));
        };

        window.delUser = (id) => {
            if(confirm("هل أنت متأكد من حذف هذا المشترك نهائياً؟")) {
                remove(ref(db, `users/${id}`));
            }
        };

        window.filterUsers = () => {
            const val = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(row => {
                row.style.display = row.getAttribute('data-name').includes(val) ? "flex" : "none";
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Master | الإدارة العليا 👑</title>
    <style>
        :root { --glow: #ffd700; }
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .master-card { background: #121212; padding: 25px; border-radius: 30px; max-width: 600px; margin: 20px auto; border: 1px solid var(--glow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-right: 5px solid #888; text-align: right; }
        .active-user { border-right-color: #2ecc71; }
        .expired-user { border-right-color: #e74c3c; opacity: 0.8; }

        input { padding: 12px; border-radius: 12px; border: 1px solid var(--glow); background: #000; color: #fff; text-align: center; margin: 10px; width: 80%; font-size: 16px; }
        .btn-entry { background: #2ecc71; color: white; padding: 15px; width: 85%; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #27ae60; }
        .btn-entry:active { transform: translateY(4px); box-shadow: none; }
        
        .btn { padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 11px; margin: 2px; }
        .btn-pass { background: #9b59b6; color: white; }
        .btn-del { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div id="authBox" class="master-card">
        <img src="logo.png" style="width:130px; margin-bottom:10px;">
        <h2 id="lockTitle">قفل الإدارة العليا 👑</h2>
        
        <div id="passArea">
            <input type="password" id="mPass" placeholder="كلمة المرور">
        </div>

        <div id="secArea" style="display:none;">
            <p style="color:#e74c3c; font-size:13px;">⚠️ تم قفل كلمة السر. استخدم سؤال الأمان:</p>
            <input type="text" id="mSec" placeholder="ما هو بلدك؟">
        </div>

        <button onclick="masterLogin()" class="btn-entry">دخول الملك 👑</button>
    </div>

    <div id="masterBox" class="master-card" style="display:none;">
        <h2 style="color:#ffd700;">إدارة الصلاحيات والوقت 👑</h2>
        <input type="text" id="mSearch" placeholder="ابحث عن مشترك..." onkeyup="filterUsers()" style="width:90%;">
        <div id="usersList">جاري التحميل...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let attempts = 0;
        const correctPass = "1234"; // غير الرمز من هنا
        const correctSec = "العراق"; // سؤال الأمان

        window.masterLogin = () => {
            const p = document.getElementById('mPass').value;
            const s = document.getElementById('mSec').value;

            // إذا كان في مرحلة سؤال الأمان
            if (attempts >= 3) {
                if (s === correctSec) {
                    unlockMaster();
                } else {
                    alert("سؤال الأمان خاطئ أيضاً!");
                }
                return;
            }

            // محاولة الدخول بكلمة السر
            if (p === correctPass) {
                unlockMaster();
            } else {
                attempts++;
                alert(`كلمة السر خطأ! المحاولات المتبقية: ${3 - attempts}`);
                if (attempts >= 3) {
                    document.getElementById('passArea').style.display = 'none';
                    document.getElementById('secArea').style.display = 'block';
                    document.getElementById('lockTitle').innerText = "تحقق الأمان المتقدم 🛡️";
                }
            }
        };

        function unlockMaster() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('masterBox').style.display = 'block';
            loadUsers();
        }

        function loadUsers() {
            onValue(ref(db, 'users'), (snap) => {
                const users = snap.val();
                const list = document.getElementById('usersList'); list.innerHTML = "";
                const today = new Date();

                for(let id in users) {
                    const u = users[id];
                    const expiry = u.expiryDate ? new Date(u.expiryDate) : null;
                    let daysLeft = expiry ? Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)) : 0;
                    let statusClass = daysLeft > 0 ? "active-user" : "expired-user";

                    list.innerHTML += `
                        <div class="user-row ${statusClass}" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b>${u.name}</b> <br>
                                <small>ينتهي في: ${expiry ? expiry.toLocaleDateString('en-GB') : '---'}</small>
                            </div>
                            <div>
                                <button class="btn btn-pass" onclick="alert('رمز المشترك: ${u.password}')">👁️ كشف الرمز</button>
                                <button class="btn btn-del" onclick="delUser('${id}')">حذف</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        window.delUser = (id) => { if(confirm("حذف نهائي؟")) remove(ref(db, `users/${id}`)); };
        window.filterUsers = () => {
            const val = document.getElementById('mSearch').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(val) ? "flex" : "none");
        };
    </script>
</body>
</html>

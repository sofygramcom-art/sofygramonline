<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Staff | لوحة المعاونين 👥</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .card { background: #121212; padding: 25px; border-radius: 35px; max-width: 600px; margin: 20px auto; border: 1px solid #3498db; }
        input { padding: 15px; border-radius: 15px; background: #000; color: #fff; text-align: center; margin: 10px; width: 85%; border: 1px solid #3498db; }
        .user-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 15px; border-radius: 20px; margin-bottom: 10px; text-align: right; }
        .btn { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; margin: 2px; }
        .btn-f { background: #2ecc71; } .btn-t { background: #f1c40f; color: black; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth" class="card">
        <h2>دخول المعاونين 👤</h2>
        <input type="text" id="user" placeholder="الاسم">
        <input type="password" id="pass" placeholder="الرمز">
        <button onclick="login()" style="background:#3498db; color:white; padding:15px; width:90%; border-radius:15px; border:none; font-weight:bold;">دخول 👤</button>
    </div>

    <div id="box" class="card" style="display:none;">
        <h2 id="welcome">أهلاً بك أيها المعاون</h2>
        <input type="text" id="search" placeholder="ابحث..." onkeyup="filter()">
        <div id="list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const config = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com" };
        const app = initializeApp(config); const db = getDatabase(app);
        let myRole = "";

        window.login = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const s = await get(ref(db, 'staff/' + u));
            if(s.exists() && s.val().pass === p) {
                myRole = s.val().role;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('box').style.display = 'block';
                document.getElementById('welcome').innerText = "لوحة المعاون " + (myRole === 'gold' ? 'الذهبي' : myRole === 'silver' ? 'الفضي' : 'البرونزي');
                load();
            } else { alert("خطأ في البيانات!"); }
        };

        function load() {
            onValue(ref(db, 'users'), (snap) => {
                const data = snap.val(); const div = document.getElementById('list'); div.innerHTML = "";
                for(let id in data) {
                    const u = data[id];
                    // حماية الخصوصية للبرونزي
                    let phoneDisplay = (myRole === 'bronze') ? u.phone.substring(0,5) + "****" : u.phone;
                    div.innerHTML += `
                        <div class="user-row" data-name="${u.name.toLowerCase()}">
                            <div>
                                <b>${u.name}</b><br>
                                <small>${phoneDisplay}</small>
                            </div>
                            <div>
                                <button class="btn btn-f ${myRole === 'bronze' ? 'hidden' : ''}" onclick="setSub('${id}', 30)">شهر</button>
                                <button class="btn btn-t" onclick="setSub('${id}', 3)">3 أيام</button>
                            </div>
                        </div>`;
                }
            });
        }

        window.setSub = (id, d) => {
            const exp = new Date(); exp.setDate(exp.getDate() + d);
            update(ref(db, `users/${id}`), { active: true, expiryDate: exp.toISOString() }).then(() => alert("تم ✅"));
        };

        window.filter = () => {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(q) ? "flex" : "none");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام سكرتير | الإدارة السريعة ⚡</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .admin-card { background: #121212; padding: 20px; border-radius: 25px; max-width: 400px; margin: auto; border: 1px solid #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
        .num-view { font-size: 110px; font-weight: bold; margin: 10px 0; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .btn-ctrl { width: 90px; height: 90px; border-radius: 50%; border: none; font-size: 50px; cursor: pointer; color: white; margin: 10px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .plus { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .minus { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .btn-ctrl:active { transform: scale(0.9); }
        select, textarea, input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; background: #1e293b; color: white; border: 1px solid #333; font-size: 16px; text-align: center; }
        .save-btn { width: 95%; padding: 18px; background: #ffd700; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; color: #000; margin-top: 10px; }
        .reset-btn { background: none; color: #e74c3c; border: 1px solid #e74c3c; padding: 8px 15px; border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .reset-btn:hover { background: #e74c3c; color: #fff; }
    </style>
</head>
<body>
    <div id="loginBox" class="admin-card">
        <img src="logo.png" style="width:150px; margin-bottom:20px;">
        <h2 style="color:#ffd700;">دخول المنصة 🔐</h2>
        <input type="text" id="u" placeholder="اسم المستخدم">
        <input type="password" id="p" placeholder="كلمة المرور">
        <button onclick="login()" class="save-btn">دخول</button>
    </div>

    <div id="controlBox" class="admin-card" style="display:none;">
        <img src="logo.png" style="width:100px;">
        <h2 id="cName" style="color:#ffd700; margin:10px 0;"></h2>
        
        <div class="num-view" id="n">0</div>
        
        <div style="display:flex; justify-content:center;">
            <button class="btn-ctrl minus" onclick="ch(-1)">-</button>
            <button class="btn-ctrl plus" onclick="ch(1)">+</button>
        </div>
        
        <p style="font-size:12px; color:#888; margin-bottom:20px;">الرقم يتحدث تلقائياً عند الضغط ⚡</p>

        <select id="st">
            <option value="🟢 مفتوح الآن | Open">🟢 مفتوح الآن</option>
            <option value="🟡 في الطريق | Coming Soon">🟡 في الطريق / قريباً</option>
            <option value="🔴 مغلق حالياً | Closed">🔴 مغلق حالياً</option>
        </select>
        
        <textarea id="nt" placeholder="اكتب ملاحظة للمراجعين هنا..." rows="3"></textarea>
        
        <button onclick="upDetails()" class="save-btn">تحديث الحالة والملاحظة 🚀</button>
        
        <br>
        <button onclick="resetNum()" class="reset-btn">🔄 تصفير العداد لنهاية الدوام</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let curUser = ""; 
        let curNum = 0;

        window.login = () => {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value.trim();
            
            get(child(ref(db), `users/${user}`)).then((s) => {
                if(s.exists() && s.val().password == pass) {
                    if(!s.val().active) return alert("الحساب بانتظار التفعيل من الإدارة العليا!");
                    
                    curUser = user;
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('controlBox').style.display = 'block';
                    
                    // الاستماع للبيانات مباشرة
                    onValue(ref(db, `users/${curUser}`), (snap) => {
                        const data = snap.val();
                        curNum = data.currentNum || 0;
                        document.getElementById('n').innerText = curNum;
                        document.getElementById('cName').innerText = data.name;
                        document.getElementById('nt').value = data.note || "";
                        document.getElementById('st').value = data.status || "🟢 مفتوح الآن | Open";
                    });
                } else {
                    alert("خطأ في اسم المستخدم أو كلمة المرور!");
                }
            }).catch(e => alert("حدث خطأ في الاتصال!"));
        };

        // تحديث الرقم تلقائياً فور الضغط
        window.ch = (v) => { 
            curNum += v; 
            if(curNum < 0) curNum = 0; 
            update(ref(db, `users/${curUser}`), { currentNum: curNum });
        };
        
        // تحديث الحالة والملاحظة
        window.upDetails = () => {
            update(ref(db, `users/${curUser}`), {
                status: document.getElementById('st').value,
                note: document.getElementById('nt').value
            }).then(() => alert("تم تحديث البيانات بنجاح ✅"));
        };

        // دالة التصفير الآمنة
        window.resetNum = () => {
            const confirmMsg = "⚠️ هل أنت متأكد من تصفير العداد؟\nAre you sure you want to reset?";
            if(confirm(confirmMsg)) {
                update(ref(db, `users/${curUser}`), { currentNum: 0 })
                .then(() => alert("تم التصفير بنجاح ✅"));
            }
        };
    </script>
</body>
</html>

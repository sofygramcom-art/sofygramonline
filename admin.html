<!DOCTYPE html>
<html lang="ar" dir="rtl" id="admin-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Online | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-color: #2ecc71; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; transition: 0.3s; }
        .lang-btn { position: absolute; top: 15px; left: 15px; background: #222; border: 1px solid var(--main-color); color: var(--main-color); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        
        .card { background: #111; padding: 25px; border-radius: 20px; border: 2px solid var(--main-color); max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .num-display { font-size: 8rem; color: #f39c12; margin: 5px 0; font-weight: bold; }
        input { padding: 12px; border-radius: 12px; border: 1px solid #333; width: 88%; background: #000; color: #fff; margin-bottom: 15px; text-align: center; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--main-color); }
        
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 15px 25px; font-size: 1.2rem; border-radius: 12px; cursor: pointer; font-weight: bold; color: #fff; transition: 0.2s; }
        .btn-next { background: var(--main-color); flex: 2; color: #000; }
        .btn-prev { background: #e67e22; flex: 1; }
        .timer-tag { background: #222; padding: 8px 15px; border-radius: 10px; color: #f1c40f; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; border: 1px solid #444; }
        
        [lang="en"] { direction: ltr; }
    </style>
</head>
<body>

    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">English</button>

    <div class="card">
        <div id="expiry-timer" class="timer-tag">جاري فحص حالة الاشتراك...</div>
        <h2 id="display-title">لوحة التحكم</h2>
        
        <input type="text" id="name-in" placeholder="اسم النشاط">
        <input type="text" id="msg-in" placeholder="ملاحظات للزبائن">
        
        <div class="num-display" id="num-out">0</div>
        
        <div class="btn-group">
            <button class="btn-prev" id="btn-prev" onclick="changeNum(-1)">السابق</button>
            <button class="btn-next" id="btn-next" onclick="changeNum(1)">التالي</button>
        </div>
        
        <button style="background:#444; width:100%; border-radius:12px;" id="btn-reset" onclick="resetNum()">تصفير العداد (0)</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bizID = urlParams.get('id') || 'test_user';
        let currentLang = 'ar';

        const translations = {
            ar: { title: "لوحة التحكم", namePlc: "اسم النشاط", msgPlc: "ملاحظات للزبائن", prev: "السابق", next: "التالي", reset: "تصفير العداد (0)", langBtn: "English", wait: "بانتظار التفعيل ❌", expired: "الاشتراك منتهي ⚠️", remaining: "باقي للاشتراك: " },
            en: { title: "Control Panel", namePlc: "Business Name", msgPlc: "Notes for Customers", prev: "Prev", next: "Next", reset: "Reset Counter (0)", langBtn: "العربية", wait: "Waiting for Activation ❌", expired: "Subscription Expired ⚠️", remaining: "Remaining: " }
        };

        const firebaseConfig = { apiKey: "AIzaSyBqlRUShD3182zmliJrDUzBXQjL_eXSKtY", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentNum = 0;

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const html = document.getElementById('admin-html');
            const data = translations[currentLang];
            html.setAttribute('lang', currentLang);
            html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('display-title').innerText = data.title;
            document.getElementById('name-in').placeholder = data.namePlc;
            document.getElementById('msg-in').placeholder = data.msgPlc;
            document.getElementById('btn-prev').innerText = data.prev;
            document.getElementById('btn-next').innerText = data.next;
            document.getElementById('btn-reset').innerText = data.reset;
            document.getElementById('lang-btn').innerText = data.langBtn;
            updateExpiryUI(); 
        }

        let expiryData = null;
        let activeStatus = false;

        db.ref('businesses/' + bizID).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                currentNum = data.num || 0;
                activeStatus = data.active;
                expiryData = data.expiry;
                document.getElementById('num-out').innerText = currentNum;
                document.getElementById('name-in').value = data.name || "";
                document.getElementById('msg-in').value = data.msg || "";
                updateExpiryUI();
            }
        });

        function updateExpiryUI() {
            const timer = document.getElementById('expiry-timer');
            const data = translations[currentLang];
            if (activeStatus === false) {
                timer.innerText = data.wait;
                timer.style.color = "#e74c3c";
            } else if (expiryData) {
                const diff = new Date(expiryData) - new Date();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                if (days <= 0) {
                    timer.innerText = data.expired;
                    timer.style.color = "#e74c3c";
                } else {
                    timer.innerText = data.remaining + days + (currentLang === 'ar' ? " يوم" : " Days");
                    timer.style.color = "#f1c40f";
                }
            }
        }

        function sync() {
            db.ref('businesses/' + bizID).update({
                num: currentNum,
                name: document.getElementById('name-in').value,
                msg: document.getElementById('msg-in').value
            });
        }

        function changeNum(step) { currentNum += step; if(currentNum < 0) currentNum = 0; sync(); }
        function resetNum() { if(confirm(currentLang === 'ar' ? "تصفير؟" : "Reset?")) { currentNum = 0; sync(); } }
        document.getElementById('name-in').oninput = sync;
        document.getElementById('msg-in').oninput = sync;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة السكرتير الشاملة | صوفيگرام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4500; --bg: #050a14; --card: #121212; --glow: #00d2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .admin-box { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; }
        
        /* قسم أرقام الحجز */
        .num-display { font-size: 100px; font-weight: bold; margin: 10px 0; color: white; }
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .circle-btn { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 40px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-plus { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .btn-minus { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }

        /* قسم الأوقات والموقع (مدمج) */
        .settings-sec { background: #1a1a2e; padding: 15px; border-radius: 20px; margin-top: 30px; border: 1px solid #222; text-align: right; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .time-val { font-size: 20px; font-weight: bold; color: var(--glow); min-width: 40px; text-align: center; }
        .small-btn { width: 35px; height: 35px; border-radius: 8px; border: none; background: #333; color: white; cursor: pointer; }
        .ampm-btn { padding: 5px 10px; border-radius: 8px; background: var(--fire); border: none; color: white; cursor: pointer; }

        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-loc { background: #3498db; color: white; }
        .btn-save { background: linear-gradient(45deg, var(--fire), #ff8c00); color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="color: var(--fire);">لوحة إدارة النشاط ⚙️</h2>

    <div class="num-display" id="currentNum">0</div>
    <div class="btn-row">
        <button class="circle-btn btn-plus" onclick="updateNum(1)">+</button>
        <button class="circle-btn btn-minus" onclick="updateNum(-1)">-</button>
    </div>

    <div class="settings-sec">
        <h4 style="margin:0 0 15px; color: var(--glow); border-bottom: 1px solid #333; padding-bottom: 5px;">ضبط ساعات العمل والموقع</h4>
        
        <label>وقت الفتح:</label>
        <div class="control-row">
            <button class="small-btn" onclick="changeTime('open', -1)">-</button>
            <span class="time-val" id="openDisp">4</span>
            <button class="small-btn" onclick="changeTime('open', 1)">+</button>
            <button class="ampm-btn" id="openAMPM" onclick="toggleAMPM('open')">مساءً</button>
        </div>

        <label>وقت الإغلاق:</label>
        <div class="control-row">
            <button class="small-btn" onclick="changeTime('close', -1)">-</button>
            <span class="time-val" id="closeDisp">10</span>
            <button class="small-btn" onclick="changeTime('close', 1)">+</button>
            <button class="ampm-btn" id="closeAMPM" onclick="toggleAMPM('close')">مساءً</button>
        </div>

        <button class="btn-action btn-loc" onclick="updateLoc()">
            <i class="fas fa-crosshairs"></i> تحديث موقع العيادة الآن 📍
        </button>
        <p id="locStatus" style="font-size: 10px; color: #2ecc71; text-align: center; margin: 5px 0;"></p>
    </div>

    <button class="btn-action btn-save" onclick="saveAll()">حفظ جميع التعديلات 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
        authDomain: "sofygramclinic.firebaseapp.com",
        databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
        projectId: "sofygramclinic",
        appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userId = new URLSearchParams(window.location.search).get('id');
    let currentData = { currentNum: 0 };
    let times = { open: 4, close: 10 };
    let ampm = { open: "مساءً", close: "مساءً" };
    let coords = { lat: "", lng: "" };

    // جلب البيانات الحالية
    if(userId) {
        onValue(ref(db, 'users/' + userId), (snap) => {
            const d = snap.val(); if(!d) return;
            currentData = d;
            document.getElementById('currentNum').innerText = d.currentNum || 0;
        });
    }

    window.updateNum = (val) => {
        let n = (currentData.currentNum || 0) + val;
        if(n < 0) n = 0;
        update(ref(db, 'users/' + userId), { currentNum: n });
    };

    window.changeTime = (type, val) => {
        times[type] += val;
        if(times[type] > 12) times[type] = 1;
        if(times[type] < 1) times[type] = 12;
        document.getElementById(type + 'Disp').innerText = times[type];
    };

    window.toggleAMPM = (type) => {
        ampm[type] = (ampm[type] === "مساءً") ? "صباحاً" : "مساءً";
        document.getElementById(type + 'AMPM').innerText = ampm[type];
    };

    window.updateLoc = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                coords.lat = pos.coords.latitude;
                coords.lng = pos.coords.longitude;
                document.getElementById('locStatus').innerText = "✅ تم التقاط الموقع!";
            });
        }
    };

    window.saveAll = () => {
        update(ref(db, 'users/' + userId), {
            openTime: `${times.open} ${ampm.open}`,
            closeTime: `${times.close} ${ampm.close}`,
            lat: coords.lat || currentData.lat || "",
            lng: coords.lng || currentData.lng || ""
        }).then(() => alert("تم حفظ الأوقات والموقع بنجاح!"));
    };
</script>
</body>
</html>

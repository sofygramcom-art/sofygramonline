<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | صوفيگرام ⚙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4500; --bg: #050a14; --card: #121212; --glow: #00d2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .admin-box { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* التحكم بالأرقام */
        .num-display { font-size: 110px; font-weight: bold; margin: 5px 0; color: white; }
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .circle-btn { width: 85px; height: 85px; border-radius: 50%; border: none; font-size: 45px; color: white; cursor: pointer; transition: 0.2s; }
        .btn-plus { background: #2ecc71; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .btn-minus { background: #e74c3c; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); }

        /* الأقسام الإضافية */
        .section { background: #1a1a2e; padding: 15px; border-radius: 20px; margin-top: 20px; border: 1px solid #222; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 13px; }
        
        select, textarea { width: 100%; padding: 12px; border-radius: 12px; background: #000; color: white; border: 1px solid #444; outline: none; box-sizing: border-box; }
        textarea { height: 60px; resize: none; font-family: sans-serif; }

        /* التحكم بالوقت */
        .time-row { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 8px; border-radius: 12px; margin-bottom: 10px; }
        .time-val { font-size: 22px; font-weight: bold; color: var(--glow); min-width: 40px; text-align: center; }
        .small-btn { width: 35px; height: 35px; border-radius: 8px; border: none; background: #333; color: white; font-size: 18px; cursor: pointer; }
        .ampm-btn { padding: 6px 12px; border-radius: 8px; background: var(--fire); border: none; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }

        .btn-full { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-loc { background: #3498db; color: white; }
        .btn-save { background: linear-gradient(45deg, var(--fire), #ff8c00); color: white; margin-top: 25px; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.3); }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 id="clinicTitle" style="color: var(--fire); margin-bottom: 20px;">تحميل...</h2>

    <div class="num-display" id="currentNum">0</div>
    <div class="btn-row">
        <button class="circle-btn btn-plus" onclick="updateNum(1)">+</button>
        <button class="circle-btn btn-minus" onclick="updateNum(-1)">-</button>
    </div>

    <div class="section">
        <label>الحالة الحالية:</label>
        <select id="statusSelect">
            <option value="مفتوح الآن ✅">مفتوح الآن ✅</option>
            <option value="قريباً ⏳">قريباً ⏳</option>
            <option value="مغلق حالياً ❌">مغلق حالياً ❌</option>
        </select>
        
        <label style="margin-top:15px;">ملاحظة سريعة للجمهور:</label>
        <textarea id="noteInput" placeholder="مثال: الطبيب في استراحة، أو العيادة مزدحمة.."></textarea>
    </div>

    <div class="section">
        <label>وقت الفتح:</label>
        <div class="time-row">
            <button class="small-btn" onclick="changeTime('open', -1)">-</button>
            <span class="time-val" id="openDisp">4</span>
            <button class="small-btn" onclick="changeTime('open', 1)">+</button>
            <button class="ampm-btn" id="openAMPM" onclick="toggleAMPM('open')">مساءً</button>
        </div>

        <label>وقت الإغلاق:</label>
        <div class="time-row">
            <button class="small-btn" onclick="changeTime('close', -1)">-</button>
            <span class="time-val" id="closeDisp">10</span>
            <button class="small-btn" onclick="changeTime('close', 1)">+</button>
            <button class="ampm-btn" id="closeAMPM" onclick="toggleAMPM('close')">مساءً</button>
        </div>

        <button class="btn-full btn-loc" onclick="updateLoc()">
            <i class="fas fa-map-marker-alt"></i> تحديث موقع العيادة (GPS)
        </button>
        <p id="locStatus" style="font-size: 11px; color: #2ecc71; margin: 5px 0 0;"></p>
    </div>

    <button class="btn-full btn-save" onclick="saveAll()">حفظ ونشر التعديلات 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
        authDomain: "sofygramclinic.firebaseapp.com",
        databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
        projectId: "sofygramclinic",
        appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userId = new URLSearchParams(window.location.search).get('id');
    let currentData = {};
    let times = { open: 4, close: 10 };
    let ampm = { open: "مساءً", close: "مساءً" };
    let coords = { lat: "", lng: "" };

    if(userId) {
        onValue(ref(db, 'users/' + userId), (snap) => {
            const d = snap.val(); if(!d) return;
            currentData = d;
            document.getElementById('currentNum').innerText = d.currentNum || 0;
            document.getElementById('clinicTitle').innerText = d.name || "إدارة العيادة";
            document.getElementById('statusSelect').value = d.status || "مغلق حالياً ❌";
            document.getElementById('noteInput').value = d.note || "";
        });
    }

    window.updateNum = (val) => {
        let n = (currentData.currentNum || 0) + val;
        if(n < 0) n = 0;
        update(ref(db, 'users/' + userId), { currentNum: n });
    };

    window.changeTime = (type, val) => {
        times[type] += val;
        if(times[type] > 12) times[type] = 1;
        if(times[type] < 1) times[type] = 12;
        document.getElementById(type + 'Disp').innerText = times[type];
    };

    window.toggleAMPM = (type) => {
        ampm[type] = (ampm[type] === "مساءً") ? "صباحاً" : "مساءً";
        document.getElementById(type + 'AMPM').innerText = ampm[type];
    };

    window.updateLoc = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                coords.lat = pos.coords.latitude;
                coords.lng = pos.coords.longitude;
                document.getElementById('locStatus').innerText = "✅ تم تحديد الموقع!";
            });
        }
    };

    window.saveAll = () => {
        if(!userId) return;
        update(ref(db, 'users/' + userId), {
            status: document.getElementById('statusSelect').value,
            note: document.getElementById('noteInput').value,
            openTime: `${times.open} ${ampm.open}`,
            closeTime: `${times.close} ${ampm.close}`,
            lat: coords.lat || currentData.lat || "",
            lng: coords.lng || currentData.lng || ""
        }).then(() => alert("عاش تدبيرك! تم التحديث بنجاح."));
    };
</script>
</body>
</html>

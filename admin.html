<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .admin-card { background: #121212; padding: 25px; border-radius: 25px; max-width: 450px; margin: auto; border: 1px solid #ffd700; }
        .btn-ctrl { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 35px; cursor: pointer; color: white; margin: 10px; }
        .plus { background: #2ecc71; } .minus { background: #e74c3c; }
        select, textarea { width: 100%; margin: 10px 0; padding: 12px; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #333; }
        .payment-box { margin-top: 25px; padding: 15px; border: 1px dashed #ffd700; border-radius: 15px; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>
    <div class="admin-card">
        <img src="logo.png" style="width:180px; margin-bottom:20px;">
        <div style="display: flex; align-items: center; justify-content: center;">
            <button class="btn-ctrl plus" onclick="change(1)">+</button>
            <span id="num" style="font-size: 70px; font-weight: bold; min-width: 80px;">0</span>
            <button class="btn-ctrl minus" onclick="change(-1)">-</button>
        </div>
        <select id="status"><option>● مفتوح الآن | Open</option><option>○ مغلق حالياً | Closed</option></select>
        <textarea id="note" placeholder="ملاحظة للجمهور..."></textarea>
        <button id="saveBtn" style="width: 100%; padding: 15px; background: #ffd700; border-radius: 10px; font-weight: bold;">تحديث البيانات</button>
        
        <div class="payment-box">
            <p>لتجديد الاشتراك (ZainCash): 07807466488</p>
            <a href="https://wa.me/9647807466488" style="color:#25d366; text-decoration:none;"><i class="fab fa-whatsapp"></i> راسل الإدارة</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentNum = 0;

        window.change = (val) => {
            currentNum += val;
            if(currentNum < 0) currentNum = 0;
            document.getElementById('num').innerText = currentNum;
        };

        document.getElementById('saveBtn').onclick = () => {
            set(ref(db, 'live_data'), {
                currentNum: currentNum,
                status: document.getElementById('status').value,
                note: document.getElementById('note').value
            });
            alert("تم التحديث!");
        };
    </script>
</body>
</html>

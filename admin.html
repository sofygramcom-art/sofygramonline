<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | صوفيگرام ⚙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --fire: #ff4500; --bg: #050a14; --card: #121212; --glow: #00d2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .admin-box { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .num { font-size: 110px; font-weight: bold; margin: 10px 0; }
        .btn-row { display: flex; justify-content: center; gap: 20px; }
        .circle-btn { width: 85px; height: 85px; border-radius: 50%; border: none; font-size: 45px; color: white; cursor: pointer; }
        .sec { background: #1a1a2e; padding: 15px; border-radius: 20px; margin-top: 25px; border: 1px solid #222; text-align: right; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; background: #000; color: white; border: 1px solid #444; box-sizing: border-box; }
        .btn-full { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 id="activityTitle" style="color: var(--fire);">جاري تحميل الاسم...</h2>
    
    <div class="num" id="currentNum">0</div>
    <div class="btn-row">
        <button class="circle-btn" style="background:#2ecc71;" onclick="updateNum(1)">+</button>
        <button class="circle-btn" style="background:#e74c3c;" onclick="updateNum(-1)">-</button>
    </div>

    <div class="sec">
        <label>حالة النشاط الآن:</label>
        <select id="statusSelect">
            <option>مفتوح الآن ✅</option>
            <option>قريباً ⏳</option>
            <option>مغلق حالياً ❌</option>
        </select>
        <label style="display:block; margin-top:15px;">ملاحظة للزبائن:</label>
        <textarea id="noteInput" placeholder="اكتب أي تنبيه للزبائن هنا..."></textarea>
    </div>

    <div class="sec">
        <label>ساعات العمل والموقع:</label>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="time" id="openT">
            <input type="time" id="closeT">
        </div>
        <button class="btn-full" style="background:#3498db; color:white;" onclick="getLoc()">📍 تحديث موقع النشاط (GPS)</button>
    </div>

    <button class="btn-full" style="background:linear-gradient(45deg, #ff4500, #ff8c00); color:white;" onclick="saveAll()">حفظ ونشر التعديلات 🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY", authDomain: "sofygramclinic.firebaseapp.com", databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com", projectId: "sofygramclinic", appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    const userId = new URLSearchParams(window.location.search).get('id');
    let userData = {}; let lat = "", lng = "";

    if(userId) {
        onValue(ref(db, 'users/' + userId), (snap) => {
            userData = snap.val(); if(!userData) return;
            document.getElementById('currentNum').innerText = userData.currentNum || 0;
            document.getElementById('activityTitle').innerText = userData.name || "لوحة التحكم";
            document.getElementById('statusSelect').value = userData.status || "مغلق حالياً ❌";
            document.getElementById('noteInput').value = userData.note || "";
        });
    }

    window.updateNum = (v) => { let n = (userData.currentNum || 0) + v; update(ref(db, 'users/' + userId), { currentNum: n < 0 ? 0 : n }); };
    window.getLoc = () => navigator.geolocation.getCurrentPosition(p => { lat = p.coords.latitude; lng = p.coords.longitude; alert("✅ تم تحديد الموقع!"); });
    window.saveAll = () => update(ref(db, 'users/' + userId), { 
        status: document.getElementById('statusSelect').value, 
        note: document.getElementById('noteInput').value, 
        openTime: document.getElementById('openT').value, 
        closeTime: document.getElementById('closeT').value, 
        lat: lat || userData.lat || "", lng: lng || userData.lng || "" 
    }).then(() => alert("🚀 تم التحديث بنجاح!"));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة | صوفيگرام ⚙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيق الأساسي للوحة الأرقام */
        :root { --fire: #ff4500; --bg: #050a14; --card: #121212; --glow: #00d2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .admin-box { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .num-display { font-size: 110px; font-weight: bold; margin: 10px 0; color: white; }
        .btn-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .circle-btn { width: 85px; height: 85px; border-radius: 50%; border: none; font-size: 45px; color: white; cursor: pointer; }
        
        /* زر الإعدادات الصغير */
        .btn-settings { background: none; border: 1px solid #333; color: #666; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-top: 20px; }

        /* لوحة الأوقات المدمجة (تظهر فوق الكل) */
        .time-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; box-sizing: border-box;
        }
        .time-card { background: #121212; border: 2px solid var(--fire); border-radius: 25px; padding: 25px; margin-top: 40px; text-align: right; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; background: #000; padding: 10px; border-radius: 15px; }
        .time-val { font-size: 28px; font-weight: bold; color: var(--glow); min-width: 45px; text-align: center; }
        .small-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: #333; color: white; font-size: 20px; }
        .ampm-btn { padding: 8px 15px; border-radius: 10px; background: var(--fire); border: none; color: white; font-weight: bold; }
        .save-close { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #2ecc71; color: white; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 id="clinicTitle" style="color: var(--fire);">جاري التحميل...</h2>
    
    <div class="num-display" id="currentNumDisplay">0</div>
    <div class="btn-row">
        <button class="circle-btn" style="background:#2ecc71;" onclick="changeMainNum(1)">+</button>
        <button class="circle-btn" style="background:#e74c3c;" onclick="changeMainNum(-1)">-</button>
    </div>

    <button class="btn-settings" onclick="openTimePanel()">
        <i class="fas fa-cog"></i> ضبط ساعات العمل والموقع
    </button>
</div>

<div id="timePanel" class="time-overlay">
    <div class="time-card">
        <h3 style="color: var(--fire); text-align: center;">إعدادات الوقت والموقع 🕒</h3>
        
        <label>وقت الفتح:</label>
        <div class="control-row">
            <button class="small-btn" onclick="adjustTime('open', -1)">-</button>
            <span class="time-val" id="openDisp">4</span>
            <button class="small-btn" onclick="adjustTime('open', 1)">+</button>
            <button class="ampm-btn" id="openAMPM" onclick="switchAMPM('open')">مساءً</button>
        </div>

        <label>وقت الإغلاق:</label>
        <div class="control-row">
            <button class="small-btn" onclick="adjustTime('close', -1)">-</button>
            <span class="time-val" id="closeDisp">10</span>
            <button class="small-btn" onclick="adjustTime('close', 1)">+</button>
            <button class="ampm-btn" id="closeAMPM" onclick="switchAMPM('close')">مساءً</button>
        </div>

        <button onclick="getGPS()" style="width:100%; padding:15px; border-radius:15px; border:none; background:#3498db; color:white; font-weight:bold;">
            <i class="fas fa-map-marker-alt"></i> تحديث موقع النشاط (GPS) 📍
        </button>
        <p id="locMsg" style="font-size: 11px; color: #2ecc71; text-align: center; margin-top: 5px;"></p>

        <button class="save-close" onclick="saveAllSettings()">حفظ وإغلاق اللوحة 🚀</button>
        <button onclick="closeTimePanel()" style="width:100%; background:none; border:none; color:#666; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
        authDomain: "sofygramclinic.firebaseapp.com",
        databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
        projectId: "sofygramclinic",
        appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userId = new URLSearchParams(window.location.search).get('id');
    let dbData = { currentNum: 0 };
    let hrs = { open: 4, close: 10 };
    let ampm = { open: "مساءً", close: "مساءً" };
    let coords = { lat: "", lng: "" };

    // جلب البيانات الأساسية
    if(userId) {
        onValue(ref(db, 'users/' + userId), (snap) => {
            const data = snap.val(); if(!data) return;
            dbData = data;
            document.getElementById('currentNumDisplay').innerText = data.currentNum || 0;
            document.getElementById('clinicTitle').innerText = data.name || "لوحة التحكم";
        });
    }

    // دوال الأرقام (الزائد والناقص)
    window.changeMainNum = (v) => {
        let n = (dbData.currentNum || 0) + v;
        update(ref(db, 'users/' + userId), { currentNum: n < 0 ? 0 : n });
    };

    // فتح وإغلاق لوحة الوقت
    window.openTimePanel = () => document.getElementById('timePanel').style.display = 'block';
    window.closeTimePanel = () => document.getElementById('timePanel').style.display = 'none';

    // دوال ضبط الوقت (زائد وناقص)
    window.adjustTime = (type, v) => {
        hrs[type] += v;
        if(hrs[type] > 12) hrs[type] = 1;
        if(hrs[type] < 1) hrs[type] = 12;
        document.getElementById(type + 'Disp').innerText = hrs[type];
    };

    window.switchAMPM = (type) => {
        ampm[type] = (ampm[type] === "مساءً") ? "صباحاً" : "مساءً";
        document.getElementById(type + 'AMPM').innerText = ampm[type];
    };

    // جلب الموقع
    window.getGPS = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                coords.lat = p.coords.latitude;
                coords.lng = p.coords.longitude;
                document.getElementById('locMsg').innerText = "✅ تم التقاط الموقع بنجاح!";
            });
        }
    };

    // الحفظ النهائي
    window.saveAllSettings = () => {
        if(!userId) return;
        update(ref(db, 'users/' + userId), {
            openTime: hrs.open + " " + ampm.open,
            closeTime: hrs.close + " " + ampm.close,
            lat: coords.lat || dbData.lat || "",
            lng: coords.lng || dbData.lng || ""
        }).then(() => {
            alert("تم حفظ إعدادات الوقت والموقع!");
            closeTimePanel();
        });
    };
</script>

</body>
</html>

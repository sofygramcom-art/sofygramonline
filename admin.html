<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام سكرتير | الإدارة الذكية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .admin-card { background: #121212; padding: 25px; border-radius: 25px; max-width: 400px; margin: auto; border: 1px solid #ffd700; }
        .num-view { font-size: 100px; font-weight: bold; margin: 15px 0; }
        .btn-ctrl { width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 40px; cursor: pointer; color: white; margin: 10px; }
        .plus { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .minus { background: #e74c3c; }
        select, textarea { width: 95%; padding: 12px; margin: 10px 0; border-radius: 12px; background: #1e293b; color: white; border: 1px solid #333; }
        .save-btn { width: 100%; padding: 18px; background: #ffd700; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #qrZone { background: white; padding: 15px; display: none; margin-top: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="loginBox" class="admin-card">
        <img src="logo.png" style="width:160px; margin-bottom:20px;">
        <h3>دخول السكرتير الذكي</h3>
        <input type="text" id="u" placeholder="اسم المستخدم" style="width:85%; padding:12px; margin-bottom:10px; border-radius:10px; border:none;">
        <input type="password" id="p" placeholder="كلمة المرور" style="width:85%; padding:12px; margin-bottom:20px; border-radius:10px; border:none;">
        <button onclick="login()" class="save-btn">دخول للمنصة</button>
    </div>

    <div id="controlBox" class="admin-card" style="display:none;">
        <img src="logo.png" style="width:120px; margin-bottom:10px;">
        <p id="days" style="color:#ffd700; font-size:12px;"></p>
        <h2 id="cName" style="margin:5px 0;"></h2>
        <div class="num-view" id="n">0</div>
        <button class="btn-ctrl plus" onclick="ch(1)">+</button>
        <button class="btn-ctrl minus" onclick="ch(-1)">-</button>
        
        <select id="st">
            <option value="● مفتوح الآن | Open" style="color:green;">🟢 مفتوح الآن</option>
            <option value="🟡 في الطريق | Coming Soon" style="color:orange;">🟡 في الطريق / قريباً</option>
            <option value="🔴 مغلق حالياً | Closed" style="color:red;">🔴 مغلق حالياً</option>
        </select>
        
        <textarea id="nt" placeholder="اكتب ملاحظة للجمهور..."></textarea>
        <button onclick="up()" class="save-btn">تحديث البيانات لايف 🚀</button>
        <button onclick="showQR()" style="background:none; color:#888; border:none; margin-top:15px; cursor:pointer; text-decoration:underline;">📥 عرض وحفظ الباركود الخاص بنا</button>
        
        <div id="qrZone">
            <div id="qrcode"></div>
            <p style="color:black; font-size:12px; margin-top:10px;">اضغط ضغطة مطولة على الباركود لحفظه كصورة</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let curUser = ""; let curNum = 0;

        window.login = () => {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            get(child(ref(db), `users/${user}`)).then((s) => {
                if(s.exists() && s.val().password == pass) {
                    if(!s.val().active) return alert("الحساب بانتظار التفعيل!");
                    curUser = user; curNum = s.val().currentNum || 0;
                    document.getElementById('cName').innerText = s.val().name;
                    document.getElementById('n').innerText = curNum;
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('controlBox').style.display = 'block';
                } else { alert("خطأ!"); }
            });
        };

        window.ch = (v) => { curNum += v; if(curNum<0) curNum=0; document.getElementById('n').innerText = curNum; };
        
        window.up = () => {
            set(ref(db, `users/${curUser}/currentNum`), curNum);
            set(ref(db, `users/${curUser}/status`), document.getElementById('st').value);
            set(ref(db, `users/${curUser}/note`), document.getElementById('nt').value);
            alert("تم التحديث!");
        };

        window.showQR = () => {
            document.getElementById('qrZone').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), `https://sofygram.com/view.html?id=${curUser}`);
        };
    </script>
</body>
</html>

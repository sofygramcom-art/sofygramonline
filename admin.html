<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | لوحة تحكم صوفيگرام ⚙️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon-red: #ff4500; --bg: #050a14; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .admin-card { background: rgba(12, 18, 29, 0.95); border-radius: 35px; padding: 25px; max-width: 450px; margin: auto; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .logo img { width: 120px; filter: drop-shadow(0 0 10px var(--gold)); }

        /* دليل المستخدم الصغير */
        .guide-text { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: bold; background: rgba(255,215,0,0.1); padding: 5px; border-radius: 8px; display: inline-block; }

        .status-box { margin: 20px 0; }
        select { width: 100%; padding: 15px; border-radius: 15px; background: #000; border: 2px solid var(--gold); color: #fff; font-size: 18px; outline: none; text-align: center; }

        .number-display { font-size: 100px; font-weight: bold; color: var(--gold); margin: 10px 0; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }

        /* أزرار التحكم */
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-plus { width: 100px; height: 100px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 50px; cursor: pointer; box-shadow: 0 0 20px var(--gold); font-weight: bold; }
        .btn-reset { background: #ff4d4d; color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .qr-box { margin-top: 25px; padding: 15px; background: #fff; border-radius: 20px; display: inline-block; }
        .qr-box img { width: 150px; cursor: pointer; }

        .note-input { width: 90%; padding: 12px; margin-top: 15px; border-radius: 10px; background: #111; border: 1px solid #333; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="logo"><img src="logo.png"></div>
        <h2 id="clinicName" style="margin:10px 0; color:var(--gold);">لوحة التحكم</h2>

        <div class="status-box">
            <span class="guide-text">👈 اختار الحالة من هنا (مفتوح/مغلق)</span>
            <select id="statusSelect" onchange="updateStatus()">
                <option>مفتوح الآن</option>
                <option>مغلق حالياً</option>
                <option>قريباً</option>
                <option>استراحة</option>
            </select>
        </div>

        <div class="number-display" id="currentNum">0</div>

        <div class="controls">
            <span class="guide-text">➕ اضغط هنا لزيادة الرقم (دخول مراجع)</span>
            <button class="btn-plus" onclick="changeNum(1)">+</button>
            
            <span class="guide-text">🔴 اضغط هنا لتصفير العداد عند انتهاء الدوام</span>
            <button class="btn-reset" onclick="resetNum()">تصفير العداد</button>
        </div>

        <input type="text" id="noteInput" class="note-input" placeholder="اكتب ملاحظة للمراجعين هنا..." onchange="updateNote()">

        <div class="qr-section" style="margin-top:20px;">
            <span class="guide-text">📸 اضغط الباركود للحفظ أو المشاركة</span>
            <div class="qr-box" id="qrContainer">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            alert("عذراً، لم يتم العثور على معرف النشاط!");
        } else {
            // تحميل البيانات ومزامنتها
            onValue(ref(db, 'users/' + id), (snap) => {
                const data = snap.val();
                if (data) {
                    document.getElementById('clinicName').innerText = data.name;
                    document.getElementById('currentNum').innerText = data.currentNum || 0;
                    document.getElementById('statusSelect').value = data.status || "مفتوح الآن";
                    document.getElementById('noteInput').value = data.note || "";
                    
                    // توليد الباركود
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://sofygram.com/view.html?id=${id}`;
                    document.getElementById('qrContainer').innerHTML = `<img src="${qrUrl}" onclick="downloadQR('${qrUrl}')" title="اضغط للحفظ">`;
                }
            });
        }

        window.changeNum = (val) => {
            const current = parseInt(document.getElementById('currentNum').innerText);
            update(ref(db, 'users/' + id), { currentNum: current + val });
        };

        window.resetNum = () => {
            if(confirm("هل أنت متأكد من تصفير العداد؟")) {
                update(ref(db, 'users/' + id), { currentNum: 0 });
            }
        };

        window.updateStatus = () => {
            const s = document.getElementById('statusSelect').value;
            update(ref(db, 'users/' + id), { status: s });
        };

        window.updateNote = () => {
            const n = document.getElementById('noteInput').value;
            update(ref(db, 'users/' + id), { note: n });
        };

        window.downloadQR = (url) => {
            const link = document.createElement('a');
            link.href = url;
            link.download = 'Sofygram_QR.png';
            link.click();
            alert("جاري حفظ الباركود في جهازك...");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | لوحة السكرتير</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #121212; padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #ffd700; }
        .num { font-size: 90px; font-weight: bold; color: #fff; margin: 20px 0; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: none; font-size: 35px; cursor: pointer; color: white; margin: 10px; }
        .plus { background: #2ecc71; } .minus { background: #e74c3c; }
        input, select, textarea { width: 95%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #333; }
        #loginBox { display: block; } #controlBox { display: none; }
        .days-info { color: #ffd700; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginBox" class="card">
        <img src="logo.png" style="width:150px; margin-bottom:20px;">
        <h3>دخول السكرتير</h3>
        <input type="text" id="userInput" placeholder="اسم المستخدم">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button onclick="window.login()" style="width:100%; padding:15px; background:#ffd700; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">دخول للمنصة</button>
    </div>

    <div id="controlBox" class="card">
        <div id="daysCount" class="days-info"></div>
        <h2 id="clinicTitle" style="color:#ffd700; margin:0;"></h2>
        <div class="num" id="currentNum">0</div>
        <button class="btn plus" onclick="window.change(1)">+</button>
        <button class="btn minus" onclick="window.change(-1)">-</button>
        <select id="actStatus">
            <option>● مفتوح الآن | Open</option>
            <option>○ مغلق حالياً | Closed</option>
        </select>
        <textarea id="actNote" placeholder="اكتب ملاحظة للجمهور..."></textarea>
        <button onclick="window.updateData()" style="width:100%; padding:15px; background:#2ecc71; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">تحديث البيانات لايف 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeUser = "";
        let numVal = 0;

        window.login = function() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            get(child(ref(db), `users/${u}`)).then((snap) => {
                if(snap.exists() && snap.val().password === p) {
                    const data = snap.val();
                    const expiry = data.expiryDate ? new Date(data.expiryDate) : null;
                    const today = new Date();

                    if(!data.active || (expiry && expiry < today)) {
                        alert("عذراً، حسابك غير مفعل أو اشتراكك منتهي. تواصل مع الإدارة.");
                        return;
                    }

                    activeUser = u;
                    numVal = data.currentNum || 0;
                    const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                    
                    document.getElementById('daysCount').innerText = `📅 باقي ${daysLeft} يوم على انتهاء الاشتراك`;
                    document.getElementById('clinicTitle').innerText = data.name;
                    document.getElementById('currentNum').innerText = numVal;
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('controlBox').style.display = 'block';
                } else { alert("خطأ في اسم المستخدم أو كلمة المرور"); }
            });
        };

        window.change = (v) => { numVal += v; if(numVal<0) numVal=0; document.getElementById('currentNum').innerText = numVal; };

        window.updateData = function() {
            set(ref(db, `users/${activeUser}/currentNum`), numVal);
            set(ref(db, `users/${activeUser}/status`), document.getElementById('actStatus').value);
            set(ref(db, `users/${activeUser}/note`), document.getElementById('actNote').value);
            alert("تم التحديث بنجاح!");
        };
    </script>
</body>
</html>

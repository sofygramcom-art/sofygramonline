<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofygram Admin | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .admin-card { background: #121212; padding: 25px; border-radius: 25px; max-width: 450px; margin: auto; border: 1px solid #ffd700; }
        .btn-ctrl { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; color: white; margin: 10px; }
        .plus { background: #2ecc71; } .minus { background: #e74c3c; }
        .reset-btn { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        input, select, textarea { width: 95%; margin: 10px 0; padding: 12px; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #333; text-align: center; }
        .save-btn { width: 100%; padding: 18px; background: #ffd700; color: black; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="admin-card">
        <img src="logo.png" style="width:160px; margin-bottom:15px;">
        
        <label>اسم العيادة / النشاط:</label>
        <input type="text" id="clinicName" placeholder="أدخل اسم العيادة هنا...">

        <div style="display: flex; align-items: center; justify-content: center; margin: 20px 0;">
            <button class="btn-ctrl plus" onclick="change(1)">+</button>
            <span id="num" style="font-size: 80px; font-weight: bold; min-width: 90px;">0</span>
            <button class="btn-ctrl minus" onclick="change(-1)">-</button>
        </div>
        <button class="reset-btn" onclick="resetNum()">تصفير الرقم 🔄</button>

        <select id="status">
            <option>● مفتوح الآن | Open</option>
            <option>○ مغلق حالياً | Closed</option>
            <option>☕ في استراحة | Break</option>
        </select>

        <textarea id="note" placeholder="ملاحظات للجمهور (مثلاً: الحجز متوقف حالياً)"></textarea>
        
        <button id="saveBtn" class="save-btn">تحديث البيانات للمشاهدين 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentNum = 0;

        // جلب البيانات الحالية عند الفتح
        onValue(ref(db, 'live_data'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                currentNum = data.currentNum || 0;
                document.getElementById('num').innerText = currentNum;
                document.getElementById('clinicName').value = data.name || "";
                document.getElementById('status').value = data.status || "";
                document.getElementById('note').value = data.note || "";
            }
        });

        window.change = (val) => { currentNum += val; if(currentNum < 0) currentNum = 0; document.getElementById('num').innerText = currentNum; };
        window.resetNum = () => { currentNum = 0; document.getElementById('num').innerText = 0; };

        document.getElementById('saveBtn').onclick = () => {
            set(ref(db, 'live_data'), {
                currentNum: currentNum,
                name: document.getElementById('clinicName').value,
                status: document.getElementById('status').value,
                note: document.getElementById('note').value
            }).then(() => alert("تم التحديث بنجاح!"));
        };
    </script>
</body>
</html>

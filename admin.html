<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صوفيگرام | لوحة السكرتير</title>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .admin-card { background: #121212; padding: 25px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #ffd700; }
        .num-display { font-size: 80px; font-weight: bold; margin: 20px 0; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; color: white; margin: 5px; }
        .plus { background: #2ecc71; } .minus { background: #e74c3c; }
        input, select, textarea { width: 95%; padding: 10px; margin: 10px 0; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #333; }
        #loginSection { display: block; } #controlSection { display: none; }
    </style>
</head>
<body>
    <div id="loginSection" class="admin-card">
        <img src="logo.png" style="width: 150px; margin-bottom: 20px;">
        <h3>دخول السكرتير</h3>
        <input type="text" id="userLogin" placeholder="اسم المستخدم">
        <input type="password" id="passLogin" placeholder="كلمة المرور">
        <button onclick="window.login()" style="width:100%; padding:15px; background:#ffd700; border:none; border-radius:10px; font-weight:bold;">دخول</button>
    </div>

    <div id="controlSection" class="admin-card">
        <h2 id="helloName" style="color:#ffd700;">أهلاً بك</h2>
        <div class="num-display" id="currentNum">0</div>
        <button class="btn plus" onclick="window.change(1)">+</button>
        <button class="btn minus" onclick="window.change(-1)">-</button>
        <select id="statusNow">
            <option>● مفتوح الآن | Open</option>
            <option>○ مغلق حالياً | Closed</option>
        </select>
        <textarea id="adminNote" placeholder="اكتب ملاحظة للزبائن..."></textarea>
        <button onclick="window.update()" style="width:100%; padding:15px; background:#2ecc71; border:none; border-radius:10px; color:white; font-weight:bold;">تحديث العرض للمشاهدين 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqlRUshD3182zmliJrDUzBXQjL_eXSKtY",
            authDomain: "sofygramclinic.firebaseapp.com",
            databaseURL: "https://sofygramclinic-default-rtdb.firebaseio.com",
            projectId: "sofygramclinic",
            storageBucket: "sofygramclinic.firebasestorage.app",
            messagingSenderId: "207475452149",
            appId: "1:207475452149:web:3f0fbbcc1419bf9e6b7dbc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let loggedId = "";
        let num = 0;

        window.login = function() {
            const user = document.getElementById('userLogin').value;
            const pass = document.getElementById('passLogin').value;
            get(child(ref(db), `users/${user}`)).then((snapshot) => {
                if(snapshot.exists() && snapshot.val().password === pass) {
                    loggedId = user;
                    num = snapshot.val().currentNum || 0;
                    document.getElementById('currentNum').innerText = num;
                    document.getElementById('helloName').innerText = snapshot.val().name;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('controlSection').style.display = 'block';
                } else { alert("خطأ في البيانات أو الحساب غير مفعل"); }
            });
        };

        window.change = (val) => { num += val; if(num < 0) num = 0; document.getElementById('currentNum').innerText = num; };

        window.update = function() {
            set(ref(db, 'users/' + loggedId + '/currentNum'), num);
            set(ref(db, 'users/' + loggedId + '/status'), document.getElementById('statusNow').value);
            set(ref(db, 'users/' + loggedId + '/note'), document.getElementById('adminNote').value);
            alert("تم التحديث بنجاح!");
        };
    </script>
</body>
</html>
